const cloudOK=()=>CL_CLOUD&&!CL_CLOUD.startsWith('YOUR_');
const sheetOK=()=>SHEET_URL&&!SHEET_URL.startsWith('YOUR_');

async function uploadMedia(src,type='image'){
  if(!cloudOK())return null;
  const fd=new FormData();
  fd.append('upload_preset',CL_PRESET);
  let blob;
  if(src instanceof File||src instanceof Blob){blob=src;}
  else if(typeof src==='string'&&(src.startsWith('data:')||src.startsWith('blob:'))){
    blob=await fetch(src).then(r=>r.blob());
  }else return null;
  fd.append('file',blob);
  const res=await fetch(`https://api.cloudinary.com/v1_1/${CL_CLOUD}/${type}/upload`,{method:'POST',body:fd});
  const d=await res.json();
  if(d.secure_url)return d.secure_url;
  throw new Error(d.error?.message||'Upload failed');
}

async function postToSheet(payload){
  if(!sheetOK())throw new Error('Apps Script URL not configured');
  const res=await fetch(SHEET_URL,{method:'POST',body:JSON.stringify(payload)});
  return res.json();
}

async function fetchSheet(){
  if(!sheetOK())return{ok:false,records:[],error:'Apps Script URL not configured'};
  const res=await fetch(SHEET_URL+'?action=get');
  return res.json();
}

// тФАтФА Annotation modal тФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФА
function Annotate({src,onSave,onDiscard}){
  const cv=useRef(null);const[draw,setDraw]=useState(false);const[clr,setClr]=useState('#ef4444');const[sz,setSz]=useState(4);const[tool,setTool]=useState('pen');const last=useRef(null);
  useEffect(()=>{if(!cv.current||!src)return;const el=cv.current,ctx=el.getContext('2d'),img=new Image();img.onload=()=>{el.width=img.naturalWidth;el.height=img.naturalHeight;ctx.drawImage(img,0,0);};img.src=src;},[src]);
  const pt=(e,el)=>{const r=el.getBoundingClientRect(),s=e.touches?e.touches[0]:e;return{x:(s.clientX-r.left)*el.width/r.width,y:(s.clientY-r.top)*el.height/r.height};};
  const sd=e=>{setDraw(true);last.current=pt(e,cv.current);};
  const dd=e=>{if(!draw||!cv.current)return;e.preventDefault();const ctx=cv.current.getContext('2d'),p=pt(e,cv.current);ctx.beginPath();ctx.moveTo(last.current.x,last.current.y);ctx.lineTo(p.x,p.y);ctx.strokeStyle=tool==='eraser'?'#fff':clr;ctx.lineWidth=tool==='eraser'?sz*6:sz;ctx.lineCap='round';ctx.lineJoin='round';ctx.globalCompositeOperation=tool==='eraser'?'destination-out':'source-over';ctx.stroke();last.current=p;};
  const ed=()=>{setDraw(false);last.current=null;};
  const COLS=['#ef4444','#f59e0b','#10b981','#3b82f6','#8b5cf6','#fff','#111'];
  return html`<div class="overlay" onClick=${e=>e.stopPropagation()}>
    <div style=${{background:C.card,borderRadius:12,padding:16,width:'100%',maxWidth:680,maxHeight:'92vh',display:'flex',flexDirection:'column',gap:10}}>
      <div style=${{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <span style=${{color:C.accent,fontFamily:mono,fontSize:12,fontWeight:700}}>тЬП ANNOTATE IMAGE</span>
        <div style=${{display:'flex',gap:8}}>
          <button onClick=${()=>cv.current&&onSave(cv.current.toDataURL())} style=${{background:C.pass+'33',color:C.pass,border:`1px solid ${C.pass}`,borderRadius:6,padding:'6px 16px',fontFamily:mono,fontSize:12,fontWeight:700,cursor:'pointer'}}>тЬУ SAVE</button>
          <button onClick=${onDiscard} style=${{background:C.fail+'22',color:C.fail,border:`1px solid ${C.fail}`,borderRadius:6,padding:'6px 16px',fontFamily:mono,fontSize:12,cursor:'pointer'}}>тЬХ DISCARD</button>
        </div>
      </div>
      <div style=${{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
        <div style=${{display:'flex',gap:5}}>${COLS.map(c=>html`<div key=${c} onClick=${()=>{setClr(c);setTool('pen');}} style=${{width:22,height:22,borderRadius:'50%',background:c,cursor:'pointer',border:`2px solid ${clr===c&&tool==='pen'?'#fff':C.border}`}}/>`)}</div>
        <div style=${{display:'flex',gap:5}}>${[2,4,8,14].map(s=>html`<div key=${s} onClick=${()=>setSz(s)} style=${{width:s+10,height:s+10,borderRadius:'50%',background:sz===s?C.accent:C.muted,cursor:'pointer',border:`2px solid ${sz===s?C.accent:C.border}`}}/>`)}</div>
        <button onClick=${()=>setTool(t=>t==='eraser'?'pen':'eraser')} style=${{background:tool==='eraser'?C.abl:'transparent',color:tool==='eraser'?C.accent:C.muted,border:`1px solid ${tool==='eraser'?C.accent:C.border}`,borderRadius:6,padding:'4px 12px',fontFamily:mono,fontSize:11,cursor:'pointer'}}>тмЬ ERASER</button>
      </div>
      <div style=${{overflow:'auto',flex:1,borderRadius:8,border:`1px solid ${C.border}`,background:'#000',display:'flex',justifyContent:'center',alignItems:'center'}}>
        <canvas ref=${cv} style=${{maxWidth:'100%',maxHeight:'56vh',cursor:'crosshair',touchAction:'none'}} onMouseDown=${sd} onMouseMove=${dd} onMouseUp=${ed} onMouseLeave=${ed} onTouchStart=${sd} onTouchMove=${dd} onTouchEnd=${ed}/>
      </div>
    </div>
  </div>`;
}

// тХРтХРтХР FILL SCORECARD тХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХР
function FillScorecard({onBack}){
  const[step,setStep]=useState('info'); // info|areas|questions|uploading|done|error
  const[info,setInfo]=useState({site:SITES[0],date:new Date().toISOString().slice(0,10),week:weekNum(new Date()),auditor:''});
  const[doneAr,setDoneAr]=useState([]);
  const[curAr,setCurAr]=useState(null);
  const[ans,setAns]=useState({});
  const[qi,setQi]=useState(0);
  // camera state
  const[cam,setCam]=useState(false);const[stream,setStream]=useState(null);
  // video record state
  const[vRec,setVRec]=useState(false);const[vStream,setVStream]=useState(null);const[mRec,setMRec]=useState(null);
  // annotation
  const[ann,setAnn]=useState(null);
  // upload progress
  const[upP,setUpP]=useState({done:0,total:0,phase:''});
  const[errMsg,setErrMsg]=useState('');

  const vRef=useRef(null),cRef=useRef(null),fRef=useRef(null),vfRef=useRef(null),vvRef=useRef(null);

  const setFld=(ar,q,f,v)=>setAns(p=>({...p,[ar]:{...(p[ar]||{}),[q]:{...(p[ar]?.[q]||{answer:null,remark:'',images:[],videos:[]}),[f]:v}}}));
  const getA=(ar,q)=>ans[ar]?.[q]||{answer:null,remark:'',images:[],videos:[]};

  // Camera
  const startCam=async()=>{try{const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});setStream(s);setCam(true);setTimeout(()=>{if(vRef.current)vRef.current.srcObject=s;},80);}catch{alert('Camera unavailable тАФ use file upload.');}};
  const capPhoto=(ar,q)=>{const el=cRef.current,vd=vRef.current;if(!el||!vd)return;el.width=vd.videoWidth||640;el.height=vd.videoHeight||480;el.getContext('2d').drawImage(vd,0,0);const img=el.toDataURL();if(stream)stream.getTracks().forEach(t=>t.stop());setStream(null);setCam(false);setAnn({src:img,ar,q});};
  const stopCam=()=>{if(stream)stream.getTracks().forEach(t=>t.stop());setStream(null);setCam(false);};

  // Video record
  const startVid=async(ar,q)=>{
    try{const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'},audio:true});setVStream(s);setVRec(true);setTimeout(()=>{if(vvRef.current)vvRef.current.srcObject=s;},80);
    const chunks=[];const mr=new MediaRecorder(s,{mimeType:MediaRecorder.isTypeSupported('video/webm;codecs=vp9')?'video/webm;codecs=vp9':'video/webm'});
    mr.ondataavailable=e=>{if(e.data.size>0)chunks.push(e.data);};
    mr.onstop=()=>{const blob=new Blob(chunks,{type:'video/webm'});const url=URL.createObjectURL(blob);setFld(ar,q,'videos',[...getA(ar,q).videos,{url,blob,name:'REC_'+Date.now()+'.webm'}]);if(s)s.getTracks().forEach(t=>t.stop());setVStream(null);setVRec(false);setMRec(null);};
    mr.start();setMRec({rec:mr});}catch{alert('Camera/mic unavailable.');}
  };
  const stopVid=()=>{if(mRec)mRec.rec.stop();};
  const vidFile=(e,ar,q)=>{Array.from(e.target.files).forEach(f=>{const url=URL.createObjectURL(f);setFld(ar,q,'videos',[...getA(ar,q).videos,{url,file:f,name:f.name}]);});e.target.value='';};
  const imgFile=(e,ar,q)=>{Array.from(e.target.files).forEach(f=>{const r=new FileReader();r.onload=ev=>setFld(ar,q,'images',[...getA(ar,q).images,ev.target.result]);r.readAsDataURL(f);});e.target.value='';};

  const submitArea=()=>{const nd=[...doneAr,curAr];setDoneAr(nd);setCurAr(null);setStep('areas');setQi(0);};

  // тФАтФА Main submit тФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФА
  const submitAll=async()=>{
    let totalMedia=0;
    Object.values(ans).forEach(aq=>Object.values(aq).forEach(a=>{totalMedia+=(a.images||[]).length+(a.videos||[]).length;}));

    setUpP({done:0,total:totalMedia,phase:'uploading'});setStep('uploading');
    let uploaded=0;
    const processed={};

    for(const ar of AREAS){
      processed[ar]={};
      for(const q of QS[ar]){
        const a=ans[ar]?.[q]||{answer:'NA',remark:'',images:[],videos:[]};
        const imgURLs=[],vidURLs=[];

        for(const img of (a.images||[])){
          try{const u=await uploadMedia(img,'image');if(u)imgURLs.push(u);}catch(e){console.warn('img upload:',e);}
          uploaded++;setUpP({done:uploaded,total:totalMedia,phase:'uploading'});
        }
        for(const vid of (a.videos||[])){
          try{const src=vid.blob||vid.file||vid.url;const u=await uploadMedia(src,'video');if(u)vidURLs.push(u);}catch(e){console.warn('vid upload:',e);}
          uploaded++;setUpP({done:uploaded,total:totalMedia,phase:'uploading'});
        }
        processed[ar][q]={answer:a.answer||'NA',remark:a.remark||'',imageURLs:imgURLs,videoURLs:vidURLs};
      }
    }

    // Calculate scores
    let pass=0,tot=0;const areaScores={};
    AREAS.forEach(ar=>{let ap=0,at=0;QS[ar].forEach(q=>{const a=processed[ar]?.[q];if(a?.answer&&a.answer!=='NA'){at++;tot++;if(a.answer==='PASS'){ap++;pass++;}}});areaScores[ar]=at>0?Math.round(ap/at*100):0;});
    const score=tot>0?Math.round(pass/tot*100):0;

    setUpP(p=>({...p,phase:'submitting'}));
    try{
      await postToSheet({site:info.site,week:parseInt(info.week),date:new Date(info.date).toLocaleDateString('en-IN'),auditor:info.auditor,score,areaScores,answers:processed});
      setUpP({done:0,total:0,phase:''});setStep('done');
    }catch(e){
      setUpP({done:0,total:0,phase:''});setErrMsg(e.message||'Submission failed');setStep('error');
    }
  };

  const qs=curAr?QS[curAr]:[];const cq=qs[qi]||'';const ca=getA(curAr,cq);
  const arOk=qs.length>0&&qs.every(q=>['PASS','FAIL','NA'].includes(getA(curAr,q).answer));

  // тФАтФА DONE тФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФА
  if(step==='done')return html`<div style=${{minHeight:'100vh',background:C.bg,display:'flex',alignItems:'center',justifyContent:'center'}}>
    <div style=${{textAlign:'center',padding:40}} class="fi">
      <div style=${{fontSize:72,color:C.pass,marginBottom:16}}>тЬУ</div>
      <div style=${{color:C.pass,fontFamily:mono,fontSize:22,fontWeight:700,marginBottom:10}}>RESPONSE RECORDED</div>
      <div style=${{color:C.muted,fontSize:14,marginBottom:6}}>Audit submitted for <b style=${{color:C.text}}>${info.site}</b></div>
      <div style=${{color:C.muted,fontFamily:mono,fontSize:13,marginBottom:32}}>Week ${info.week} ┬╖ ${info.auditor}</div>
      ${!sheetOK()?html`<div style=${{background:'#1a1200',border:`1px solid #f59e0b44`,borderRadius:8,padding:12,marginBottom:14,color:'#d97706',fontSize:12,fontFamily:mono}}>тЪа Apps Script URL not set тАФ data not sent to Sheets</div>`:''}
      ${!cloudOK()?html`<div style=${{background:'#0a1a2a',border:`1px solid #3b82f644`,borderRadius:8,padding:12,marginBottom:14,color:'#60a5fa',fontSize:12,fontFamily:mono}}>тД╣ Cloudinary not configured тАФ media not uploaded to cloud</div>`:''}
      <button onClick=${onBack} style=${{background:C.abl,color:C.accent,border:`2px solid ${C.accent}`,borderRadius:8,padding:'14px 32px',fontSize:14,fontFamily:mono,fontWeight:700,cursor:'pointer',letterSpacing:1}}>тЖР BACK TO HOME</button>
    </div>
  </div>`;

  // тФАтФА ERROR тФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФА
  if(step==='error')return html`<div style=${{minHeight:'100vh',background:C.bg,display:'flex',alignItems:'center',justifyContent:'center'}}>
    <div style=${{textAlign:'center',padding:40,maxWidth:460}}>
      <div style=${{fontSize:60,marginBottom:12}}>тЪа</div>
      <div style=${{color:C.fail,fontFamily:mono,fontSize:18,fontWeight:700,marginBottom:12}}>SUBMISSION FAILED</div>
      <div style=${{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:14,color:C.muted,fontSize:12,marginBottom:22,wordBreak:'break-all'}}>${errMsg}</div>
      <div style=${{display:'flex',gap:12,justifyContent:'center',flexWrap:'wrap'}}>
        <button onClick=${()=>setStep('areas')} style=${{background:'transparent',color:C.muted,border:`1px solid ${C.border}`,borderRadius:8,padding:'12px 22px',fontFamily:mono,fontSize:13,cursor:'pointer'}}>тЖР GO BACK</button>
        <button onClick=${submitAll} style=${{background:C.fail+'22',color:C.fail,border:`2px solid ${C.fail}`,borderRadius:8,padding:'12px 22px',fontFamily:mono,fontSize:13,fontWeight:700,cursor:'pointer'}}>тЖ║ RETRY</button>
      </div>
    </div>
  </div>`;

  // тФАтФА UPLOADING тФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФА
  if(step==='uploading')return html`<${UploadModal} done=${upP.done} total=${upP.total} phase=${upP.phase}/>`;

  // тФАтФА QUESTIONS тФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФА
  if(step==='questions'&&curAr)return html`<div style=${{minHeight:'100vh',background:C.bg}}>
    ${ann?html`<${Annotate} src=${ann.src}
      onSave=${s=>{setFld(ann.ar,ann.q,'images',[...getA(ann.ar,ann.q).images,s]);setAnn(null);}}
      onDiscard=${()=>setAnn(null)}/>`:''}
    ${cam?html`<div class="overlay"><div style=${{textAlign:'center',width:'100%',maxWidth:480}}>
      <video ref=${vRef} autoPlay playsinline style=${{width:'100%',borderRadius:8}}/>
      <canvas ref=${cRef} style=${{display:'none'}}/>
      <div style=${{display:'flex',gap:14,marginTop:14,justifyContent:'center'}}>
        <button onClick=${()=>capPhoto(curAr,cq)} style=${{background:C.pass+'33',color:C.pass,border:`2px solid ${C.pass}`,borderRadius:8,padding:'14px 28px',fontSize:14,fontFamily:mono,fontWeight:700,cursor:'pointer'}}>ЁЯУ╕ CAPTURE</button>
        <button onClick=${stopCam} style=${{background:C.fail+'33',color:C.fail,border:`2px solid ${C.fail}`,borderRadius:8,padding:'14px 20px',fontFamily:mono,fontWeight:700,cursor:'pointer'}}>тЬХ</button>
      </div>
    </div></div>`:''}
    ${vRec?html`<div class="overlay"><div style=${{textAlign:'center',width:'100%',maxWidth:480}}>
      <div style=${{display:'inline-flex',alignItems:'center',gap:8,background:C.fail+'22',border:`2px solid ${C.fail}`,borderRadius:6,padding:'6px 14px',marginBottom:10,fontFamily:mono,fontSize:12,color:C.fail}}>
        <span class="blink" style=${{width:10,height:10,borderRadius:'50%',background:C.fail,display:'inline-block'}}/>тП║ RECORDINGтАж
      </div>
      <video ref=${vvRef} autoPlay playsinline muted style=${{width:'100%',borderRadius:8}}/>
      <div style=${{display:'flex',gap:14,marginTop:14,justifyContent:'center'}}>
        <button onClick=${stopVid} style=${{background:C.fail+'33',color:C.fail,border:`2px solid ${C.fail}`,borderRadius:8,padding:'14px 28px',fontSize:14,fontFamily:mono,fontWeight:700,cursor:'pointer'}}>тП╣ STOP & SAVE</button>
      </div>
    </div></div>`:''}
    <div style=${{maxWidth:600,margin:'0 auto',padding:16}}>
      <div style=${{...card({padding:14,marginBottom:14})}}>
        <div style=${{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
          <span style=${{color:ACLR[curAr],fontFamily:mono,fontSize:11,fontWeight:700}}>${curAr}</span>
          <button onClick=${()=>{setStep('areas');setQi(0);}} style=${{background:'transparent',color:C.muted,border:'none',fontFamily:mono,fontSize:10,cursor:'pointer'}}>тЖР AREAS</button>
        </div>
        <div style=${{color:C.muted,fontSize:11,marginBottom:8}}>${info.site} ┬╖ Week ${info.week} ┬╖ ${info.auditor}</div>
        <${PBar} v=${((qi+1)/qs.length)*100} color=${ACLR[curAr]}/>
        <div style=${{color:C.muted,fontSize:10,marginTop:4,textAlign:'right',fontFamily:mono}}>Q${qi+1}/${qs.length}</div>
      </div>
      <div style=${{...card({padding:20,marginBottom:14})}} class="fi">
        <div style=${{color:C.text,fontSize:15,fontWeight:500,lineHeight:1.6,marginBottom:20,minHeight:54}}>${cq}</div>
        <div style=${{display:'flex',gap:10,marginBottom:16}}>

          <input ref=${fRef} type="file" accept="image/*" multiple style=${{display:'none'}} onChange=${e=>imgFile(e,curAr,cq)}/>
          <button onClick=${()=>startVid(curAr,cq)} style=${{background:'#06b6d422',color:'#06b6d4',border:`1px solid #06b6d4`,borderRadius:6,padding:'8px 12px',fontSize:11,fontFamily:mono,cursor:'pointer'}}>ЁЯОе RECORD</button>
          <button onClick=${()=>vfRef.current?.click()} style=${{background:'#0891b222',color:'#0891b2',border:`1px solid #0891b2`,borderRadius:6,padding:'8px 12px',fontSize:11,fontFamily:mono,cursor:'pointer'}}>ЁЯУ╣ VIDEO</button>
          <input ref=${vfRef} type="file" accept="video/*" multiple style=${{display:'none'}} onChange=${e=>vidFile(e,curAr,cq)}/>

          ${(ca.images||[]).map((img,j)=>html`<div key=${j} style=${{position:'relative'}}>

            <button onClick=${()=>setFld(curAr,cq,'images',ca.images.filter((_,k)=>k!==j))} style=${{position:'absolute',top:-5,right:-5,background:C.fail,color:'#fff',border:'none',borderRadius:'50%',width:18,height:18,cursor:'pointer',fontSize:10,display:'flex',alignItems:'center',justifyContent:'center'}}>тЬХ</button>
          </div>`)}
        </div>`:''}
        ${(ca.videos||[]).length>0?html`<div style=${{display:'flex',flexWrap:'wrap',gap:8,marginTop:10}}>
          ${(ca.videos||[]).map((v,j)=>html`<div key=${j} style=${{position:'relative',background:C.bg,border:`2px solid #06b6d444`,borderRadius:8,overflow:'hidden'}}>
            <video src=${v.url} controls style=${{width:150,height:90,objectFit:'cover',display:'block'}}/>
            <div style=${{padding:'3px 8px',fontSize:9,color:C.muted,fontFamily:mono,maxWidth:150,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>${v.name}</div>
            <button onClick=${()=>setFld(curAr,cq,'videos',ca.videos.filter((_,k)=>k!==j))} style=${{position:'absolute',top:4,right:4,background:C.fail,color:'#fff',border:'none',borderRadius:'50%',width:20,height:20,cursor:'pointer',fontSize:11,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center'}}>тЬХ</button>

      <div style=${{display:'flex',gap:10}}>
        <button onClick=${()=>setQi(i=>Math.max(0,i-1))} disabled=${qi===0} style=${{flex:1,background:'transparent',color:C.muted,border:`1px solid ${C.border}`,borderRadius:6,padding:'13px 0',fontFamily:mono,fontSize:11,cursor:qi===0?'default':'pointer',opacity:qi===0?.3:1}}>тЖР PREV</button>
        ${qi<qs.length-1
          ?html`<button onClick=${()=>setQi(i=>i+1)} disabled=${!ca.answer} style=${{flex:2,background:ca.answer?C.abl:'transparent',color:ca.answer?C.accent:C.muted,border:`2px solid ${ca.answer?C.accent:C.border}`,borderRadius:6,padding:'13px 0',fontSize:12,fontFamily:mono,fontWeight:700,cursor:ca.answer?'pointer':'default',opacity:ca.answer?1:.4}}>NEXT QUESTION тЖТ</button>`
          :html`<button onClick=${submitArea} disabled=${!arOk} style=${{flex:2,background:arOk?C.pass+'22':'transparent',color:arOk?C.pass:C.muted,border:`2px solid ${arOk?C.pass:C.border}`,borderRadius:6,padding:'13px 0',fontSize:12,fontFamily:mono,fontWeight:700,cursor:arOk?'pointer':'default',opacity:arOk?1:.4}}>тЬУ SUBMIT AREA</button>`}
      </div>
    </div>
  </div>`;

  // тФАтФА AREA SELECTION тФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФА
  if(step==='areas')return html`<div style=${{minHeight:'100vh',background:C.bg}}>
    <div style=${{maxWidth:600,margin:'0 auto',padding:16}}>
      <div style=${{...card({padding:16,marginBottom:20})}}>
        <div style=${{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div>
            <div style=${{fontFamily:mono,fontSize:16,fontWeight:700,color:C.text}}>${info.site}</div>
            <div style=${{color:C.muted,fontSize:12,marginTop:4}}>Week ${info.week} ┬╖ ${info.auditor}</div>
          </div>
          <button onClick=${onBack} style=${{background:'transparent',color:C.muted,border:'none',fontFamily:mono,fontSize:10,cursor:'pointer'}}>тЖР HOME</button>
        </div>
        <div style=${{marginTop:14}}>
          <${PBar} v=${(doneAr.length/AREAS.length)*100} color=${C.pass}/>
          <div style=${{color:C.muted,fontSize:11,marginTop:5,fontFamily:mono}}>${doneAr.length}/${AREAS.length} areas completed</div>
        </div>
      </div>
      <div style=${{color:C.muted,fontSize:10,fontFamily:mono,letterSpacing:1.5,marginBottom:12}}>SELECT AREA TO AUDIT</div>
      ${AREAS.map(ar=>{const done=doneAr.includes(ar);return html`<button key=${ar}
        onClick=${()=>{if(!done){setCurAr(ar);setStep('questions');setQi(0);}}}
        disabled=${done}
        style=${{display:'flex',justifyContent:'space-between',alignItems:'center',width:'100%',background:done?C.pass+'0f':C.card,border:`1px solid ${done?C.pass+'44':C.border}`,borderRadius:10,padding:'16px 20px',marginBottom:10,color:done?C.pass:C.text,cursor:done?'default':'pointer',textAlign:'left'}}>
        <div>
          <div style=${{fontFamily:mono,fontSize:13,fontWeight:done?700:400}}>${ar}</div>
          <div style=${{color:C.muted,fontSize:11,marginTop:4}}>${QS[ar].length} questions</div>
        </div>
        <span style=${{fontSize:20,color:done?C.pass:ACLR[ar]}}>${done?'тЬУ':'тЖТ'}</span>
      </button>`;})}

      ${doneAr.length===AREAS.length?html`<button onClick=${submitAll}
        style=${{width:'100%',background:C.pass+'22',color:C.pass,border:`2px solid ${C.pass}`,borderRadius:8,padding:'16px 0',fontSize:14,fontFamily:mono,fontWeight:700,cursor:'pointer',marginTop:12,letterSpacing:.8}}>
        тЬУ SUBMIT ALL тАФ RECORD RESPONSE
      </button>`:''}
    </div>
  </div>`;

  // тФАтФА INFO FORM тФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФА
  return html`<div style=${{minHeight:'100vh',background:C.bg}}>
    <div style=${{maxWidth:500,margin:'0 auto',padding:16}}>
      <div style=${{textAlign:'center',padding:'28px 0 34px'}}>
        <div style=${{color:C.accent,fontFamily:mono,fontSize:10,letterSpacing:3}}>AUDIT ENTRY</div>
        <h1 style=${{color:C.text,fontFamily:mono,fontSize:22,fontWeight:700,marginTop:6}}>FILL SCORECARD</h1>
      </div>
      ${[
        {label:'SITE NAME',key:'site',type:'select'},
        {label:'DATE',key:'date',type:'date'},
        {label:'WEEK NUMBER (AUTO)',key:'week',type:'number',ro:true},
        {label:'AUDITOR NAME',key:'auditor',type:'text',ph:'Enter full name'},
      ].map(f=>html`
        <div key=${f.key} style=${{marginBottom:18}}>
          <label style=${{color:C.muted,fontSize:10,fontFamily:mono,letterSpacing:1.5,display:'block',marginBottom:8}}>${f.label}</label>
          ${f.type==='select'
            ?html`<select value=${info[f.key]} onChange=${e=>setInfo(p=>({...p,[f.key]:e.target.value}))} style=${{width:'100%',background:C.card,color:C.text,border:`1px solid ${C.border}`,borderRadius:8,padding:'13px 14px',fontSize:14,cursor:'pointer'}}>
              ${SITES.map(s=>html`<option key=${s}>${s}</option>`)}</select>`
            :html`<input type=${f.type} readOnly=${!!f.ro} value=${info[f.key]} placeholder=${f.ph||''}
              onInput=${e=>{if(f.key==='date'){const d=new Date(e.target.value);setInfo(p=>({...p,date:e.target.value,week:isNaN(d.getTime())?p.week:weekNum(d)}));}else setInfo(p=>({...p,[f.key]:e.target.value}));}}
              style=${{width:'100%',background:f.ro?'#0a0d12':C.card,color:f.ro?C.muted:C.text,border:`1px solid ${C.border}`,borderRadius:8,padding:'13px 14px',fontSize:14}}/>`}
        </div>`)}
      <button onClick=${()=>info.auditor.trim()?setStep('areas'):alert('Please enter auditor name')}
        style=${{width:'100%',background:C.abl,color:C.accent,border:`2px solid ${C.accent}`,borderRadius:8,padding:'16px 0',fontSize:15,fontFamily:mono,fontWeight:700,cursor:'pointer',marginTop:8,letterSpacing:1}}>

      <button onClick=${onBack} style=${{width:'100%',background:'transparent',color:C.muted,border:`1px solid ${C.border}`,borderRadius:8,padding:'13px 0',fontFamily:mono,fontSize:13,cursor:'pointer',marginTop:10}}>тЖР BACK TO HOME</button>

// тХРтХРтХР VIEW DASHBOARD тХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХР
function ViewDashboard({onBack}){
  const[records,setRecords]=useState([]);
  const[loading,setLoading]=useState(true);
  const[error,setError]=useState('');
  const[expanded,setExpanded]=useState(null);
  const[fSite,setFSite]=useState('ALL');
  const[fWeek,setFWeek]=useState('ALL');
  const[search,setSearch]=useState('');
  const[lightbox,setLightbox]=useState(null);

  const load=useCallback(async()=>{
    setLoading(true);setError('');
    try{const r=await fetchSheet();if(r.ok){setRecords(r.records||[]);}else setError(r.error||'Fetch failed');}
    catch(e){setError('Network error: '+e.message);}
    setLoading(false);
  },[]);
  useEffect(()=>{load();},[]);

  const siteOpts=useMemo(()=>['ALL',...[...new Set(records.map(r=>String(r['Site']||'')))].filter(Boolean).sort()],[records]);
  const weekOpts=useMemo(()=>['ALL',...[...new Set(records.map(r=>String(r['Week_No']||'')))].filter(Boolean).sort((a,b)=>+a-+b)],[records]);

  const filtered=useMemo(()=>records.filter(r=>{
    if(fSite!=='ALL'&&String(r['Site'])!==fSite)return false;
    if(fWeek!=='ALL'&&String(r['Week_No'])!==fWeek)return false;
    if(search){const q=search.toLowerCase();if(!(String(r['Site'])+String(r['Auditor'])+String(r['Submission_ID'])).toLowerCase().includes(q))return false;}
    return true;
  }),[records,fSite,fWeek,search]);

  const stats=useMemo(()=>{
    if(!filtered.length)return{total:0,avg:0,good:0,bad:0};
    const avg=Math.round(filtered.reduce((a,r)=>a+Number(r['Overall_Score_%']||0),0)/filtered.length);
    return{total:filtered.length,avg,good:filtered.filter(r=>Number(r['Overall_Score_%']||0)>=80).length,bad:filtered.filter(r=>Number(r['Overall_Score_%']||0)<60).length};
  },[filtered]);

  const parseAns=r=>{try{const v=r['Answers_JSON'];return typeof v==='string'?JSON.parse(v):(v||{});}catch{return{};}};
  const parseURLs=raw=>raw?String(raw).split('\n').filter(u=>u.trim().startsWith('http')):[];

  const AREA_SCORE_KEYS={
    'INBOUND OUTBOUND STAGING':'IOS_Score_%','BBB AREA':'BBB_Score_%',
    'PRIMARY SORTING AREA':'PSA_Score_%','SECONDARY SORTING AREA':'SSA_Score_%',
    'EXCEPTION AREA':'EXC_Score_%','VOLUMETRIC HANDLING':'VOL_Score_%'
  };

  return html`<div style=${{minHeight:'100vh',background:C.bg}}>
    ${lightbox?html`<${Lightbox} items=${lightbox.items} idx=${lightbox.idx} onClose=${()=>setLightbox(null)}/>`:''}

    ${/* тФАтФА Header тФАтФА */null}
    <div style=${{background:C.card,borderBottom:`1px solid ${C.border}`,padding:'14px 24px',display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:12,position:'sticky',top:0,zIndex:50}}>
      <div>
        <div style=${{color:C.accent,fontFamily:mono,fontSize:9,letterSpacing:2.5,marginBottom:3}}>LOGISTICS OPERATIONS MANAGEMENT</div>
        <div style=${{color:C.text,fontFamily:mono,fontSize:18,fontWeight:700}}>VIEW DASHBOARD</div>
      </div>
      <div style=${{display:'flex',gap:10,flexWrap:'wrap'}}>
        <button onClick=${load} disabled=${loading}
          style=${{background:C.abl,color:C.accent,border:`1px solid ${C.accent}44`,borderRadius:8,padding:'9px 18px',fontFamily:mono,fontSize:11,fontWeight:600,cursor:'pointer',letterSpacing:.8}}>
          ${loading?html`<span class="spin">тЖ╗</span> SYNCINGтАж`:'тЖ╗ REFRESH'}
        </button>
        <button onClick=${onBack} style=${{background:'transparent',color:C.muted,border:`1px solid ${C.border}`,borderRadius:8,padding:'9px 18px',fontFamily:mono,fontSize:11,cursor:'pointer',letterSpacing:.8}}>тЖР HOME</button>
      </div>
    </div>

    ${!sheetOK()?html`<div style=${{background:'#1a1200',borderBottom:`1px solid #f59e0b33`,padding:'8px 24px',fontFamily:mono,fontSize:11,color:'#d97706'}}>
      тЪа SHEET_URL not configured тАФ set your Apps Script Web App URL in the config section at the top of this file.
    </div>`:''}

    <div style=${{maxWidth:1400,margin:'0 auto',padding:'24px 20px'}}>

      ${/* тФАтФА Stats cards тФАтФА */null}
      <div style=${{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(160px,1fr))',gap:12,marginBottom:24}}>
        ${[{l:'TOTAL SUBMISSIONS',v:stats.total,c:C.accent},{l:'AVERAGE SCORE',v:stats.total?stats.avg+'%':'тАФ',c:stats.total?sc(stats.avg):C.muted},{l:'тЙе 80% GOOD',v:stats.good,c:C.pass},{l:'< 60% ACTION NEEDED',v:stats.bad,c:C.fail}].map(({l,v,c})=>html`
          <div key=${l} style=${{...card({padding:16})}}>
            <div style=${{color:C.muted,fontSize:9,fontFamily:mono,letterSpacing:1,marginBottom:6}}>${l}</div>
            <div style=${{color:c,fontFamily:mono,fontSize:26,fontWeight:700}}>${v}</div>
          </div>`)}
      </div>

      ${/* тФАтФА Filters тФАтФА */null}
      <div style=${{display:'flex',gap:10,marginBottom:20,flexWrap:'wrap',alignItems:'center'}}>
        <input placeholder="Search site / auditor / IDтАж" value=${search} onInput=${e=>setSearch(e.target.value)}
          style=${{background:C.card,color:C.text,border:`1px solid ${C.border}`,borderRadius:8,padding:'10px 14px',fontSize:13,flex:1,minWidth:180,outline:'none'}}/>
        <select value=${fSite} onChange=${e=>setFSite(e.target.value)} style=${{background:C.card,color:C.text,border:`1px solid ${C.border}`,borderRadius:8,padding:'10px 14px',fontSize:13,cursor:'pointer'}}>
          ${siteOpts.map(s=>html`<option key=${s} value=${s}>${s==='ALL'?'All Sites':s}</option>`)}
        </select>
        <select value=${fWeek} onChange=${e=>setFWeek(e.target.value)} style=${{background:C.card,color:C.text,border:`1px solid ${C.border}`,borderRadius:8,padding:'10px 14px',fontSize:13,cursor:'pointer'}}>
          ${weekOpts.map(w=>html`<option key=${w} value=${w}>${w==='ALL'?'All Weeks':'Week '+w}</option>`)}
        </select>
        ${(fSite!=='ALL'||fWeek!=='ALL'||search)?html`<button onClick=${()=>{setFSite('ALL');setFWeek('ALL');setSearch('');}} style=${{background:C.fail+'22',color:C.fail,border:`1px solid ${C.fail}44`,borderRadius:8,padding:'10px 14px',fontFamily:mono,fontSize:11,cursor:'pointer'}}>тЬХ CLEAR</button>`:''}
      </div>

      ${/* тФАтФА Loading / Error / Empty тФАтФА */null}
      ${loading?html`<div style=${{display:'flex',alignItems:'center',justifyContent:'center',gap:12,padding:60,color:C.muted,fontFamily:mono,fontSize:13}}>
        <span class="spin" style=${{fontSize:22}}>тЖ╗</span> Loading from Google SheetsтАж
      </div>`:''}
      ${!loading&&error?html`<div style=${{...card({padding:40,textAlign:'center'})}}>
        <div style=${{fontSize:36,marginBottom:12,opacity:.3}}>тЪа</div>
        <div style=${{color:C.fail,fontFamily:mono,fontSize:13,fontWeight:700,marginBottom:8}}>FETCH ERROR</div>
        <div style=${{color:C.muted,fontSize:12,marginBottom:20}}>${error}</div>
        <button onClick=${load} style=${{background:C.abl,color:C.accent,border:`1px solid ${C.accent}`,borderRadius:8,padding:'10px 24px',fontFamily:mono,fontSize:12,cursor:'pointer'}}>тЖ║ RETRY</button>
      </div>`:''}
      ${!loading&&!error&&filtered.length===0?html`<div style=${{...card({padding:60,textAlign:'center'})}}>
        <div style=${{fontSize:40,opacity:.15,marginBottom:14}}>ЁЯУЛ</div>
        <div style=${{color:C.muted,fontFamily:mono,fontSize:13,fontWeight:600,letterSpacing:1}}>NO RECORDS FOUND</div>
        <div style=${{color:C.muted,fontSize:12,marginTop:8}}>${records.length?'Try adjusting filters.':'No submissions yet тАФ fill a scorecard to see data here.'}</div>
      </div>`:''}

      ${/* тФАтФА Table тФАтФА */null}
      ${!loading&&!error&&filtered.length>0?html`<div style=${{overflowX:'auto',borderRadius:8,border:`1px solid ${C.border}`}}>
        <table class="vdt">
          <thead><tr>
            <th style=${{width:40}}></th>
            <th>SUBMISSION ID</th>
            <th>TIMESTAMP</th>
            <th>SITE</th>
            <th>WEEK</th>
            <th>DATE</th>
            <th>AUDITOR</th>
            <th>SCORE</th>
            <th>PASS</th>
            <th>FAIL</th>
            <th>NA</th>
            <th>IMAGES</th>
            <th>VIDEOS</th>
          </tr></thead>
          <tbody>
            ${filtered.map((rec,idx)=>{
              const score=Number(rec['Overall_Score_%']||0);
              const imgs=parseURLs(rec['Image_URLs']);
              const vids=parseURLs(rec['Video_URLs']);
              const isExp=expanded===idx;
              return html`
                <tr key=${idx}>
                  <td>
                    <button onClick=${()=>setExpanded(isExp?null:idx)}
                      style=${{background:isExp?C.abl:'transparent',color:isExp?C.accent:C.muted,border:`1px solid ${isExp?C.accent:C.border}`,borderRadius:4,padding:'4px 10px',fontFamily:mono,fontSize:11,cursor:'pointer',transition:'all .15s'}}>
                      ${isExp?'тЦ▓':'тЦ╝'}
                    </button>
                  </td>
                  <td style=${{fontFamily:mono,fontSize:10,color:C.muted}}>${String(rec['Submission_ID']||'тАФ')}</td>
                  <td style=${{fontFamily:mono,fontSize:10,color:C.muted,whiteSpace:'nowrap'}}>${String(rec['Timestamp_IST']||'тАФ').slice(0,16)}</td>
                  <td style=${{fontFamily:mono,fontSize:12,fontWeight:600,color:C.text}}>${String(rec['Site']||'тАФ')}</td>
                  <td style=${{fontFamily:mono,fontSize:12,color:C.accent,textAlign:'center'}}>W${String(rec['Week_No']||'?').padStart(2,'0')}</td>
                  <td style=${{fontSize:12,color:C.muted,whiteSpace:'nowrap'}}>${String(rec['Audit_Date']||'тАФ')}</td>
                  <td style=${{fontSize:12,color:C.text}}>${String(rec['Auditor']||'тАФ')}</td>
                  <td style=${{textAlign:'center'}}>
                    <span style=${{background:sc(score)+'22',color:sc(score),border:`1px solid ${sc(score)}44`,borderRadius:4,padding:'3px 10px',fontFamily:mono,fontSize:13,fontWeight:700}}>${score}%</span>
                  </td>
                  <td style=${{fontFamily:mono,fontSize:12,color:C.pass,textAlign:'center',fontWeight:700}}>${rec['Pass_Count']||0}</td>
                  <td style=${{fontFamily:mono,fontSize:12,color:C.fail,textAlign:'center',fontWeight:700}}>${rec['Fail_Count']||0}</td>
                  <td style=${{fontFamily:mono,fontSize:12,color:C.na,textAlign:'center'}}>${rec['NA_Count']||0}</td>
                  <td>
                    ${imgs.length>0?html`<div style=${{display:'flex',gap:4,flexWrap:'wrap'}}>
                      ${imgs.slice(0,3).map((url,j)=>html`<a key=${j} href=${url} target="_blank" class="mlink" title=${url}>ЁЯЦ╝ ${j+1}</a>`)}
                      ${imgs.length>3?html`<span style=${{color:C.muted,fontSize:10,fontFamily:mono,alignSelf:'center'}}>+${imgs.length-3}</span>`:''}
                    </div>`:html`<span style=${{color:C.border}}>тАФ</span>`}
                  </td>
                  <td>
                    ${vids.length>0?html`<div style=${{display:'flex',gap:4,flexWrap:'wrap'}}>
                      ${vids.slice(0,3).map((url,j)=>html`<a key=${j} href=${url} target="_blank" download class="mlink" title=${url}>ЁЯОе ${j+1}</a>`)}
                      ${vids.length>3?html`<span style=${{color:C.muted,fontSize:10,fontFamily:mono,alignSelf:'center'}}>+${vids.length-3}</span>`:''}
                    </div>`:html`<span style=${{color:C.border}}>тАФ</span>`}
                  </td>
                </tr>
                ${isExp?html`<tr key=${'x'+idx}>
                  <td colspan="13" style=${{padding:0,background:'#0a0f16'}}>
                    <div style=${{padding:'20px 24px'}} class="fi">
                      <div style=${{color:C.accent,fontFamily:mono,fontSize:10,letterSpacing:1.5,marginBottom:16}}>DETAILED ANSWERS тАФ ${rec['Site']} ┬╖ Week ${rec['Week_No']}</div>

                      ${/* Area score pills */null}
                      <div style=${{display:'flex',gap:8,flexWrap:'wrap',marginBottom:20}}>
                        ${AREAS.map(area=>html`<div key=${area} style=${{background:ACLR[area]+'18',border:`1px solid ${ACLR[area]}44`,borderRadius:6,padding:'8px 12px',textAlign:'center',minWidth:82}}>
                          <div style=${{fontSize:8,color:ACLR[area],fontFamily:mono,fontWeight:700,marginBottom:4}}>${ASHORT[area]}</div>
                          <div style=${{fontSize:18,fontFamily:mono,fontWeight:700,color:ACLR[area]}}>${Number(rec[AREA_SCORE_KEYS[area]]||0)}%</div>
                        </div>`)}
                      </div>

                      ${/* Per-area Q&A */null}
                      ${Object.entries(parseAns(rec)).map(([area,qs])=>html`
                        <div key=${area} style=${{marginBottom:20}}>
                          <div style=${{color:ACLR[area]||C.muted,fontFamily:mono,fontSize:11,fontWeight:700,letterSpacing:.8,padding:'6px 10px',background:(ACLR[area]||C.muted)+'11',borderLeft:`3px solid ${ACLR[area]||C.muted}`,borderRadius:'0 4px 4px 0',marginBottom:8}}>${area}</div>
                          ${Object.entries(qs||{}).map(([q,a])=>{
                            const ac=a.answer==='PASS'?C.pass:a.answer==='FAIL'?C.fail:C.na;
                            const iUrls=a.imageURLs||[];const vUrls=a.videoURLs||[];
                            return html`<div key=${q} style=${{display:'flex',gap:12,padding:'8px 0',borderBottom:`1px solid ${C.border}18`,alignItems:'flex-start',flexWrap:'wrap'}}>
                              <span style=${{background:ac+'22',color:ac,border:`1px solid ${ac}44`,borderRadius:4,padding:'2px 8px',fontFamily:mono,fontSize:11,fontWeight:700,flexShrink:0,marginTop:2}}>${a.answer||'NA'}</span>
                              <div style=${{flex:1,minWidth:160}}>
                                <div style=${{color:C.text,fontSize:12,lineHeight:1.5}}>${q}</div>
                                ${a.remark?html`<div style=${{color:'#d97706',fontSize:11,marginTop:3,fontStyle:'italic'}}>тЖ│ ${a.remark}</div>`:''}
                                ${(iUrls.length>0||vUrls.length>0)?html`<div style=${{display:'flex',gap:6,flexWrap:'wrap',marginTop:6}}>
                                  ${iUrls.map((url,j)=>html`<a key=${'i'+j} href=${url} target="_blank" class="mlink">ЁЯЦ╝ Image ${j+1}</a>`)}
                                  ${vUrls.map((url,j)=>html`<a key=${'v'+j} href=${url} target="_blank" download class="mlink">ЁЯОе Video ${j+1}</a>`)}
                                </div>`:''}
                              </div>
                            </div>`;
                          })}
                        </div>`)}

                      ${/* Media gallery */null}
                      ${imgs.length>0?html`<div style=${{marginTop:16,padding:16,background:C.card,borderRadius:8,border:`1px solid ${C.border}`}}>
                        <div style=${{color:C.muted,fontFamily:mono,fontSize:10,letterSpacing:1,marginBottom:12}}>IMAGE GALLERY (${imgs.length})</div>
                        <div style=${{display:'flex',flexWrap:'wrap',gap:8}}>
                          ${imgs.map((url,j)=>html`<div key=${j}
                            onClick=${()=>setLightbox({items:imgs.map(src=>({type:'image',src})),idx:j})}
                            style=${{width:80,height:80,borderRadius:6,overflow:'hidden',cursor:'pointer',border:`2px solid ${C.border}`,transition:'border-color .15s'}}
                            onMouseEnter=${e=>e.currentTarget.style.borderColor=C.accent}
                            onMouseLeave=${e=>e.currentTarget.style.borderColor=C.border}>
                            <img src=${url} style=${{width:'100%',height:'100%',objectFit:'cover'}}/>
                          </div>`)}
                        </div>
                      </div>`:''}

                      ${vids.length>0?html`<div style=${{marginTop:12,padding:16,background:C.card,borderRadius:8,border:`1px solid ${C.border}`}}>
                        <div style=${{color:C.muted,fontFamily:mono,fontSize:10,letterSpacing:1,marginBottom:12}}>VIDEO DOWNLOADS (${vids.length})</div>
                        <div style=${{display:'flex',gap:8,flexWrap:'wrap'}}>
                          ${vids.map((url,j)=>html`<a key=${j} href=${url} target="_blank" download
                            style=${{display:'flex',alignItems:'center',gap:6,background:'#0a2030',border:`1px solid #06b6d444`,borderRadius:6,padding:'9px 16px',color:'#06b6d4',textDecoration:'none',fontFamily:mono,fontSize:12,transition:'all .15s'}}
                            onMouseEnter=${e=>{e.currentTarget.style.background='#06b6d422';e.currentTarget.style.borderColor='#06b6d4';}}
                            onMouseLeave=${e=>{e.currentTarget.style.background='#0a2030';e.currentTarget.style.borderColor='#06b6d444';}}>
                            ЁЯОе Download Video ${j+1}
                          </a>`)}
                        </div>
                      </div>`:''}
                    </div>
                  </td>
                </tr>`:''}`;
            })}
          </tbody>
        </table>
      </div>`:''}

      ${!loading&&!error&&filtered.length>0?html`<div style=${{color:C.muted,fontFamily:mono,fontSize:11,textAlign:'center',marginTop:12}}>
        Showing ${filtered.length} of ${records.length} record${records.length!==1?'s':''}
      </div>`:''}

    </div>
  </div>`;
}

// тХРтХРтХР APP тХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХР
function App(){
  const[page,setPage]=useState('landing'); // landing | login | fill | view
  if(page==='landing')return html`<${Landing} onFill=${()=>setPage('login')} onView=${()=>setPage('view')}/>`;
  if(page==='login') return html`<${Login}    onOk=${()=>setPage('fill')} onBack=${()=>setPage('landing')}/>`;
  if(page==='fill')  return html`<${FillScorecard} onBack=${()=>setPage('landing')}/>`;
  if(page==='view')  return html`<${ViewDashboard} onBack=${()=>setPage('landing')}/>`;
  return null;
}

render(html`<${App}/>`,document.getElementById('app'));
</script>
