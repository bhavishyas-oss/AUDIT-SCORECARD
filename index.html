        </div>
      </div>`:''}
      ${sub==='improvement'?html`<div class="card" style=${{padding:18}} class="fi">
        <${SH} c=${C.fail}>Improvement Areas — ${fails.length} Failed Question${fails.length!==1?'s':''}</${SH}>
        ${fails.length===0?html`<div style=${{textAlign:'center',padding:36}}><div style=${{fontSize:40,marginBottom:12}}>🎉</div><div style=${{color:C.pass,fontFamily:mono,fontSize:13,fontWeight:700}}>EXCELLENT — NO FAILURES RECORDED</div></div>`:fails.map((f,i)=>html`
          <div key=${i} style=${{background:C.fail+'06',border:`1px solid ${C.fail}18`,borderRadius:8,padding:14,marginBottom:10}}>
            <div style=${{display:'flex',gap:10,alignItems:'flex-start',flexWrap:'wrap'}}>
              <div style=${{flex:1,minWidth:180}}>
                <div style=${{display:'flex',gap:8,alignItems:'flex-start',marginBottom:f.remark?6:0}}>
                  <span style=${{color:C.fail,fontSize:16,lineHeight:1.3,flexShrink:0,marginTop:1}}>✗</span>
                  <div><div style=${{color:'#fca5a5',fontFamily:mono,fontSize:11,fontWeight:700,lineHeight:1.5}}>${f.q}</div><div style=${{color:C.muted,fontSize:9,marginTop:2,fontFamily:mono,letterSpacing:.4}}>${f.area}</div></div>
                </div>
                ${f.remark?html`<div style=${{marginLeft:24,marginTop:4,paddingLeft:10,borderLeft:`2px solid #fbbf2466`,color:'#fbbf24',fontSize:11,lineHeight:1.5,fontStyle:'italic'}}><span style=${{color:C.muted,fontSize:9,fontFamily:mono,fontStyle:'normal',display:'block',marginBottom:1,letterSpacing:.4}}>REMARK</span>${f.remark}</div>`:''}
              </div>
              ${(f.imgs.length>0||f.vids.length>0)?html`<div style=${{display:'flex',gap:6,flexWrap:'wrap',flexShrink:0,alignItems:'flex-start'}}>
                ${f.imgs.map((u,j)=>html`<img key=${j} src=${u} onClick=${()=>setLb({items:[...f.imgs.map(s=>({type:'image',src:s})),...f.vids.map(s=>({type:'video',url:s}))],idx:j})} style=${{width:72,height:72,objectFit:'cover',borderRadius:6,cursor:'pointer',border:`2px solid ${C.fail}44`,transition:'all .15s'}} onMouseEnter=${e=>{e.currentTarget.style.borderColor=C.fail;e.currentTarget.style.transform='scale(1.05)';}} onMouseLeave=${e=>{e.currentTarget.style.borderColor=C.fail+'44';e.currentTarget.style.transform='scale(1)';}} onError=${e=>e.currentTarget.style.display='none'}/>`)}
                ${f.vids.map((u,j)=>html`<div key=${j} onClick=${()=>setLb({items:[...f.imgs.map(s=>({type:'image',src:s})),...f.vids.map(s=>({type:'video',url:s}))],idx:f.imgs.length+j})} style=${{width:72,height:72,background:'#0a2030',border:`2px solid #06b6d444`,borderRadius:6,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',cursor:'pointer',fontSize:22,transition:'border-color .15s'}} onMouseEnter=${e=>e.currentTarget.style.borderColor='#06b6d4'} onMouseLeave=${e=>e.currentTarget.style.borderColor='#06b6d444'}>🎥<span style=${{color:C.cyan,fontSize:8,fontFamily:mono,marginTop:2}}>PLAY</span></div>`)}
              </div>`:''}
            </div>
          </div>`)}
      </div>`:''}
      ${sub==='snaps'?html`<div class="card" style=${{padding:18}} class="fi">
        <${SH}>Snap Collated — All Media</${SH}>
        ${allMedia.length===0?html`<${Empty} icon="📷" title="NO MEDIA RECORDED" sub="Images/videos will appear here once uploaded."/>`:html`
          ${AREAS.map(area=>{const aMedia=allMedia.filter(m=>m.area===area);if(!aMedia.length)return null;
            return html`<div key=${area} style=${{marginBottom:20}}>
              <div style=${{color:ACLR[area],fontFamily:mono,fontSize:10,fontWeight:700,marginBottom:10,padding:'5px 12px',background:ACLR[area]+'10',borderLeft:`3px solid ${ACLR[area]}`,borderRadius:'0 5px 5px 0',letterSpacing:.8}}>${area}</div>
              <div style=${{display:'flex',flexWrap:'wrap',gap:8}}>
                ${aMedia.map((m,j)=>m.type==='image'
                  ?html`<div key=${j} style=${{position:'relative',cursor:'pointer'}} onClick=${()=>setLb({items:allMedia,idx:allMedia.indexOf(m)})}><img src=${m.src} style=${{width:84,height:84,objectFit:'cover',borderRadius:6,border:`2px solid ${C.border}`,display:'block',transition:'all .15s'}} onMouseEnter=${e=>{e.currentTarget.style.borderColor=ACLR[area];e.currentTarget.style.transform='scale(1.05)';}} onMouseLeave=${e=>{e.currentTarget.style.borderColor=C.border;e.currentTarget.style.transform='scale(1)';}} onError=${e=>e.currentTarget.style.display='none'}/></div>`
                  :html`<div key=${j} style=${{width:84,height:84,background:'#0a2030',border:`2px solid #06b6d444`,borderRadius:6,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',fontSize:28,cursor:'pointer',gap:3,transition:'border-color .15s'}} onClick=${()=>setLb({items:allMedia,idx:allMedia.indexOf(m)})} onMouseEnter=${e=>e.currentTarget.style.borderColor='#06b6d4'} onMouseLeave=${e=>e.currentTarget.style.borderColor='#06b6d444'}>🎥<span style=${{color:C.cyan,fontSize:8,fontFamily:mono}}>PLAY</span></div>`)}
              </div>
            </div>`;})}`}
      </div>`:''}
      ${sub==='checklist'?html`<div class="card" style=${{padding:18}} class="fi">
        <${SH}>Full Checklist — ${site} (${fmtW(week)}${dates.length>1?' · '+selDate:''})</${SH}>
        ${AREAS.map(area=>{const qs=answers[area]||{};
          return html`<div key=${area} style=${{marginBottom:22}}>
            <div style=${{color:ACLR[area],fontFamily:mono,fontSize:10,fontWeight:700,padding:'6px 12px',background:ACLR[area]+'10',borderLeft:`3px solid ${ACLR[area]}`,borderRadius:'0 5px 5px 0',marginBottom:8,letterSpacing:.8}}>${area}</div>
            ${(QS[area]||[]).map((q,i)=>{const a=qs[q]||{};const ac=a.answer==='PASS'?C.pass:a.answer==='FAIL'?C.fail:C.na;
              return html`<div key=${i} style=${{padding:'10px 8px',borderBottom:`1px solid ${C.border}18`,background:a.answer==='FAIL'?C.fail+'06':'transparent',borderRadius:4,marginBottom:2}}>
                <div style=${{display:'flex',gap:10,alignItems:'flex-start',marginBottom:a.remark?6:0}}>
                  <span style=${{background:ac+'20',color:ac,border:`1px solid ${ac}44`,borderRadius:3,padding:'2px 8px',fontFamily:mono,fontSize:9,fontWeight:700,flexShrink:0,marginTop:2,minWidth:44,textAlign:'center'}}>${a.answer||'—'}</span>
                  <div style=${{color:a.answer==='FAIL'?'#fca5a5':C.text,fontSize:12,lineHeight:1.5,flex:1}}>${q}</div>
                </div>
                ${a.remark?html`<div style=${{marginLeft:62,color:'#fbbf24',fontSize:11,fontStyle:'italic',lineHeight:1.5,paddingLeft:8,borderLeft:'2px solid #fbbf2433'}}>↳ ${a.remark}</div>`:''}
              </div>`;
            })}
          </div>`;
        })}
      </div>`:''}
    </div>`:''}
  </div>`;
}

// ════════════════════════════════════════════════════════
//  TAB 3: WEEKLY PERFORMANCE
// ════════════════════════════════════════════════════════
function WeeklyPerfTab({records,site,setSite,activeWeeks}){
  const[ct,setCt]=useState('line');const[lb,setLb]=useState(null);
  const wkLabels=activeWeeks.map(fmtW);
  // Network avg per week: Step 1 = per-DC avg, Step 2 = network avg of DC avgs
  const netByWeek=useMemo(()=>activeWeeks.map(wk=>{
    const dcAvgs=dcAveragesForWeek(records,wk);
    return dcAvgs.length?Math.round(dcAvgs.reduce((s,x)=>s+x.score,0)/dcAvgs.length):null;
  }),[records,activeWeeks]);
  // DC per-week: average if multiple entries
  const dcByWeek=useMemo(()=>activeWeeks.map(wk=>{
    const recs=records.filter(r=>String(r['Site'])===site&&Number(r['Week_No'])===wk);
    if(!recs.length)return null;
    return Math.round(recs.map(r=>Number(r['Overall_Score_%'])||0).reduce((a,b)=>a+b,0)/recs.length);
  }),[records,site,activeWeeks]);
  const netData={labels:wkLabels,datasets:[{label:'Network Avg %',data:netByWeek,borderColor:C.accent,backgroundColor:ct==='bar'?C.accent+'99':'rgba(245,158,11,.15)',borderWidth:2.5,tension:.35,fill:ct==='line',pointBackgroundColor:C.accent,pointRadius:5,pointHoverRadius:8,spanGaps:false}]};
  const netOpts={responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},datalabels:{display:ctx=>netByWeek[ctx.dataIndex]!==null,color:C.accent,font:{size:10,weight:'bold',family:mono},formatter:v=>v+'%',anchor:'end',align:'top',offset:4}},scales:{x:{ticks:{color:C.muted},grid:{color:C.border+'33'}},y:{min:0,max:105,ticks:{color:C.muted,callback:v=>v>100?'':v+'%'},grid:{color:C.border+'33'}}}};
  const areaByWeek=AREAS.map(area=>({label:ASHORT[area],data:activeWeeks.map(wk=>{
    const recs=records.filter(r=>String(r['Site'])===site&&Number(r['Week_No'])===wk);
    if(!recs.length)return null;
    return Math.round(recs.map(r=>Number(r[ACOL[area]])||0).reduce((a,b)=>a+b,0)/recs.length);
  }),borderColor:ACLR[area],backgroundColor:'transparent',borderWidth:1.5,tension:.35,borderDash:[4,4],pointRadius:3,spanGaps:false}));
  const dcData={labels:wkLabels,datasets:[{label:`${site} Overall`,data:dcByWeek,borderColor:C.blue,backgroundColor:C.blue+'25',borderWidth:2.5,tension:.35,fill:true,pointBackgroundColor:C.blue,pointRadius:5,spanGaps:false},...areaByWeek]};
  const dcOpts={responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{color:C.muted,font:{size:10,family:mono},boxWidth:12,padding:12,usePointStyle:true}},datalabels:{display:false}},scales:{x:{ticks:{color:C.muted},grid:{color:C.border+'33'}},y:{min:0,max:105,ticks:{color:C.muted,callback:v=>v>100?'':v+'%'},grid:{color:C.border+'33'}}}};
  const tableData=AREAS.map(area=>({area,short:ASHORT[area],color:ACLR[area],weeks:activeWeeks.map(wk=>{
    const recs=records.filter(r=>String(r['Site'])===site&&Number(r['Week_No'])===wk);
    if(!recs.length)return null;
    return Math.round(recs.map(r=>Number(r[ACOL[area]])||0).reduce((a,b)=>a+b,0)/recs.length);
  })}));
  const downloadReport=()=>{
    const allRecs=records.filter(r=>String(r['Site'])===site).sort((a,b)=>Number(a['Week_No'])-Number(b['Week_No']));
    const fails={};allRecs.forEach(rec=>{const ans=parseAns(rec);AREAS.forEach(a=>{Object.entries(ans[a]||{}).forEach(([q,av])=>{if(av?.answer==='FAIL'){if(!fails[q])fails[q]={q,count:0,area:a};fails[q].count++;}});});});
    const topFails=Object.values(fails).sort((a,b)=>b.count-a.count).slice(0,12);
    const allImgs=[];allRecs.forEach(rec=>{const ans=parseAns(rec);AREAS.forEach(a=>{Object.values(ans[a]||{}).forEach(v=>{(v?.imageURLs||[]).forEach(u=>{if(u&&(u.startsWith('http')||u.startsWith('data:')))allImgs.push({url:u,wk:rec['Week_No'],area:a});});});});});
    const colBg=v=>v>=80?'#d1fae5':v>=60?'#fef3c7':'#fee2e2';const colFg=v=>v>=80?'#065f46':v>=60?'#92400e':'#991b1b';
    const w=window.open('','_blank');if(!w)return alert('Popup blocked');
    let body=`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>DC Report — ${site}</title><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:Arial,sans-serif;font-size:12px;background:#f8fafc;color:#1e293b;-webkit-print-color-adjust:exact}.page{max-width:1000px;margin:0 auto;padding:28px}.hdr{background:linear-gradient(135deg,#1e293b,#334155);color:#fff;padding:20px 24px;border-radius:8px;margin-bottom:20px}h1{font-size:20px;font-weight:800;margin-bottom:4px}h2{font-size:13px;font-weight:700;background:#f1f5f9;padding:8px 14px;border-left:4px solid #f59e0b;border-radius:0 4px 4px 0;margin:22px 0 10px}table{width:100%;border-collapse:collapse;font-size:11px;margin-bottom:14px}th{background:#1e293b;color:#f8fafc;padding:6px 10px;text-align:center}td{border:1px solid #e2e8f0;padding:6px 10px;text-align:center}.g{background:${colBg(85)};color:${colFg(85)};font-weight:700}.a{background:${colBg(70)};color:${colFg(70)};font-weight:700}.r{background:${colBg(50)};color:${colFg(50)};font-weight:700}.left{text-align:left}.img-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}.img-grid img{width:130px;height:90px;object-fit:cover;border-radius:4px}footer{margin-top:36px;border-top:1px solid #e2e8f0;padding-top:12px;color:#94a3b8;text-align:center;font-size:10px}</style></head><body><div class="page"><div class="hdr"><h1>📋 ${site} — DC Performance Report</h1><p style="color:rgba(255,255,255,.7);font-size:11px;margin-top:4px">Generated: ${new Date().toLocaleString('en-IN')}</p></div>`;
    body+=`<h2>WEEK-BY-WEEK PERFORMANCE</h2><table><tr><th class="left">WEEK</th><th>OVERALL %</th>${AREAS.map(a=>`<th>${ASHORT[a]}</th>`).join('')}<th>PASS</th><th>FAIL</th><th>NA</th></tr>`;
    allRecs.forEach(rec=>{const sv=Number(rec['Overall_Score_%'])||0;const cls=sv>=80?'g':sv>=60?'a':'r';body+=`<tr><td class="left" style="font-weight:600">${fmtW(Number(rec['Week_No']))}</td><td class="${cls}">${sv}%</td>${AREAS.map(a=>{const v=Number(rec[ACOL[a]])||0;const c=v>=80?'g':v>=60?'a':'r';return`<td class="${c}">${v}%</td>`;}).join('')}<td>${rec['Pass_Count']||0}</td><td>${rec['Fail_Count']||0}</td><td>${rec['NA_Count']||0}</td></tr>`;});
    body+=`</table><h2>TOP REPEATED FAILURES (${topFails.length})</h2><table><tr><th>COUNT</th><th class="left">ISSUE</th><th class="left">AREA</th></tr>`;
    topFails.forEach(f=>{body+=`<tr><td style="background:#fee2e2;color:#991b1b;font-weight:700">${f.count}x</td><td class="left">${f.q}</td><td class="left" style="color:#64748b;font-size:10px">${f.area}</td></tr>`;});
    body+=`</table>`;
    if(allImgs.length>0){body+=`<h2>EVIDENCE IMAGES (${allImgs.length})</h2><div class="img-grid">${allImgs.map(i=>`<img src="${i.url}" loading="lazy"/>`).join('')}</div>`;}
    body+=`<footer>Weekly Audit Scorecard · ${site} · ${new Date().getFullYear()}</footer></div></body></html>`;
    w.document.write(body);w.document.close();setTimeout(()=>w.print(),800);
  };
  const latestDcRec=useMemo(()=>{const dcRecs=records.filter(r=>String(r['Site'])===site).sort((a,b)=>Number(b['Week_No'])-Number(a['Week_No']));return dcRecs[0]||null;},[records,site]);
  const latestFails=useMemo(()=>{if(!latestDcRec)return[];const ans=parseAns(latestDcRec);const out=[];AREAS.forEach(area=>{Object.entries(ans[area]||{}).forEach(([q,a])=>{if(a?.answer==='FAIL'){const imgs=(a.imageURLs||[]).filter(u=>u&&(u.startsWith('http')||u.startsWith('data:')));const vids=(a.videoURLs||[]).filter(u=>u&&(u.startsWith('http')||u.startsWith('blob:')));out.push({area,q,remark:a.remark||'',imgs,vids});}});});return out;},[latestDcRec]);
  return html`<div class="fi">
    ${lb?html`<${Lightbox} items=${lb.items} idx=${lb.idx} onClose=${()=>setLb(null)}/>`:''}
    <div class="card" style=${{padding:18,marginBottom:20}}>
      <div style=${{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16,flexWrap:'wrap',gap:10}}>
        <${SH} mb=${0}>Network Average — All Weeks</${SH}>
        <div class="tgl"><button class=${'tgl-btn'+(ct==='line'?' on':'')} onClick=${()=>setCt('line')}>📈 Line</button><button class=${'tgl-btn'+(ct==='bar'?' on':'')} onClick=${()=>setCt('bar')}>📊 Bar</button></div>
      </div>
      ${activeWeeks.length===0?html`<${Empty} icon="📊" title="NO DATA" sub="Submit scorecards first."/>`:html`<div style=${{height:240}}><${ChartComp} type=${ct} data=${netData} options=${netOpts} style=${{width:'100%',height:'100%'}}/></div>`}
    </div>
    <div class="card" style=${{padding:18,marginBottom:20}}>
      <div style=${{display:'flex',justifyContent:'space-between',alignItems:'flex-end',marginBottom:16,flexWrap:'wrap',gap:14}}>
        <div><div style=${{color:C.muted,fontSize:9,fontFamily:mono,letterSpacing:1.5,marginBottom:6}}>SELECT DC</div>
          <select value=${site} onChange=${e=>setSite(e.target.value)} style=${{background:C.bg,color:C.text,border:`1px solid ${C.border}`,borderRadius:8,padding:'10px 16px',fontSize:13,fontFamily:mono,cursor:'pointer',minWidth:200}}>${SITES.map(s=>html`<option key=${s}>${s}</option>`)}</select>
        </div>
        <button onClick=${downloadReport} style=${{background:'linear-gradient(135deg,#065f46,#059669)',color:'#fff',border:'none',borderRadius:8,padding:'11px 22px',fontFamily:mono,fontSize:12,fontWeight:700,cursor:'pointer',letterSpacing:.8,boxShadow:'0 4px 16px rgba(16,185,129,.25)',transition:'all .2s'}} onMouseEnter=${e=>{e.currentTarget.style.transform='translateY(-1px)';}} onMouseLeave=${e=>{e.currentTarget.style.transform='translateY(0)';}}>⬇ DC PERFORMANCE REPORT (PDF)</button>
      </div>
      <${SH}>Week-on-Week Trend — ${site}</${SH}>
      ${activeWeeks.length===0?html`<${Empty} icon="📈" title="NO DATA"/>`:html`<div style=${{height:280}}><${ChartComp} type="line" data=${dcData} options=${dcOpts} style=${{width:'100%',height:'100%'}}/></div>`}
    </div>
    <div class="card" style=${{padding:18,marginBottom:20,overflowX:'auto'}}>
      <${SH}>Section-wise Weekly Scores — ${site}</${SH}>
      ${activeWeeks.length===0?html`<${Empty} icon="📋" title="NO DATA"/>`:html`<table class="dt">
        <thead><tr><th style=${{textAlign:'left',minWidth:130}}>AREA</th>${activeWeeks.map(w=>html`<th key=${w} style=${{textAlign:'center'}}>${fmtW(w)}</th>`)}<th style=${{textAlign:'center',color:C.accent}}>AVG</th></tr></thead>
        <tbody>${tableData.map(row=>{const valid=row.weeks.filter(v=>v!==null);const avg=valid.length?Math.round(valid.reduce((a,b)=>a+b,0)/valid.length):null;return html`<tr key=${row.area}>
          <td style=${{color:row.color,fontFamily:mono,fontSize:10,fontWeight:600,textAlign:'left'}}>${row.area}</td>
          ${row.weeks.map((v,j)=>html`<td key=${j} style=${{textAlign:'center',color:v===null?C.border:scCol(v),fontFamily:mono,fontWeight:700,fontSize:12}}>${v===null?'—':v+'%'}</td>`)}
          <td style=${{textAlign:'center',color:avg!==null?C.accent:C.border,fontFamily:mono,fontWeight:700,fontSize:12}}>${avg!==null?avg+'%':'—'}</td>
        </tr>`;})}</tbody>
      </table>`}
    </div>
    ${latestFails.length>0?html`<div class="card" style=${{padding:18}}>
      <${SH} c=${C.fail}>Improvement Areas — ${site} (${fmtW(Number(latestDcRec?.['Week_No']||0))}) — ${latestFails.length} Failed</${SH}>
      ${latestFails.map((f,i)=>{const mediaItems=[...f.imgs.map(s=>({type:'image',src:s})),...f.vids.map(s=>({type:'video',url:s}))];return html`
        <div key=${i} style=${{display:'flex',gap:12,padding:'12px 0',borderBottom:i<latestFails.length-1?`1px solid ${C.border}18`:'none',alignItems:'flex-start',flexWrap:'wrap'}}>
          <div style=${{flex:1,minWidth:200}}>
            <div style=${{display:'flex',gap:8,alignItems:'flex-start',marginBottom:f.remark?6:0}}>
              <span style=${{color:C.fail,fontSize:15,flexShrink:0,marginTop:1}}>✗</span>
              <div><div style=${{color:'#fca5a5',fontFamily:mono,fontSize:11,fontWeight:700,lineHeight:1.5}}>${f.q}</div><div style=${{color:ACLR[f.area]||C.muted,fontSize:9,fontFamily:mono,letterSpacing:.4,marginTop:2}}>${f.area}</div></div>
            </div>
            ${f.remark?html`<div style=${{marginLeft:24,marginTop:4,paddingLeft:10,borderLeft:'2px solid #fbbf2466',color:'#fbbf24',fontSize:11,fontStyle:'italic'}}><span style=${{color:C.muted,fontSize:9,fontFamily:mono,fontStyle:'normal',display:'block',marginBottom:1}}>REMARK</span>${f.remark}</div>`:''}
          </div>
          ${mediaItems.length>0?html`<div style=${{display:'flex',gap:6,flexWrap:'wrap',flexShrink:0}}>
            ${f.imgs.map((u,j)=>html`<img key=${j} src=${u} onClick=${()=>setLb({items:mediaItems,idx:j})} style=${{width:72,height:72,objectFit:'cover',borderRadius:6,cursor:'pointer',border:`2px solid ${C.fail}44`,transition:'all .15s'}} onMouseEnter=${e=>{e.currentTarget.style.borderColor=C.fail;e.currentTarget.style.transform='scale(1.05)';}} onMouseLeave=${e=>{e.currentTarget.style.borderColor=C.fail+'44';e.currentTarget.style.transform='scale(1)';}} onError=${e=>e.currentTarget.style.display='none'}/>`)}
            ${f.vids.map((u,j)=>html`<div key=${j} onClick=${()=>setLb({items:mediaItems,idx:f.imgs.length+j})} style=${{width:72,height:72,background:'#0a2030',border:`2px solid #06b6d444`,borderRadius:6,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',cursor:'pointer',fontSize:22,gap:2}} onMouseEnter=${e=>e.currentTarget.style.borderColor=C.cyan} onMouseLeave=${e=>e.currentTarget.style.borderColor='#06b6d444'}>🎥<span style=${{color:C.cyan,fontSize:8,fontFamily:mono}}>PLAY</span></div>`)}
          </div>`:''}
        </div>`;})
      }
    </div>`:''}
  </div>`;
}

// ════════════════════════════════════════════════════════
//  TAB 4: DC FACILITY
// ════════════════════════════════════════════════════════
function DCFacilityTab({records,week}){
  const[size,setSize]=useState('Large');const[lb,setLb]=useState(null);
  const sites=FMAP[size];
  const siteData=useMemo(()=>sites.map(site=>{
    const siteRecs=records.filter(r=>String(r['Site'])===site&&Number(r['Week_No'])===week);
    if(!siteRecs.length)return{site,score:0,auditor:'—',date:'—',hasData:false,areaScores:{},fails:[],imgs:[],entryCount:0};
    const scores=siteRecs.map(r=>Number(r['Overall_Score_%'])||0);
    const avgScore=Math.round(scores.reduce((a,b)=>a+b,0)/scores.length);
    const areaScores={};AREAS.forEach(area=>{const vals=siteRecs.map(r=>Number(r[ACOL[area]])||0);areaScores[area]=Math.round(vals.reduce((a,b)=>a+b,0)/vals.length);});
    const latest=siteRecs[siteRecs.length-1];const ans=parseAns(latest);
    const fails=[];AREAS.forEach(area=>Object.entries(ans[area]||{}).forEach(([q,a])=>{if(a?.answer==='FAIL')fails.push({area,q,remark:a.remark||''});}));
    const imgs=[];AREAS.forEach(area=>Object.values(ans[area]||{}).forEach(a=>{(a?.imageURLs||[]).forEach(u=>{if(u&&(u.startsWith('http')||u.startsWith('data:')))imgs.push({type:'image',src:u});});}));
    return{site,score:avgScore,auditor:String(latest['Auditor']||'—'),date:String(latest['Audit_Date']||'—'),hasData:true,areaScores,fails,imgs,entryCount:siteRecs.length};
  }),[records,sites,week]);
  const audited=siteData.filter(s=>s.hasData);
  const netAvg=audited.length?Math.round(audited.reduce((s,x)=>s+x.score,0)/audited.length):0;
  const areaAvgs=AREAS.map(area=>({area,color:ACLR[area],short:ASHORT[area],avg:audited.length?Math.round(audited.reduce((s,x)=>s+(x.areaScores[area]||0),0)/audited.length):0}));
  const commonFails=useMemo(()=>{const f={};audited.forEach(s=>s.fails.forEach(fi=>{if(!f[fi.neg])f[fi.neg]={neg:fi.neg,count:0};f[fi.neg].count++;}));return Object.values(f).sort((a,b)=>b.count-a.count).slice(0,8);},[audited]);
  const barData={labels:audited.map(s=>s.site.length>11?s.site.slice(0,11)+'…':s.site),datasets:[{label:'Score %',data:audited.map(s=>s.score),backgroundColor:audited.map(s=>scCol(s.score)+'99'),borderColor:audited.map(s=>scCol(s.score)),borderWidth:1,borderRadius:4}]};
  const barOpts={responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},datalabels:{display:true,color:'#fff',font:{size:9,weight:'bold',family:mono},formatter:v=>v+'%',anchor:'end',align:'top',offset:2}},scales:{x:{ticks:{color:C.muted,font:{size:9},maxRotation:45},grid:{color:C.border+'33'}},y:{min:0,max:105,ticks:{color:C.muted,callback:v=>v>100?'':v+'%'},grid:{color:C.border+'33'}}}};
  const sizeColor={Large:C.accent,Medium:C.blue,Small:C.purple};
  return html`<div class="fi">
    ${lb?html`<${Lightbox} items=${lb.items} idx=${lb.idx} onClose=${()=>setLb(null)}/>`:''}
    <div style=${{display:'flex',gap:16,alignItems:'center',marginBottom:24,flexWrap:'wrap'}}>
      <div><div style=${{color:C.muted,fontSize:9,fontFamily:mono,letterSpacing:1.5,marginBottom:6}}>FACILITY SIZE</div>
        <div style=${{display:'flex',gap:8}}>${['Large','Medium','Small'].map(s=>html`<button key=${s} onClick=${()=>setSize(s)} style=${{background:size===s?sizeColor[s]+'20':'transparent',color:size===s?sizeColor[s]:C.muted,border:`2px solid ${size===s?sizeColor[s]:C.border}`,borderRadius:8,padding:'9px 20px',fontFamily:mono,fontSize:11,fontWeight:size===s?700:500,cursor:'pointer',letterSpacing:.8,transition:'all .18s'}}>${s.toUpperCase()}</button>`)}</div>
      </div>
      <div style=${{marginLeft:'auto',background:`linear-gradient(135deg,${sizeColor[size]}12,${sizeColor[size]}06)`,border:`1px solid ${sizeColor[size]}33`,borderRadius:10,padding:'12px 22px',textAlign:'center',minWidth:160}}>
        <div style=${{color:C.muted,fontSize:8,fontFamily:mono,letterSpacing:1.5,marginBottom:4}}>${size.toUpperCase()} AVG — ${fmtW(week)}</div>
        <div style=${{color:audited.length?sizeColor[size]:C.muted,fontSize:30,fontFamily:mono,fontWeight:700,lineHeight:1}}>${audited.length?netAvg+'%':'—'}</div>
        <div style=${{color:C.muted,fontSize:10,marginTop:4}}>${audited.length} / ${sites.length} audited</div>
      </div>
    </div>
    <div class="card" style=${{padding:16,marginBottom:20}}><${SH}>${size} DCs — ${fmtW(week)} Comparison</${SH}>${audited.length===0?html`<${Empty} icon="📊" title=${'NO '+size.toUpperCase()+' DCS AUDITED THIS WEEK'}/>`:html`<div style=${{height:200}}><${ChartComp} type="bar" data=${barData} options=${barOpts} style=${{width:'100%',height:'100%'}}/></div>`}</div>
    <div style=${{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(170px,1fr))',gap:12,marginBottom:20}}>
      ${siteData.map(s=>html`<div key=${s.site} style=${{background:C.card,border:`1px solid ${s.hasData?scCol(s.score)+'44':C.border}`,borderRadius:10,padding:14,opacity:s.hasData?1:.45,position:'relative',overflow:'hidden'}}>
        ${s.hasData?html`<div style=${{position:'absolute',top:0,left:0,right:0,height:2,background:scCol(s.score)}}/>`:''}
        <div style=${{fontFamily:mono,fontSize:12,fontWeight:700,color:C.text,marginBottom:4,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>${s.site}</div>
        <div style=${{fontSize:26,fontFamily:mono,fontWeight:700,color:s.hasData?scCol(s.score):C.muted,lineHeight:1,marginBottom:6}}>${s.hasData?s.score+'%':'—'}</div>
        <div style=${{fontSize:10,color:C.muted,lineHeight:1.8}}><div>${s.date}</div><div style=${{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>${s.hasData?s.auditor:'Not audited'}</div>${s.entryCount>1?html`<div style=${{color:C.accent,fontSize:9}}>${s.entryCount} entries avg</div>`:''}</div>
      </div>`)}
    </div>
    ${audited.length>0?html`<div>
      <div class="card" style=${{padding:16,marginBottom:20}}><${SH}>${size} Segment — Area Averages</${SH}>${areaAvgs.map(a=>html`<div key=${a.area} style=${{marginBottom:12}}><div style=${{display:'flex',justifyContent:'space-between',marginBottom:4}}><span style=${{fontSize:10,color:C.text,fontFamily:mono}}><b style=${{color:a.color}}>${a.short}</b> ${a.area}</span><span style=${{fontSize:14,color:a.color,fontFamily:mono,fontWeight:700}}>${a.avg}%</span></div><${PBar} v=${a.avg} color=${a.color} h=${6}/></div>`)}</div>
      ${commonFails.length>0?html`<div class="card" style=${{padding:16,marginBottom:20}}><${SH} c=${C.fail}>Common Issues — ${size} Segment</${SH}>${commonFails.map((item,i)=>html`<div key=${i} style=${{display:'flex',gap:12,padding:'10px 0',borderBottom:i<commonFails.length-1?`1px solid ${C.border}20`:'none',alignItems:'flex-start'}}><div style=${{background:C.fail+'20',color:C.fail,border:`1px solid ${C.fail}44`,borderRadius:4,padding:'3px 10px',fontFamily:mono,fontSize:13,fontWeight:700,flexShrink:0,minWidth:42,textAlign:'center'}}>${item.count}</div><div style=${{color:'#fca5a5',fontFamily:mono,fontSize:11,fontWeight:600}}>${item.neg}</div></div>`)}</div>`:''}
      ${audited.some(s=>s.imgs.length>0)?html`<div class="card" style=${{padding:16}}><${SH}>Image Gallery — ${size} DCs</${SH}>${audited.filter(s=>s.imgs.length>0).map(s=>html`<div key=${s.site} style=${{marginBottom:16}}><div style=${{color:C.muted,fontSize:10,fontFamily:mono,fontWeight:700,marginBottom:8}}>${s.site}</div><div style=${{display:'flex',flexWrap:'wrap',gap:8}}>${s.imgs.map((img,j)=>html`<img key=${j} src=${img.src} onClick=${()=>setLb({items:s.imgs,idx:j})} style=${{width:72,height:72,objectFit:'cover',borderRadius:6,cursor:'pointer',border:`2px solid ${C.border}`,transition:'all .15s'}} onMouseEnter=${e=>{e.currentTarget.style.borderColor=sizeColor[size];e.currentTarget.style.transform='scale(1.06)';}} onMouseLeave=${e=>{e.currentTarget.style.borderColor=C.border;e.currentTarget.style.transform='scale(1)';}} onError=${e=>e.currentTarget.style.display='none'}/>`)}</div></div>`)}</div>`:''}
    </div>`:''}
  </div>`;
}


// ════════════════════════════════════════════════════════
//  DASHBOARD SHELL
// ════════════════════════════════════════════════════════
function Dashboard({onBack}){
  const[tab,setTab]=useState(0);
  const[records,setRecords]=useState([]);
  const[loading,setLoading]=useState(true);
  const[bgLoading,setBgLoading]=useState(false);// background refresh indicator
  const[error,setError]=useState('');
  const[lastSync,setLastSync]=useState(null);
  const[selWeek,setSelWeek]=useState(null);
  const[selSite,setSelSite]=useState(SITES[0]);

  const activeWeeks=useMemo(()=>[...new Set(records.map(r=>Number(r['Week_No'])).filter(Boolean))].sort((a,b)=>a-b),[records]);

  useEffect(()=>{
    if(activeWeeks.length>0&&(selWeek===null||!activeWeeks.includes(selWeek)))setSelWeek(activeWeeks[activeWeeks.length-1]);
  },[JSON.stringify(activeWeeks)]);

  // Always force-fetch on mount so the latest data is shown immediately.
  // Background auto-refresh every 5 minutes keeps it current without user action.
  const load=useCallback(async(force=false)=>{
    // First call (mount): always show spinner + hit the network.
    // Refresh button / interval: show bgLoading spinner, keep old records visible.
    if(records.length===0){
      setLoading(true);
    }else{
      setBgLoading(true);
    }
    setError('');
    try{
      const r=await fetchSheet(true);// always bypass frontend cache — get freshest data
      if(r.ok){
        console.log('[Dashboard] Loaded',r.records?.length||0,'records from sheet');
        setRecords(r.records||[]);
        setLastSync(new Date());
      }else{
        const msg=r.error||'Apps Script returned ok:false';
        console.error('[Dashboard] Fetch error:',msg);
        setError(msg);
      }
    }catch(e){
      console.error('[Dashboard] Fetch exception:',e.message);
      setError(e.message);
    }finally{
      setLoading(false);
      setBgLoading(false);
    }
  },[records.length]);

  useEffect(()=>{load();const iv=setInterval(()=>load(true),5*60*1000);return()=>clearInterval(iv);},[]);

  const TABS=['OVERVIEW','DC DETAIL VIEW','WEEKLY PERFORMANCE','DC FACILITY'];
  const ICONS=['▤','◉','📈','🏢'];
  const displayWeek=selWeek??(activeWeeks.length>0?activeWeeks[activeWeeks.length-1]:1);
  const syncStr=lastSync?lastSync.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'}):'—';

  return html`<div style=${{minHeight:'100vh',background:C.bg}}>
    <div style=${{background:'linear-gradient(180deg,rgba(0,0,0,.55) 0%,rgba(0,0,0,.4) 100%)',borderBottom:'1px solid rgba(255,255,255,.12)',padding:'0 20px',display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:8,position:'sticky',top:0,zIndex:100,boxShadow:'0 2px 20px rgba(0,0,0,.4)'}}>
      <div style=${{padding:'12px 0'}}>
        <div style=${{color:'rgba(255,255,255,.6)',fontFamily:mono,fontSize:8,letterSpacing:3,marginBottom:2}}>LOGISTICS OPERATIONS MANAGEMENT</div>
        <div style=${{color:C.text,fontFamily:mono,fontSize:18,fontWeight:700,letterSpacing:.5}}>WEEKLY AUDIT <span style=${{color:C.accent}}>SCORECARD</span></div>
      </div>
      <div style=${{display:'flex',gap:10,alignItems:'center',flexWrap:'wrap',padding:'8px 0'}}>
        <div>
          <div style=${{color:C.muted,fontSize:8,fontFamily:mono,letterSpacing:1.2,marginBottom:3,textAlign:'center'}}>WEEK</div>
          <select value=${displayWeek} onChange=${e=>setSelWeek(Number(e.target.value))} style=${{background:'rgba(0,0,0,.45)',color:'#E9DF43',border:'2px solid rgba(233,223,67,.45)',borderRadius:8,padding:'7px 14px',fontSize:20,fontFamily:mono,fontWeight:700,cursor:'pointer',minWidth:90}}>
            ${activeWeeks.length>0?activeWeeks.map(w=>html`<option key=${w} value=${w}>${fmtW(w)}</option>`):html`<option value=${1}>${fmtW(1)}</option>`}
          </select>
        </div>
        <div style=${{display:'flex',flexDirection:'column',alignItems:'center',gap:2}}>
          <button onClick=${()=>load(true)} disabled=${loading||bgLoading} style=${{background:(loading||bgLoading)?C.border+'33':C.abl,color:(loading||bgLoading)?C.muted:C.accent,border:`1px solid ${(loading||bgLoading)?C.border:C.accent+'44'}`,borderRadius:8,padding:'8px 14px',fontFamily:mono,fontSize:11,fontWeight:600,cursor:(loading||bgLoading)?'default':'pointer',letterSpacing:.6,minWidth:100}}>
            ${(loading||bgLoading)?html`<span class="spin">↻</span> SYNCING`:'↻ REFRESH'}
          </button>
          <span style=${{color:C.muted,fontSize:8,fontFamily:mono}}>Last: ${syncStr}</span>
        </div>
        <button onClick=${onBack} style=${{background:'linear-gradient(135deg,#991b1b,#7f1d1d)',color:'#fff',border:'none',borderRadius:8,padding:'9px 18px',fontFamily:mono,fontSize:12,fontWeight:700,cursor:'pointer',letterSpacing:.8,boxShadow:'0 4px 12px rgba(239,68,68,.25)',transition:'all .15s'}} onMouseEnter=${e=>{e.currentTarget.style.transform='translateY(-1px)';}} onMouseLeave=${e=>{e.currentTarget.style.transform='translateY(0)';}}>⏻ LOGOUT</button>
      </div>
    </div>
    <div class="tab-bar">${TABS.map((t,i)=>html`<button key=${t} class=${'tab-btn'+(tab===i?' act':'')} onClick=${()=>setTab(i)}>${ICONS[i]} ${t}</button>`)}</div>
    ${!sheetOK()?html`<div style=${{background:'rgba(0,0,0,.3)',borderBottom:'1px solid rgba(233,223,67,.2)',padding:'7px 24px',fontFamily:mono,fontSize:11,color:'#E9DF43'}}>⚠ SHEET_URL not configured. Set the Apps Script URL in the CONFIG section.</div>`:''}
    ${loading?html`<div style=${{display:'flex',alignItems:'center',justifyContent:'center',gap:14,padding:72,color:C.muted,fontFamily:mono,fontSize:13}}><span class="spin" style=${{fontSize:22,color:C.accent}}>◎</span> Fetching from Google Sheets…</div>`:''}
    ${!loading&&error?html`<div style=${{margin:'24px',background:'rgba(0,0,0,.35)',border:`1px solid ${C.fail}44`,borderRadius:12,padding:'40px 24px',textAlign:'center'}}>
      <div style=${{fontSize:36,marginBottom:12,opacity:.3}}>⚠</div>
      <div style=${{color:C.fail,fontFamily:mono,fontSize:13,fontWeight:700,marginBottom:10,letterSpacing:1}}>FETCH ERROR</div>
      <div style=${{color:C.muted,fontSize:12,marginBottom:16,maxWidth:500,margin:'0 auto 16px',whiteSpace:'pre-line',lineHeight:1.7}}>${error}</div>
      <div style=${{color:C.muted,fontSize:11,marginBottom:16,background:C.bg,borderRadius:6,padding:'10px 16px',display:'inline-block',fontFamily:mono,textAlign:'left',lineHeight:1.9}}>
        Fix checklist:<br/>1. Apps Script deployed as Web App?<br/>2. Execute as: Me<br/>3. Access: Anyone (not "with Google account")<br/>4. Created NEW deployment after code changes?
      </div><br/>
      <button onClick=${()=>load(true)} style=${{background:C.abl,color:C.accent,border:`1px solid ${C.accent}`,borderRadius:8,padding:'10px 28px',fontFamily:mono,fontSize:12,fontWeight:700,cursor:'pointer'}}>↺ RETRY</button>
    </div>`:''}
    ${!loading&&!error?html`<div style=${{padding:'20px',maxWidth:1400,margin:'0 auto'}}>
      ${tab===0?html`<${OverviewTab} records=${records} week=${displayWeek}/>`:''}
      ${tab===1?html`<${DCDetailTab} records=${records} week=${displayWeek} site=${selSite} setSite=${setSelSite}/>`:''}
      ${tab===2?html`<${WeeklyPerfTab} records=${records} site=${selSite} setSite=${setSelSite} activeWeeks=${activeWeeks}/>`:''}
      ${tab===3?html`<${DCFacilityTab} records=${records} week=${displayWeek}/>`:''}
    </div>`:''}
  </div>`;
}

// ════════════════════════════════════════════════════════
//  APP ROOT
// ════════════════════════════════════════════════════════
function App(){
  const[page,setPage]=useState('landing');
  if(page==='landing')return html`<${Landing} onFill=${()=>setPage('fill')} onView=${()=>setPage('view')}/>`;
  if(page==='fill')   return html`<${FillScorecard} onBack=${()=>setPage('landing')}/>`;
  if(page==='view')   return html`<${Dashboard} onBack=${()=>setPage('landing')}/>`;
  if(page==='partials')return html`<${PartialEntriesView} onBack=${()=>setPage('landing')}/>`;
  return null;
}
render(html`<${App}/>`,document.getElementById('app'));
</script>
