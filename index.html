// ═══ EMPTY DATA (populated by Fill Scorecard submissions) ═══
function genMock(){
  // No pre-filled mock data — dashboard shows real submissions only
  const data={};
  SITES.forEach(site=>{
    data[site]={};
    for(let wk=1;wk<=52;wk++){
      const ans={};const areaScores={};
      AREAS.forEach(area=>{
        ans[area]={};
        QUESTIONS[area].forEach(q=>{ans[area][q]={answer:null,remark:'',images:[],videos:[]};});
        areaScores[area]=0;
      });
      data[site][wk]={answers:ans,areaScores,auditor:'—',date:'—',score:0,empty:true};
    }
  });
  return data;
}
const MOCK=genMock();

function mergeData(mock,subs){
  const m=JSON.parse(JSON.stringify(mock));
  Object.entries(subs).forEach(([site,weeks])=>{
    if(!m[site])m[site]={};
    Object.entries(weeks).forEach(([wk,rec])=>{
      m[site][parseInt(wk)]={...rec,empty:false};
    });
  });
  return m;
}

// ═══ RELIABLE SYNC — per-record localStorage strategy ═══
// Stores each DC+week as an individual localStorage key.
// This prevents the single-blob quota overflow that caused silent data loss.
// Images are stripped before persistence (too large); they live in memory only.
// Legacy audit_subs key is migrated automatically on first load.

const _PFX='audit_r2_'; // v2 prefix — isolated from old single-blob key

function _recKey(site,wk){
  // encodeURIComponent handles site names with spaces/special chars (e.g. "KOLKATA 2")
  return _PFX+encodeURIComponent(site)+'__'+wk;
}

// ── One-time data reset for BANGALORE and SURAT ──
// Runs once on fresh load (gated by a reset-marker key).
// All historic records for these two sites are wiped; future submissions persist normally.
const _RESET_KEY='audit_reset_v1';
function _purgeResetSites(){
  if(localStorage.getItem(_RESET_KEY))return; // already done
  const resetSites=['BANGALORE','SURAT'];
  try{
    const idx=new Set(JSON.parse(localStorage.getItem(_PFX+'idx')||'[]'));
    const newIdx=new Set();
    idx.forEach(pair=>{
      const sep=pair.lastIndexOf('::');
      const site=pair.slice(0,sep);
      if(resetSites.includes(site)){
        try{localStorage.removeItem(_recKey(site,parseInt(pair.slice(sep+2))));}catch{}
      } else {
        newIdx.add(pair);
      }
    });
    localStorage.setItem(_PFX+'idx',JSON.stringify([...newIdx]));
    localStorage.setItem(_RESET_KEY,'1');
  }catch(e){console.warn('[AUDIT RESET] Purge failed:',e);}
}
_purgeResetSites();

function _stripImages(rec){
  // Remove base64 images and blob video URLs so localStorage entry stays small
  return{...rec,answers:Object.fromEntries(
    Object.entries(rec.answers||{}).map(([area,qs])=>[area,
      Object.fromEntries(Object.entries(qs).map(([q,a])=>[q,{...a,images:[],videos:[]}]))
    ])
  )};
}

function _saveRec(site,wk,rec){
  try{
    localStorage.setItem(_recKey(site,wk),JSON.stringify(_stripImages(rec)));
    // Maintain a small index of all stored site::wk pairs
    const idx=new Set(JSON.parse(localStorage.getItem(_PFX+'idx')||'[]'));
    idx.add(site+'::'+wk);
    localStorage.setItem(_PFX+'idx',JSON.stringify([...idx]));
  }catch(e){
    // Log the failure — do NOT suppress silently
    console.warn('[AUDIT SYNC] localStorage save failed for',site,'wk',wk,e.name,e.message);
  }
}

function _loadAllRecs(){
  const out={};
  // Load new per-record format
  try{
    const idx=JSON.parse(localStorage.getItem(_PFX+'idx')||'[]');
    idx.forEach(pair=>{
      try{
        const sep=pair.lastIndexOf('::');
        const site=pair.slice(0,sep);
        const wk=parseInt(pair.slice(sep+2));
        const raw=localStorage.getItem(_recKey(site,wk));
        if(raw&&!isNaN(wk)&&site){
          if(!out[site])out[site]={};
          out[site][wk]=JSON.parse(raw);
        }
      }catch(e2){console.warn('[AUDIT SYNC] Failed to load record:',pair,e2);}
    });
  }catch(e){console.warn('[AUDIT SYNC] Failed to load index:',e);}
  // Migrate from legacy single-blob audit_subs key (old format)
  try{
    const leg=localStorage.getItem('audit_subs');
    if(leg){
      const legData=JSON.parse(leg);
      let migrated=0;
      Object.entries(legData).forEach(([site,weeks])=>{
        Object.entries(weeks).forEach(([wkStr,rec])=>{
          const wk=parseInt(wkStr);
          if(!rec.empty&&!(out[site]&&out[site][wk])){
            if(!out[site])out[site]={};
            out[site][wk]=rec;
            _saveRec(site,wk,rec); // migrate to new per-record format
            migrated++;
          }
        });
      });
      if(migrated>0){
        console.log('[AUDIT SYNC] Migrated',migrated,'records from legacy storage');
        // Remove old key to free space
        try{localStorage.removeItem('audit_subs');}catch{}
      }
    }
  }catch(e){console.warn('[AUDIT SYNC] Legacy migration failed:',e);}
  return out;
}

function _mergeSubs(prev,incoming){
  // Deep merge: never drop existing entries, only add missing ones
  const out={};
  Object.entries(prev).forEach(([site,weeks])=>{out[site]={...weeks};});
  Object.entries(incoming).forEach(([site,weeks])=>{
    if(!out[site])out[site]={};
    Object.entries(weeks).forEach(([wk,rec])=>{
      const k=parseInt(wk);
      // Only fill in if the slot is missing — never silently overwrite
      if(!out[site][k])out[site][k]=rec;
    });
  });
  return out;
}

// ═══ UTILS ═══
function scoreColor(s){if(s>=80)return'#10b981';if(s>=60)return'#f59e0b';return'#ef4444';}
function toNeg(q){
  if(q.startsWith('IS '))return'NO '+q.slice(3);
  if(q.startsWith('ARE '))return'NOT '+q.slice(4);
  if(q.startsWith('HAS '))return'HAS NOT '+q.slice(4);
  return'FAILED: '+q;
}
function getWeekNum(date){
  const d=new Date(Date.UTC(date.getFullYear(),date.getMonth(),date.getDate()));
  const day=d.getUTCDay()||7;d.setUTCDate(d.getUTCDate()+4-day);
  const ys=new Date(Date.UTC(d.getUTCFullYear(),0,1));
  return Math.ceil((((d-ys)/86400000)+1)/7);
}

// ═══ THEME ═══
const C={bg:'#0d1117',card:'#161b22',border:'#30363d',accent:'#f59e0b',accentBg:'rgba(245,158,11,0.1)',text:'#e6edf3',muted:'#8b949e',pass:'#10b981',fail:'#ef4444',na:'#6b7280',blue:'#3b82f6',purple:'#8b5cf6'};
const mono="'IBM Plex Mono','Courier New',monospace";
const card=(x={})=>({background:C.card,border:`1px solid ${C.border}`,borderRadius:8,...x});
function Btn({col=C.accent,bg='transparent',px=16,py=9,fs=11,fw=600,extra={},onClick,disabled,children,cls=''}){
  const s={background:bg,color:col,border:`1px solid ${col}55`,borderRadius:6,padding:`${py}px ${px}px`,fontSize:fs,fontFamily:mono,fontWeight:fw,cursor:disabled?'not-allowed':'pointer',letterSpacing:0.8,textTransform:'uppercase',transition:'all 0.15s',opacity:disabled?0.4:1,...extra};
  return html`<button onClick=${onClick} disabled=${disabled} style=${s} class=${cls}>${children}</button>`;

// ═══ SHARED COMPONENTS ═══
function ScoreBadge({score,sz=13}){const c=scoreColor(score);return html`<span style=${{background:c+'22',color:c,border:`1px solid ${c}44`,borderRadius:4,padding:'2px 8px',fontSize:sz,fontFamily:mono,fontWeight:700}}>${score}%</span>`;}
function Bar({v,color,h=6}){return html`<div style=${{background:C.border,borderRadius:h/2,height:h}}><div style=${{background:color,width:`${v}%`,height:'100%',borderRadius:h/2,transition:'width 0.4s ease'}}/></div>`;}
function AreaBar({label,value,color}){return html`<div style=${{marginBottom:12}}><div style=${{display:'flex',justifyContent:'space-between',marginBottom:5}}><span style=${{fontSize:11,color:C.muted,fontFamily:mono,letterSpacing:0.2}}>${label}</span><span style=${{fontSize:12,color,fontFamily:mono,fontWeight:700}}>${value}%</span></div><${Bar} v=${value} color=${color}/></div>`;}
function SH({children,c=C.muted}){return html`<div style=${{color:c,fontSize:13,fontFamily:mono,letterSpacing:1.2,fontWeight:700,marginBottom:16,textTransform:'uppercase',borderLeft:`3px solid ${c}55`,paddingLeft:10}}>${children}</div>`;}

function ChartComp({type,data,options,style={}}){
  const ref=useRef(null);const cref=useRef(null);
  useEffect(()=>{
    if(!ref.current)return;
    if(cref.current)cref.current.destroy();
    cref.current=new Chart(ref.current,{type,data,options});
    return()=>{if(cref.current)cref.current.destroy();};
  },[JSON.stringify(data)]);
  return html`<canvas ref=${ref} style=${style}/>`;
}

// ═══ MEDIA LIGHTBOX — images + video, zoom, prev/next ═══
// items: [{type:'image',src:'...'} | {type:'video',url:'...',name:'...'}]
function MediaLightbox({items,idx:startIdx,onClose}){
  const[idx,setIdx]=useState(startIdx||0);
  const[zoom,setZoom]=useState(1);
  const[drag,setDrag]=useState({x:0,y:0,dragging:false,ox:0,oy:0});
  const dragRef=useRef({x:0,y:0,dragging:false,ox:0,oy:0});

  useEffect(()=>{setZoom(1);setDrag({x:0,y:0,dragging:false,ox:0,oy:0});},[idx]);

  if(!items||items.length===0)return null;
  const item=items[idx]||items[0];
  const isImg=item.type==='image';
  const isVid=item.type==='video';

  const onWheel=(e)=>{if(!isImg)return;e.preventDefault();setZoom(z=>Math.min(6,Math.max(1,z-(e.deltaY*0.002))));};
  const onMDown=(e)=>{if(zoom<=1)return;dragRef.current={...drag,dragging:true,ox:e.clientX-drag.x,oy:e.clientY-drag.y};setDrag(d=>({...d,dragging:true}));};
  const onMMove=(e)=>{if(!dragRef.current.dragging)return;const nx=e.clientX-dragRef.current.ox,ny=e.clientY-dragRef.current.oy;dragRef.current={...dragRef.current,x:nx,y:ny};setDrag(d=>({...d,x:nx,y:ny}));};
  const onMUp=()=>{dragRef.current={...dragRef.current,dragging:false};setDrag(d=>({...d,dragging:false}));};

  const prev=()=>{setIdx(i=>Math.max(0,i-1));};
  const next=()=>{setIdx(i=>Math.min(items.length-1,i+1));};

  const btnBase={background:'rgba(255,255,255,0.08)',color:C.text,border:`1px solid ${C.border}`,borderRadius:6,fontFamily:mono,fontSize:12,cursor:'pointer',padding:'9px 20px',transition:'all 0.15s'};

  return html`<div class="modal-overlay" onClick=${onClose} onMouseMove=${onMMove} onMouseUp=${onMUp}>
    <div onClick=${e=>e.stopPropagation()} style=${{position:'relative',display:'flex',flexDirection:'column',alignItems:'center',maxWidth:'96vw',width:'100%',userSelect:'none'}}>

      ${/* ── top bar ── */null}
      <div style=${{display:'flex',justifyContent:'space-between',alignItems:'center',width:'100%',marginBottom:12,gap:12}}>
        <span style=${{color:C.muted,fontFamily:mono,fontSize:11}}>${item.type==='video'?'🎥':'📷'} ${idx+1} / ${items.length}${item.name?' · '+item.name:''}</span>
        <div style=${{display:'flex',gap:8,alignItems:'center'}}>
          ${isImg?html`
            <button onClick=${()=>setZoom(z=>Math.min(6,+(z+0.5).toFixed(1)))} style=${{...btnBase,padding:'6px 14px',fontSize:14}}>＋</button>
            <span style=${{color:C.accent,fontFamily:mono,fontSize:11,minWidth:36,textAlign:'center'}}>${Math.round(zoom*100)}%</span>
            <button onClick=${()=>{setZoom(z=>Math.max(1,+(z-0.5).toFixed(1)));setDrag({x:0,y:0,dragging:false,ox:0,oy:0});}} style=${{...btnBase,padding:'6px 14px',fontSize:14}}>－</button>
            <button onClick=${()=>{setZoom(1);setDrag({x:0,y:0,dragging:false,ox:0,oy:0});}} style=${{...btnBase,fontSize:11}}>RESET</button>
          `:''}
          <button onClick=${onClose} style=${{background:C.fail+'33',color:C.fail,border:`1px solid ${C.fail}`,borderRadius:6,padding:'6px 14px',cursor:'pointer',fontFamily:mono,fontSize:12}}>✕ CLOSE</button>
        </div>
      </div>

      ${/* ── media viewer ── */null}
      <div style=${{overflow:'hidden',borderRadius:10,background:'#0a0d12',width:'100%',display:'flex',justifyContent:'center',alignItems:'center',minHeight:300,maxHeight:'72vh',position:'relative',cursor:isImg&&zoom>1?'grab':'default'}}
        onWheel=${onWheel} onMouseDown=${onMDown}>
        ${isImg?html`<img src=${item.src}
          style=${{
            maxWidth:'100%',maxHeight:'72vh',objectFit:'contain',display:'block',
            transform:`scale(${zoom}) translate(${drag.x/zoom}px,${drag.y/zoom}px)`,
            transformOrigin:'center',transition:drag.dragging?'none':'transform 0.15s',
            cursor:zoom>1?'grab':'default',pointerEvents:'none'
          }} alt=""/>`:''}
        ${isVid?html`<video src=${item.url} controls autoPlay
          style=${{maxWidth:'100%',maxHeight:'72vh',display:'block',borderRadius:8,outline:'none',background:'#000'}}/>`:''}
      </div>

      ${/* ── thumbnail strip ── */null}
      ${items.length>1?html`
        <div style=${{display:'flex',gap:6,marginTop:12,flexWrap:'wrap',justifyContent:'center',maxWidth:'90vw',padding:'4px 0',overflowX:'auto'}}>
          ${items.map((it,i)=>html`<div key=${i} onClick=${()=>setIdx(i)}
            style=${{width:52,height:52,flexShrink:0,borderRadius:6,overflow:'hidden',cursor:'pointer',
              border:`2px solid ${i===idx?C.accent:C.border}`,transition:'border-color 0.2s',position:'relative',background:'#0a0d12'}}>
            ${it.type==='image'?html`<img src=${it.src} style=${{width:'100%',height:'100%',objectFit:'cover',display:'block',pointerEvents:'none'}}/>`:
            html`<div style=${{width:'100%',height:'100%',display:'flex',alignItems:'center',justifyContent:'center',color:'#06b6d4',fontSize:22,background:'#0a2030'}}>🎥</div>`}
          </div>`)}
        </div>
      `:''}

      ${/* ── prev/next ── */null}
      <div style=${{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:14,gap:16,width:'100%',maxWidth:400}}>
        <button onClick=${prev} disabled=${idx===0} style=${{...btnBase,opacity:idx===0?0.3:1,cursor:idx===0?'default':'pointer',flex:1}}>← PREV</button>
        <button onClick=${next} disabled=${idx===items.length-1} style=${{...btnBase,opacity:idx===items.length-1?0.3:1,cursor:idx===items.length-1?'default':'pointer',flex:1}}>NEXT →</button>
      </div>
    </div>
  </div>`;
}

// ── helper: convert mixed images/videos from an answer into MediaLightbox items ──
function answerToItems(ans){
  const imgs=(ans?.images||[]).map(src=>({type:'image',src}));
  const vids=(ans?.videos||[]).map(v=>({type:'video',url:v.url,name:v.name}));
  return[...imgs,...vids];
}

// ── helper: collect all media items for a given area from a record ──
function areaMediaItems(rec,area){
  return QUESTIONS[area].flatMap(q=>answerToItems(rec?.answers?.[area]?.[q]));
}

// ═══ ANNOTATION MODAL — draw on a captured photo before saving ═══
function AnnotationModal({imgSrc,onSave,onDiscard}){
  const canRef=useRef(null);
  const[drawing,setDrawing]=useState(false);
  const[color,setColor]=useState('#ef4444');
  const[size,setSize]=useState(4);
  const[tool,setTool]=useState('pen'); // 'pen' | 'eraser'
  const lastPt=useRef(null);

  useEffect(()=>{
    if(!canRef.current||!imgSrc)return;
    const canvas=canRef.current;
    const ctx=canvas.getContext('2d');
    const img=new Image();
    img.onload=()=>{
      canvas.width=img.naturalWidth;
      canvas.height=img.naturalHeight;
      ctx.drawImage(img,0,0);
    };
    img.src=imgSrc;
  },[imgSrc]);

  const getPos=(e,canvas)=>{
    const rect=canvas.getBoundingClientRect();
    const scaleX=canvas.width/rect.width;
    const scaleY=canvas.height/rect.height;
    const src=e.touches?e.touches[0]:e;
    return{x:(src.clientX-rect.left)*scaleX,y:(src.clientY-rect.top)*scaleY};
  };

  const startDraw=(e)=>{
    setDrawing(true);
    const pt=getPos(e,canRef.current);
    lastPt.current=pt;
  };
  const doDraw=(e)=>{
    if(!drawing||!canRef.current)return;
    e.preventDefault();
    const ctx=canRef.current.getContext('2d');
    const pt=getPos(e,canRef.current);
    ctx.beginPath();
    ctx.moveTo(lastPt.current.x,lastPt.current.y);
    ctx.lineTo(pt.x,pt.y);
    ctx.strokeStyle=tool==='eraser'?'#ffffff':color;
    ctx.lineWidth=tool==='eraser'?size*6:size;
    ctx.lineCap='round';
    ctx.lineJoin='round';
    ctx.globalCompositeOperation=tool==='eraser'?'destination-out':'source-over';
    ctx.stroke();
    lastPt.current=pt;
  };
  const endDraw=()=>{setDrawing(false);lastPt.current=null;};

  const save=()=>{if(canRef.current)onSave(canRef.current.toDataURL('image/png'));};
  const COLORS=['#ef4444','#f59e0b','#10b981','#3b82f6','#8b5cf6','#ffffff','#000000'];

  return html`<div class="modal-overlay" onClick=${e=>e.stopPropagation()}>
    <div style=${{background:C.card,borderRadius:12,padding:16,width:'100%',maxWidth:680,maxHeight:'92vh',display:'flex',flexDirection:'column',gap:12}}>
      <div style=${{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div style=${{color:C.accent,fontFamily:mono,fontSize:12,fontWeight:700,letterSpacing:1}}>✏ ANNOTATE IMAGE</div>
        <div style=${{display:'flex',gap:8}}>
          <button onClick=${save} style=${{background:C.pass+'33',color:C.pass,border:`1px solid ${C.pass}`,borderRadius:6,padding:'7px 16px',fontFamily:mono,fontSize:12,fontWeight:700,cursor:'pointer'}}>✓ SAVE</button>
          <button onClick=${onDiscard} style=${{background:C.fail+'22',color:C.fail,border:`1px solid ${C.fail}`,borderRadius:6,padding:'7px 16px',fontFamily:mono,fontSize:12,cursor:'pointer'}}>✕ DISCARD</button>
        </div>
      </div>
      <div style=${{display:'flex',gap:10,flexWrap:'wrap',alignItems:'center'}}>
        <div style=${{display:'flex',gap:6}}>
          ${COLORS.map(c=>html`<div key=${c} onClick=${()=>{setColor(c);setTool('pen');}} style=${{width:22,height:22,borderRadius:'50%',background:c,cursor:'pointer',border:`2px solid ${color===c&&tool==='pen'?'#fff':C.border}`,transition:'border-color 0.15s'}}/>`)}
        </div>
        <div style=${{display:'flex',gap:6,marginLeft:8}}>
          ${[2,4,8,14].map(s=>html`<div key=${s} onClick=${()=>setSize(s)} style=${{width:s+10,height:s+10,borderRadius:'50%',background:size===s?C.accent:C.muted,cursor:'pointer',border:`2px solid ${size===s?C.accent:C.border}`,transition:'all 0.15s'}}/>`)}
        </div>
        <button onClick=${()=>setTool(t=>t==='eraser'?'pen':'eraser')} style=${{background:tool==='eraser'?C.accentBg:'transparent',color:tool==='eraser'?C.accent:C.muted,border:`1px solid ${tool==='eraser'?C.accent:C.border}`,borderRadius:6,padding:'5px 14px',fontFamily:mono,fontSize:11,cursor:'pointer'}}>⬜ ERASER</button>
        <button onClick=${()=>{const ctx=canRef.current?.getContext('2d');const img=new Image();img.onload=()=>{ctx.drawImage(img,0,0);};img.src=imgSrc;}} style=${{background:'transparent',color:C.muted,border:`1px solid ${C.border}`,borderRadius:6,padding:'5px 14px',fontFamily:mono,fontSize:11,cursor:'pointer'}}>↺ RESET</button>
      </div>
      <div style=${{overflow:'auto',flex:1,borderRadius:8,border:`1px solid ${C.border}`,background:'#000',display:'flex',justifyContent:'center',alignItems:'center'}}>
        <canvas ref=${canRef}
          style=${{maxWidth:'100%',maxHeight:'60vh',display:'block',cursor:'crosshair',touchAction:'none'}}
          onMouseDown=${startDraw} onMouseMove=${doDraw} onMouseUp=${endDraw} onMouseLeave=${endDraw}
          onTouchStart=${startDraw} onTouchMove=${doDraw} onTouchEnd=${endDraw}
        />
      </div>
    </div>
  </div>`;
}

              <span style=${{fontSize:24}}>🎥</span>
              <span style=${{color:'#06b6d4',fontSize:8,fontFamily:mono,fontWeight:700}}>VIDEO</span>

          ${activeWeeks.length>0?activeWeeks.map(w=>html`<option key=${w} value=${w}>Week ${w}</option>`):html`<option value=${1}>Week 1</option>`}
        </select>
      </div>
    </div>
    ${isEmpty?html`<div style=${{...card({padding:36,textAlign:'center',marginBottom:20})}}>

            <div style=${{fontSize:42,fontFamily:mono,fontWeight:700,color:scoreColor(rec.score),lineHeight:1}}>${rec.score}%</div>

// ═══ TAB 3: WEEKLY PERFORMANCE ═══
function WeeklyPerfTab({data,activeWeeks}){
  const[site,setSite]=useState(SITES[0]);
  const[netChartType,setNetChartType]=useState('line');
  // Download CSV uses currently selected site
  const downloadPerfReport=()=>{
    const WKS_=activeWeeks.length>0?activeWeeks:Array.from({length:10},(_,i)=>i+1);
    const rows=[['DC PERFORMANCE REPORT',''],['Site:',site],['Generated:',new Date().toLocaleDateString('en-IN')],['']];
    rows.push(['WEEKLY OVERALL SCORES']);
    rows.push(['Week',...WKS_.map(w=>`W${String(w).padStart(2,'0')}`),'Average']);
    const overallRow=['Overall %'];
    let sum=0,cnt=0;
    WKS_.forEach(wk=>{const r=data[site]?.[wk];const v=r&&!r.empty?r.score:null;overallRow.push(v===null?'—':v+'%');if(v!==null){sum+=v;cnt++;}});
    overallRow.push(cnt>0?Math.round(sum/cnt)+'%':'—');rows.push(overallRow);
    rows.push(['']);
    rows.push(['AREA-WISE WEEKLY SCORES']);
    rows.push(['Area',...WKS_.map(w=>`W${String(w).padStart(2,'0')}`),'Average']);
    AREAS.forEach(area=>{
      const row=[area];let s2=0,c2=0;
      WKS_.forEach(wk=>{const r=data[site]?.[wk];const v=r&&!r.empty?r.areaScores?.[area]??null:null;row.push(v===null?'—':v+'%');if(v!==null){s2+=v;c2++;}});
      row.push(c2>0?Math.round(s2/c2)+'%':'—');rows.push(row);
    });
    rows.push(['']);
    rows.push(['REPEATED FAILURES']);
    const fails={};
    WKS_.forEach(wk=>{const rec=data[site]?.[wk];if(!rec||rec.empty)return;AREAS.forEach(area=>QUESTIONS[area].forEach(q=>{if(rec.answers?.[area]?.[q]?.answer==='FAIL'){fails[q]=(fails[q]||0)+1;}}));});
    const sorted=Object.entries(fails).sort((a,b)=>b[1]-a[1]);
    if(sorted.length===0)rows.push(['No repeated failures']);
    else{rows.push(['Question','Fail Count']);sorted.forEach(([q,cnt])=>rows.push([q,cnt]));}
    const csv=rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
    const blob=new Blob([csv],{type:'text/csv'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);
    a.download=`DC_Performance_Report_${site.replace(/ /g,'_')}_${new Date().toISOString().slice(0,10)}.csv`;
    a.click();URL.revokeObjectURL(a.href);
  };

  const WKS_LIST=activeWeeks.length>0?activeWeeks:Array.from({length:10},(_,i)=>i+1);

  // ── Network average across ALL DCs per week (auto-updates as submissions arrive) ──
  const netAvgPerWeek=useMemo(()=>WKS_LIST.map(wk=>{
    const audited=SITES.filter(s=>!data[s]?.[wk]?.empty);
    return audited.length>0?Math.round(audited.reduce((a,s)=>a+data[s][wk].score,0)/audited.length):null;
  }),[data,WKS_LIST.join(',')]);

  const netAvgChartD={
    labels:WKS_LIST.map(w=>`W${String(w).padStart(2,'0')}`),
    datasets:[{
      label:'Network Avg %',
      data:netAvgPerWeek,
      borderColor:'#f59e0b',
      backgroundColor:netChartType==='bar'?'#f59e0b99':'#f59e0b33',
      borderWidth:2.5,
      tension:0.35,
      fill:netChartType==='line',
      pointBackgroundColor:'#f59e0b',
      pointRadius:5,
      spanGaps:false
    }]
  };
  const netAvgChartO={
    responsive:true,maintainAspectRatio:false,
    plugins:{
      legend:{display:true,position:'top',labels:{color:C.muted,font:{size:11},boxWidth:14}},
      datalabels:{
        display:(ctx)=>netAvgPerWeek[ctx.dataIndex]!==null,
        color:'#f59e0b',
        font:{size:10,weight:'bold',family:'IBM Plex Mono,monospace'},

        anchor:'end',align:'end',offset:4
      }
    },
    scales:{
      x:{ticks:{color:C.muted,font:{size:11}},grid:{color:C.border+'44'}},
      y:{min:0,max:100,ticks:{color:C.muted},grid:{color:C.border+'44'}}
    }
  };

  // ── Per-DC trend (driven by the DC dropdown below the network chart) ──
  const lineD=useMemo(()=>({
    labels:WKS_LIST.map(w=>`W${String(w).padStart(2,'0')}`),
    datasets:[
      {label:'Overall %',data:WKS_LIST.map(wk=>{const r=data[site]?.[wk];return r&&!r.empty?r.score:null;}),borderColor:C.accent,backgroundColor:C.accent+'22',borderWidth:2.5,tension:0.35,fill:true,pointBackgroundColor:C.accent,pointRadius:4,spanGaps:false},
      ...AREAS.map(area=>({label:area.split(' ')[0],data:WKS_LIST.map(wk=>{const r=data[site]?.[wk];return r&&!r.empty?r.areaScores?.[area]??null:null;}),borderColor:AREA_COLORS[area],backgroundColor:'transparent',borderWidth:1.5,tension:0.35,borderDash:[4,4],pointRadius:2,spanGaps:false}))
    ]
  }),[site,data,WKS_LIST.join(',')]);

  const lineO={responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{color:C.muted,font:{size:10},boxWidth:12,padding:10}},datalabels:{display:false}},scales:{x:{ticks:{color:C.muted,font:{size:11}},grid:{color:C.border+'44'}},y:{min:0,max:100,ticks:{color:C.muted},grid:{color:C.border+'44'}}}};

  const tableD=AREAS.map(area=>{const wkVals=WKS_LIST.map(wk=>{const r=data[site]?.[wk];return r&&!r.empty?r.areaScores?.[area]??0:null;});const valid=wkVals.filter(v=>v!==null);return{area,weeks:wkVals,avg:valid.length>0?Math.round(valid.reduce((a,b)=>a+b,0)/valid.length):0};});
  const allFails=useMemo(()=>{const f={};WKS_LIST.forEach(wk=>{const rec=data[site]?.[wk];if(!rec||rec.empty)return;AREAS.forEach(area=>QUESTIONS[area].forEach(q=>{if(rec.answers?.[area]?.[q]?.answer==='FAIL'){f[q]=(f[q]||0)+1;}}));});return Object.entries(f).sort((a,b)=>b[1]-a[1]).slice(0,5);},[site,data,WKS_LIST.join(',')]);
  const hasAnySiteData=WKS_LIST.some(wk=>!data[site]?.[wk]?.empty);

  return html`<div class="fi">
    ${/* ── Top bar: download / print only ── */null}
    <div style=${{display:'flex',justifyContent:'flex-end',marginBottom:20,flexWrap:'wrap',gap:10}}>
      <button class="no-print" onClick=${downloadPerfReport} style=${{background:'#1a3a28',color:'#34d399',border:`2px solid #10b981`,borderRadius:8,padding:'12px 22px',fontSize:13,fontFamily:mono,fontWeight:700,cursor:'pointer',letterSpacing:0.8,transition:'all 0.15s'}} onMouseEnter=${e=>{e.target.style.background='#10b981';e.target.style.color='#fff';}} onMouseLeave=${e=>{e.target.style.background='#1a3a28';e.target.style.color='#34d399';}}>⬇ DOWNLOAD REPORT (.CSV)</button>
      <button class="no-print" onClick=${()=>window.print()} style=${{background:C.accentBg,color:C.accent,border:`2px solid ${C.accent}`,borderRadius:8,padding:'12px 22px',fontSize:13,fontFamily:mono,fontWeight:700,cursor:'pointer',letterSpacing:0.8,transition:'all 0.15s'}} onMouseEnter=${e=>{e.target.style.background=C.accent;e.target.style.color='#000';}} onMouseLeave=${e=>{e.target.style.background=C.accentBg;e.target.style.color=C.accent;}}>🖨 PRINT PDF</button>
    </div>

    ${/* ── Card 1: Week-by-Week Network Average (auto-updates with new submissions) ── */null}
    <div style=${{...card({padding:16,marginBottom:20})}}>
      <div style=${{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16,flexWrap:'wrap',gap:10}}>
        <div>
          <${SH} c=${C.accent}>Week-by-Week Overall Network Average</${SH}>
          <div style=${{color:C.muted,fontSize:10,fontFamily:mono,marginTop:-8,marginBottom:8,letterSpacing:0.5}}>Aggregates all DCs · auto-updates as new scorecards are submitted</div>
        </div>
        <div style=${{display:'flex',gap:8}}>
          ${['line','bar'].map(t=>html`<button key=${t} onClick=${()=>setNetChartType(t)} style=${{background:netChartType===t?C.accentBg:'transparent',color:netChartType===t?C.accent:C.muted,border:`1px solid ${netChartType===t?C.accent:C.border}`,borderRadius:6,padding:'7px 16px',fontSize:11,fontFamily:mono,fontWeight:netChartType===t?700:400,cursor:'pointer',letterSpacing:0.5,transition:'all 0.15s'}}>${t==='line'?'📈 Line':'📊 Bar'}</button>`)}
        </div>
      </div>
      ${netAvgPerWeek.every(v=>v===null)
        ?html`<div style=${{height:100,display:'flex',alignItems:'center',justifyContent:'center',color:C.muted,fontFamily:mono,fontSize:12,letterSpacing:0.8}}>No network data yet — submit scorecards to populate</div>`
        :html`<div style=${{height:260}}><${ChartComp} type=${netChartType} data=${netAvgChartD} options=${netAvgChartO} style=${{width:'100%',height:'100%'}}/></div>`}

      ${/* ── DC Dropdown + DC-specific trend chart (lives inside the same card, below network avg) ── */null}
      <div style=${{marginTop:24,paddingTop:20,borderTop:`1px solid ${C.border}`}}>
        <div style=${{display:'flex',alignItems:'center',gap:16,marginBottom:16,flexWrap:'wrap'}}>
          <div>
            <div style=${{color:C.muted,fontSize:10,fontFamily:mono,letterSpacing:1.5,marginBottom:6}}>SELECT DC TO VIEW TREND</div>
            <select value=${site} onChange=${e=>setSite(e.target.value)} style=${{background:C.bg,color:C.text,border:`1px solid ${C.border}`,borderRadius:8,padding:'10px 16px',fontSize:13,fontFamily:mono,cursor:'pointer'}}>
              ${SITES.map(s=>html`<option key=${s}>${s}</option>`)}
            </select>
          </div>
          <div style=${{background:C.accentBg,border:`1px solid ${C.accent}33`,borderRadius:8,padding:'8px 18px',marginTop:20}}>
            <div style=${{color:C.muted,fontSize:9,fontFamily:mono,letterSpacing:1}}>DC SELECTED</div>
            <div style=${{color:C.accent,fontFamily:mono,fontWeight:700,fontSize:14}}>${site}</div>
          </div>
        </div>
        <div style=${{color:C.muted,fontSize:11,fontFamily:mono,fontWeight:600,marginBottom:10,letterSpacing:0.5}}>Weekly Performance Trend — ${site}</div>
        ${!hasAnySiteData
          ?html`<div style=${{height:120,display:'flex',alignItems:'center',justifyContent:'center',color:C.muted,fontFamily:mono,fontSize:12,letterSpacing:0.8}}>No audit data yet for ${site} — submit scorecards to populate chart</div>`
          :html`<div style=${{height:280}}><${ChartComp} type="line" data=${lineD} options=${lineO} style=${{width:'100%',height:'100%'}}/></div>`}
      </div>
    </div>

    ${/* ── Card 2: Section-wise Weekly Scores ── */null}
    <div style=${{...card({padding:16,marginBottom:20,overflowX:'auto'})}}>
      <${SH}>Section-wise Weekly Scores — ${site} (${WKS_LIST.length>0?`W${WKS_LIST[0]}–W${WKS_LIST[WKS_LIST.length-1]}`:'No data'})</${SH}>
      <table style=${{width:'100%',borderCollapse:'collapse',fontSize:11,fontFamily:mono,tableLayout:'fixed'}}>
        <thead><tr style=${{borderBottom:`1px solid ${C.border}`}}>
          <th style=${{textAlign:'left',color:C.muted,padding:'6px 8px',fontWeight:600,width:'22%'}}>AREA</th>
          ${WKS_LIST.map(w=>html`<th key=${w} style=${{color:C.muted,padding:'6px 4px',textAlign:'center'}}>W${String(w).padStart(2,'0')}</th>`)}
          <th style=${{color:C.accent,padding:'6px 8px',textAlign:'center',width:'7%'}}>AVG</th>
        </tr></thead>
        <tbody>${tableD.map(row=>html`<tr key=${row.area} style=${{borderBottom:`1px solid ${C.border}22`}}>

          ${row.weeks.map((s,j)=>html`<td key=${j} style=${{textAlign:'center',padding:'8px 4px',color:s===null?C.border:scoreColor(s),fontWeight:s!==null&&s<60?700:400}}>${s===null?'—':s+'%'}</td>`)}
          <td style=${{textAlign:'center',color:row.avg===0&&!hasAnySiteData?C.border:C.accent,padding:8,fontWeight:700}}>${hasAnySiteData?row.avg+'%':'—'}</td>

// ═══ TAB 4: DC FACILITY ═══
function DCFacilityTab({data,activeWeeks}){
  const[sz,setSz]=useState('Large');
  const latestWk=activeWeeks.length>0?activeWeeks[activeWeeks.length-1]:1;
  const[week,setWeek]=useState(latestWk);
  // FIX: robust dependency + auto-correct invalid selection
  useEffect(()=>{
    if(activeWeeks.length>0){
      if(!activeWeeks.includes(week))setWeek(activeWeeks[activeWeeks.length-1]);
    }
  },[activeWeeks.join(',')]);
  const displayWeek=activeWeeks.length>0?(activeWeeks.includes(week)?week:latestWk):week;
  const[lb,setLb]=useState(null);
  const sites=FACILITY_MAP[sz];
  const siteD=useMemo(()=>sites.map(s=>({site:s,score:data[s]?.[displayWeek]?.score??0,date:data[s]?.[displayWeek]?.date??'—',aud:data[s]?.[displayWeek]?.auditor??'—',hasData:!data[s]?.[displayWeek]?.empty,areaScores:data[s]?.[displayWeek]?.areaScores??{},fails:data[s]?.[displayWeek]?.empty?[]:AREAS.flatMap(area=>(QUESTIONS[area]||[]).filter(q=>data[s]?.[displayWeek]?.answers?.[area]?.[q]?.answer==='FAIL').map(q=>({area,q,neg:toNeg(q),remark:data[s]?.[displayWeek]?.answers?.[area]?.[q]?.remark||''}))),images:data[s]?.[displayWeek]?.empty?[]:AREAS.flatMap(area=>QUESTIONS[area].flatMap(q=>data[s]?.[displayWeek]?.answers?.[area]?.[q]?.images||[]))})),[sites,displayWeek,data]);
  const auditedSites=siteD.filter(s=>s.hasData);
  const netAvg=auditedSites.length>0?Math.round(auditedSites.reduce((a,b)=>a+b.score,0)/auditedSites.length):0;
  const areaAvgs=AREAS.map(area=>{const ss=auditedSites.map(s=>s.areaScores?.[area]??0);return{area,avg:ss.length>0?Math.round(ss.reduce((a,b)=>a+b,0)/ss.length):0,color:AREA_COLORS[area]};});
  const barD={labels:auditedSites.map(s=>s.site.length>11?s.site.slice(0,11)+'…':s.site),datasets:[{label:'Score %',data:auditedSites.map(s=>s.score),backgroundColor:auditedSites.map(s=>scoreColor(s.score)+'bb'),borderColor:auditedSites.map(s=>scoreColor(s.score)),borderWidth:1}]};
  const barO={responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:C.muted,font:{size:9},maxRotation:45},grid:{color:C.border+'44'}},y:{min:0,max:100,ticks:{color:C.muted},grid:{color:C.border+'44'}}}};
  const commonFails=useMemo(()=>{const f={};siteD.forEach(s=>s.fails.forEach(fi=>{if(!f[fi.neg])f[fi.neg]={neg:fi.neg,count:0,remarks:[]};f[fi.neg].count++;if(fi.remark)f[fi.neg].remarks.push(fi.remark);}));return Object.values(f).sort((a,b)=>b.count-a.count).slice(0,8);},[siteD]);
  return html`<div class="fi">
    ${lb?html`<${Lightbox} images=${lb.images} idx=${lb.idx} onClose=${()=>setLb(null)}/>`:''}
    <div style=${{display:'flex',gap:16,alignItems:'flex-end',marginBottom:24,flexWrap:'wrap'}}>
      <div>
        <div style=${{color:C.muted,fontSize:10,fontFamily:mono,letterSpacing:1.5,marginBottom:6}}>FACILITY SIZE</div>
        <div style=${{display:'flex',gap:8}}>
          ${['Large','Medium','Small'].map(s=>html`<button key=${s} onClick=${()=>setSz(s)} style=${{background:sz===s?C.accentBg:'transparent',color:sz===s?C.accent:C.muted,border:`1px solid ${sz===s?C.accent:C.border}`,borderRadius:6,padding:'9px 20px',fontSize:11,fontFamily:mono,fontWeight:sz===s?700:400,cursor:'pointer',letterSpacing:0.8}}>${s.toUpperCase()}</button>`)}
        </div>
      </div>
      <div>
        <div style=${{color:C.muted,fontSize:10,fontFamily:mono,letterSpacing:1.5,marginBottom:6}}>WEEK</div>
        <select value=${displayWeek} onChange=${e=>setWeek(Number(e.target.value))} style=${{background:C.card,color:C.text,border:`1px solid ${C.border}`,borderRadius:8,padding:'10px 16px',fontSize:14,fontFamily:mono,cursor:'pointer'}}>
          ${activeWeeks.length>0?activeWeeks.map(w=>html`<option key=${w} value=${w}>Week ${w}</option>`):html`<option value=${1}>Week 1</option>`}
        </select>
      </div>
      <div style=${{marginLeft:'auto',background:C.accentBg,border:`1px solid ${C.accent}44`,borderRadius:10,padding:'12px 22px',textAlign:'center'}}>
        <div style=${{color:C.muted,fontSize:9,fontFamily:mono,letterSpacing:1}}>${sz.toUpperCase()} SEGMENT AVG</div>
        <div style=${{color:auditedSites.length>0?C.accent:C.muted,fontSize:28,fontFamily:mono,fontWeight:700}}>${auditedSites.length>0?netAvg+'%':'—'}</div>
        <div style=${{color:C.muted,fontSize:10}}>${auditedSites.length} of ${sites.length} audited</div>
      </div>
    </div>
    <div style=${{...card({padding:16,marginBottom:20})}}>
      <${SH}>${sz} DCs — Week ${displayWeek} Comparison</${SH}>
      ${auditedSites.length===0?html`<div style=${{height:100,display:'flex',alignItems:'center',justifyContent:'center',color:C.muted,fontFamily:mono,fontSize:11,letterSpacing:0.8}}>NO AUDIT DATA FOR THIS WEEK</div>`:
      html`<div style=${{height:240}}><${ChartComp} type="bar" data=${barD} options=${barO} style=${{width:'100%',height:'100%'}}/></div>`}
    </div>
    <div style=${{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(190px,1fr))',gap:12,marginBottom:20}}>
      ${siteD.map(row=>html`<div key=${row.site} style=${{background:C.card,border:`1px solid ${row.hasData?scoreColor(row.score)+'33':C.border}`,borderRadius:10,padding:16,opacity:row.hasData?1:0.4}}>
        <div style=${{fontFamily:mono,fontSize:12,fontWeight:700,color:C.text,marginBottom:6}}>${row.site}</div>
        <div style=${{fontSize:30,fontFamily:mono,fontWeight:700,color:row.hasData?scoreColor(row.score):C.muted,marginBottom:8,lineHeight:1}}>${row.hasData?row.score+'%':'—'}</div>
        <div style=${{fontSize:11,color:C.muted,lineHeight:1.8}}><div>${row.hasData?row.date:'—'}</div><div>${row.hasData?row.aud:'Not audited'}</div></div>
      </div>`)}
    </div>
    ${!auditedSites.length?html`<div style=${{...card({padding:30,textAlign:'center',marginBottom:20})}}>
      <div style=${{color:C.muted,fontFamily:mono,fontSize:12,marginBottom:6,letterSpacing:0.8}}>NO AUDITS SUBMITTED FOR ${sz.toUpperCase()} FACILITIES IN WEEK ${displayWeek}</div>
      <div style=${{color:C.muted,fontSize:11}}>Submit scorecards via Fill Scorecard to see area analysis.</div>
    </div>`:html`
    <div style=${{...card({padding:16,marginBottom:20})}}>
      <${SH}>${sz} Segment — Area Averages (${auditedSites.length} DC${auditedSites.length!==1?'s':''})</${SH}>
      ${areaAvgs.map(a=>html`<${AreaBar} key=${a.area} label=${a.area} value=${a.avg} color=${a.color}/>`)}
    </div>
    <div style=${{...card({padding:16,marginBottom:20})}}>
      <${SH}>Common Improvement Areas — ${sz} Segment</${SH}>
      ${commonFails.length===0?html`<div style=${{color:C.pass,textAlign:'center',padding:20,fontFamily:mono}}>✓ No common failures this week</div>`:
      commonFails.map((item,i)=>html`<div key=${i} style=${{display:'flex',gap:12,padding:'10px 0',borderBottom:`1px solid ${C.border}22`,alignItems:'flex-start'}}>
        <span style=${{color:C.fail,fontSize:16,flexShrink:0}}>✗</span>
        <div style=${{flex:1}}>
          <div style=${{color:'#fca5a5',fontFamily:mono,fontSize:11,fontWeight:600}}>${item.neg}</div>
          <div style=${{color:C.muted,fontSize:10,marginTop:3}}>Affects ${item.count} of ${auditedSites.length} audited DCs</div>
        </div>
        <span style=${{background:C.fail+'22',color:C.fail,border:`1px solid ${C.fail}44`,borderRadius:4,padding:'2px 8px',fontFamily:mono,fontSize:12,fontWeight:700,flexShrink:0}}>${item.count}</span>
      </div>`)}
    </div>
    <div style=${{...card({padding:16})}}>
      <${SH}>Image Gallery — ${sz} DCs</${SH}>
      ${siteD.filter(s=>s.images.length>0).map(s=>html`<div key=${s.site} style=${{marginBottom:16}}>
        <div style=${{color:C.muted,fontSize:11,fontFamily:mono,marginBottom:8}}>${s.site}</div>
        <div style=${{display:'flex',flexWrap:'wrap',gap:8}}>${s.images.map((img,j)=>html`<img key=${j} src=${img} onClick=${()=>setLb({images:s.images,idx:j})} style=${{width:72,height:72,objectFit:'cover',borderRadius:6,cursor:'pointer',border:`2px solid ${C.border}`}}/>`)}</div>
      </div>`)}
      ${siteD.every(s=>s.images.length===0)?html`<div style=${{color:C.muted,textAlign:'center',padding:40,fontFamily:mono,fontSize:12}}>No images yet. Captured during Fill Scorecard will appear here grouped by facility.</div>`:''}
    </div>
    `}
  </div>`;
}

      </div>
      <div style=${{display:'flex',gap:16,alignItems:'center'}}>
        <div style=${{color:C.muted,fontSize:10,fontFamily:mono}} class="desktop-only">${new Date().toLocaleDateString('en-IN',{weekday:'short',day:'2-digit',month:'short',year:'numeric'})}</div>
        <button onClick=${onLogout} class="no-print" style=${{background:C.fail+'22',color:C.fail,border:`2px solid ${C.fail}`,borderRadius:8,padding:'10px 20px',fontFamily:mono,fontSize:13,fontWeight:700,cursor:'pointer',letterSpacing:0.8,transition:'all 0.15s'}} onMouseEnter=${e=>{e.target.style.background=C.fail;e.target.style.color='#fff';}} onMouseLeave=${e=>{e.target.style.background=C.fail+'22';e.target.style.color=C.fail;}}>⏻ LOGOUT</button>
      </div>
    </div>
    <div style=${{background:C.card,borderBottom:`1px solid ${C.border}`,padding:'0 24px',display:'flex',overflowX:'auto'}} class="no-print">
      ${TABS.map((t,i)=>html`<button key=${t} onClick=${()=>setTab(i)} style=${{background:'transparent',color:tab===i?C.accent:C.muted,border:'none',borderBottom:tab===i?`2px solid ${C.accent}`:'2px solid transparent',padding:'16px 24px',fontSize:13,fontFamily:mono,fontWeight:tab===i?700:500,cursor:'pointer',letterSpacing:0.8,whiteSpace:'nowrap',transition:'all 0.2s'}}>${t}</button>`)}
    </div>
    <div style=${{padding:24,maxWidth:1200,margin:'0 auto'}}>
      ${tab===0?html`<${OverviewTab} data=${data} activeWeeks=${activeWeeks} subs=${subs}/>`:null}
      ${tab===1?html`<${DCDetailTab} data=${data} activeWeeks=${activeWeeks}/>`:null}
      ${tab===2?html`<${WeeklyPerfTab} data=${data} activeWeeks=${activeWeeks}/>`:null}
      ${tab===3?html`<${DCFacilityTab} data=${data} activeWeeks=${activeWeeks}/>`:null}
    </div>
  </div>`;
}

// ═══ FILL SCORECARD ═══
function FillScorecard({onLogout,onSubmit}){
  const[step,setStep]=useState('info');
  const[info,setInfo]=useState({site:SITES[0],date:new Date().toISOString().slice(0,10),week:getWeekNum(new Date()),auditor:''});
  const[done,setDone]=useState([]);
  const[area,setArea]=useState(null);
  const[ans,setAns]=useState({});
  const[qi,setQi]=useState(0);
  const[cam,setCam]=useState(false);
  const[stream,setStream]=useState(null);
  const[vidRec,setVidRec]=useState(false);
  const[vidStream,setVidStream]=useState(null);
  const[mediaRec,setMediaRec]=useState(null);
  const[annotate,setAnnotate]=useState(null); // {imgSrc,ar,q} — pending annotation
  const vRef=useRef(null);const cRef=useRef(null);const fRef=useRef(null);const vfRef=useRef(null);const vvRef=useRef(null);

  const upd=(ar,q,f,v)=>setAns(p=>({...p,[ar]:{...(p[ar]||{}),[q]:{...(p[ar]?.[q]||{}),answer:p[ar]?.[q]?.answer||null,remark:p[ar]?.[q]?.remark||'',images:p[ar]?.[q]?.images||[],...(f==='answer'?{answer:v}:{}), ...(f==='remark'?{remark:v}:{}),...(f==='images'?{images:v}:{})}}})  );

  // cleaner updater
  const setField=(ar,q,field,val)=>setAns(prev=>{
    const existing=prev[ar]?.[q]||{answer:null,remark:'',images:[],videos:[]};
    return{...prev,[ar]:{...(prev[ar]||{}),[q]:{...existing,[field]:val}}};
  });

  const getA=(ar,q)=>ans[ar]?.[q]||{answer:null,remark:'',images:[],videos:[]};

  const startCam=async()=>{
    try{const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});setStream(s);setCam(true);setTimeout(()=>{if(vRef.current)vRef.current.srcObject=s;},100);}
    catch{alert('Camera not available. Use file upload instead.');}
  };
  const capPhoto=(ar,q)=>{
    const canvas=cRef.current,video=vRef.current;if(!canvas||!video)return;
    canvas.width=video.videoWidth||640;canvas.height=video.videoHeight||480;
    canvas.getContext('2d').drawImage(video,0,0);
    const img=canvas.toDataURL('image/png',1.0); // no compression, full quality
    // stop cam first, then open annotation modal
    if(stream)stream.getTracks().forEach(t=>t.stop());setStream(null);setCam(false);
    setAnnotate({imgSrc:img,ar,q}); // open annotator
  };
  const stopCam=()=>{if(stream)stream.getTracks().forEach(t=>t.stop());setStream(null);setCam(false);};

  // ── Video evidence for VOLUMETRIC HANDLING ──
  const startVidRec=async(ar,q)=>{
    try{
      const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'},audio:true});
      setVidStream(s);setVidRec(true);
      setTimeout(()=>{if(vvRef.current)vvRef.current.srcObject=s;},100);
      const chunks=[];
      const mr=new MediaRecorder(s,{mimeType:MediaRecorder.isTypeSupported('video/webm;codecs=vp9')?'video/webm;codecs=vp9':'video/webm'});
      mr.ondataavailable=e=>{if(e.data.size>0)chunks.push(e.data);};
      mr.onstop=()=>{
        const blob=new Blob(chunks,{type:'video/webm'});
        const url=URL.createObjectURL(blob);
        setField(ar,q,'videos',[...(getA(ar,q).videos||[]),{url,name:'Video_'+Date.now()+'.webm',type:'video/webm'}]);
        if(s)s.getTracks().forEach(t=>t.stop());setVidStream(null);setVidRec(false);setMediaRec(null);
      };
      mr.start();setMediaRec({rec:mr,ar,q});
    }catch{alert('Camera/microphone not available. Use file upload instead.');}
  };
  const stopVidRec=()=>{if(mediaRec)mediaRec.rec.stop();};
  const vidFileUp=(e,ar,q)=>{
    Array.from(e.target.files).forEach(file=>{
      const url=URL.createObjectURL(file);
      setField(ar,q,'videos',[...(getA(ar,q).videos||[]),{url,name:file.name,type:file.type}]);
    });
    e.target.value='';
  };
  const fileUp=(e,ar,q)=>{
    Array.from(e.target.files).forEach(file=>{const r=new FileReader();r.onload=ev=>setField(ar,q,'images',[...getA(ar,q).images,ev.target.result]);r.readAsDataURL(file);});
    e.target.value='';
  };

  const submitArea=()=>{
    const newDone=[...done,area];setDone(newDone);setArea(null);setStep('areas');setQi(0);
    if(newDone.length===AREAS.length)submitAll(newDone);
  };
  const submitAll=(doneFinal=done)=>{
    const rec={answers:{},auditor:info.auditor,date:new Date(info.date).toLocaleDateString('en-IN'),score:0,areaScores:{}};
    let pass=0,total=0;
    AREAS.forEach(ar=>{rec.answers[ar]={};let ap=0,at=0;QUESTIONS[ar].forEach(q=>{const a=ans[ar]?.[q]||{answer:'NA',remark:'',images:[],videos:[]};rec.answers[ar][q]=a;if(a.answer!=='NA'){at++;total++;if(a.answer==='PASS'){ap++;pass++;}}});rec.areaScores[ar]=at>0?Math.round((ap/at)*100):0;});
    rec.score=total>0?Math.round((pass/total)*100):0;
    onSubmit(info.site,parseInt(info.week),rec);setStep('done');
  };

  const qs=area?QUESTIONS[area]:[];const cq=qs[qi]||'';const ca=getA(area,cq);
  const areaOk=qs.length>0&&qs.every(q=>['PASS','FAIL','NA'].includes(getA(area,q).answer));

  if(step==='done')return html`<div style=${{minHeight:'100vh',background:C.bg,display:'flex',alignItems:'center',justifyContent:'center'}}>
    <div style=${{textAlign:'center',padding:40}} class="fi">
      <div style=${{fontSize:72,color:C.pass,marginBottom:20}}>✓</div>
      <div style=${{color:C.pass,fontFamily:mono,fontSize:22,fontWeight:700,marginBottom:12}}>RESPONSE RECORDED</div>
      <div style=${{color:C.muted,marginBottom:8,fontSize:14}}>Audit submitted for <strong style=${{color:C.text}}>${info.site}</strong></div>
      <div style=${{color:C.muted,marginBottom:32,fontSize:13,fontFamily:mono}}>Week ${info.week} • ${info.auditor}</div>
      <button onClick=${onLogout} style=${{background:C.accentBg,color:C.accent,border:`2px solid ${C.accent}`,borderRadius:8,padding:'14px 32px',fontSize:14,fontFamily:mono,fontWeight:700,cursor:'pointer',letterSpacing:1}}>← BACK TO HOME</button>
    </div>
  </div>`;

  if(step==='questions'&&area)return html`<div style=${{minHeight:'100vh',background:C.bg}}>
    ${annotate?html`<${AnnotationModal}
      imgSrc=${annotate.imgSrc}
      onSave=${(annotated)=>{
        setField(annotate.ar,annotate.q,'images',[...getA(annotate.ar,annotate.q).images,annotated]);
        setAnnotate(null);
      }}
      onDiscard=${()=>setAnnotate(null)}
    />`:''}
    ${cam?html`<div class="modal-overlay">
      <div style=${{textAlign:'center',width:'100%',maxWidth:480}}>
        <video ref=${vRef} autoPlay playsinline style=${{width:'100%',borderRadius:8,display:'block'}}/>
        <canvas ref=${cRef} style=${{display:'none'}}/>
        <div style=${{display:'flex',gap:14,marginTop:16,justifyContent:'center'}}>
          <button onClick=${()=>capPhoto(area,cq)} style=${{background:C.pass+'33',color:C.pass,border:`2px solid ${C.pass}`,borderRadius:8,padding:'16px 30px',fontSize:15,fontFamily:mono,fontWeight:700,cursor:'pointer'}}>📸 CAPTURE</button>
          <button onClick=${stopCam} style=${{background:C.fail+'33',color:C.fail,border:`2px solid ${C.fail}`,borderRadius:8,padding:'16px 22px',fontFamily:mono,fontWeight:700,cursor:'pointer'}}>✕ CANCEL</button>
        </div>
      </div>
    </div>`:''}
    ${vidRec?html`<div class="modal-overlay">
      <div style=${{textAlign:'center',width:'100%',maxWidth:480}}>
        <div style=${{background:C.fail+'22',border:`2px solid ${C.fail}`,borderRadius:6,padding:'6px 14px',display:'inline-flex',alignItems:'center',gap:8,marginBottom:10,fontFamily:mono,fontSize:12,color:C.fail}}>
          <span style=${{width:10,height:10,borderRadius:'50%',background:C.fail,display:'inline-block',animation:'pulse 1s infinite'}}/>⏺ RECORDING…
        </div>
        <video ref=${vvRef} autoPlay playsinline muted style=${{width:'100%',borderRadius:8,display:'block'}}/>
        <div style=${{display:'flex',gap:14,marginTop:16,justifyContent:'center'}}>
          <button onClick=${stopVidRec} style=${{background:C.fail+'33',color:C.fail,border:`2px solid ${C.fail}`,borderRadius:8,padding:'16px 30px',fontSize:15,fontFamily:mono,fontWeight:700,cursor:'pointer'}}>⏹ STOP & SAVE</button>
        </div>
        <div style=${{color:C.muted,fontFamily:mono,fontSize:10,marginTop:10}}>Recording will be saved when you stop</div>
      </div>
    </div>`:''}
    <style>@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}</style>
    <div style=${{maxWidth:600,margin:'0 auto',padding:16}}>
      <div style=${{...card({padding:14,marginBottom:14})}}>
        <div style=${{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
          <div style=${{color:AREA_COLORS[area],fontFamily:mono,fontSize:11,fontWeight:700}}>${area}</div>
          <button onClick=${()=>{setStep('areas');setQi(0);}} style=${{background:'transparent',color:C.muted,border:'none',fontFamily:mono,fontSize:10,cursor:'pointer',letterSpacing:0.8}}>← AREAS</button>
        </div>
        <div style=${{color:C.muted,fontSize:11,marginBottom:8}}>${info.site} • Week ${info.week} • ${info.auditor}</div>
        <${Bar} v=${((qi+1)/qs.length)*100} color=${AREA_COLORS[area]} h=${5}/>
        <div style=${{color:C.muted,fontSize:10,marginTop:4,textAlign:'right',fontFamily:mono}}>Q${qi+1}/${qs.length}</div>
      </div>
      <div style=${{...card({padding:20,marginBottom:14})}} class="fi">
        <div style=${{color:C.text,fontSize:15,fontWeight:500,lineHeight:1.6,marginBottom:22,minHeight:56}}>${cq}</div>
        <div style=${{display:'flex',gap:10,marginBottom:18}}>
          ${['PASS','FAIL','NA'].map(opt=>{const col=opt==='PASS'?C.pass:opt==='FAIL'?C.fail:C.na;const sel=ca.answer===opt;return html`<button key=${opt} onClick=${()=>setField(area,cq,'answer',opt)} style=${{flex:1,background:sel?col+'33':'transparent',color:col,border:`2px solid ${sel?col:col+'55'}`,borderRadius:6,padding:'15px 0',fontSize:13,fontFamily:mono,fontWeight:sel?700:400,cursor:'pointer',transition:'all 0.15s'}}>${opt==='PASS'?'✓ PASS':opt==='FAIL'?'✗ FAIL':'— NA'}</button>`;})}</div>
        <textarea placeholder="Add remark (optional)..." value=${ca.remark||''} onInput=${e=>setField(area,cq,'remark',e.target.value)} style=${{width:'100%',background:C.bg,color:C.text,border:`1px solid ${C.border}`,borderRadius:8,padding:12,fontSize:13,resize:'vertical',minHeight:68,marginBottom:12}}/>
        <div style=${{display:'flex',gap:8,flexWrap:'wrap'}}>
          <button onClick=${startCam} style=${{background:C.blue+'22',color:C.blue,border:`1px solid ${C.blue}`,borderRadius:6,padding:'9px 16px',fontSize:11,fontFamily:mono,fontWeight:600,cursor:'pointer',letterSpacing:0.8}}>📷 CAMERA</button>
          <button onClick=${()=>fRef.current?.click()} style=${{background:C.purple+'22',color:C.purple,border:`1px solid ${C.purple}`,borderRadius:6,padding:'9px 16px',fontSize:11,fontFamily:mono,fontWeight:600,cursor:'pointer',letterSpacing:0.8}}>📁 UPLOAD</button>
          <input ref=${fRef} type="file" accept="image/*" multiple style=${{display:'none'}} onChange=${e=>fileUp(e,area,cq)}/>
          <button onClick=${()=>startVidRec(area,cq)} style=${{background:'#06b6d422',color:'#06b6d4',border:`1px solid #06b6d4`,borderRadius:6,padding:'9px 16px',fontSize:11,fontFamily:mono,fontWeight:600,cursor:'pointer',letterSpacing:0.8}}>🎥 RECORD VIDEO</button>
          <button onClick=${()=>vfRef.current?.click()} style=${{background:'#0891b222',color:'#0891b2',border:`1px solid #0891b2`,borderRadius:6,padding:'9px 16px',fontSize:11,fontFamily:mono,fontWeight:600,cursor:'pointer',letterSpacing:0.8}}>📹 UPLOAD VIDEO</button>
          <input ref=${vfRef} type="file" accept="video/*" multiple style=${{display:'none'}} onChange=${e=>vidFileUp(e,area,cq)}/>
        </div>
        ${(ca.images||[]).length>0?html`<div style=${{display:'flex',flexWrap:'wrap',gap:8,marginTop:12}}>
          ${(ca.images||[]).map((img,j)=>html`<div key=${j} style=${{position:'relative'}}>
            <img src=${img} style=${{width:70,height:70,objectFit:'cover',borderRadius:6,border:`2px solid ${C.border}`,display:'block'}}/>
            <button onClick=${()=>setField(area,cq,'images',(ca.images||[]).filter((_,k)=>k!==j))} style=${{position:'absolute',top:-6,right:-6,background:C.fail,color:'#fff',border:'none',borderRadius:'50%',width:18,height:18,cursor:'pointer',fontSize:10,display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button>
          </div>`)}
        </div>`:''}
        ${(ca.videos||[]).length>0?html`
          <div style=${{marginTop:14,borderTop:`1px solid #06b6d433`,paddingTop:10}}>
            <div style=${{color:'#06b6d4',fontSize:10,fontFamily:mono,letterSpacing:1,marginBottom:8}}>VIDEO EVIDENCE (${(ca.videos||[]).length})</div>
            <div style=${{display:'flex',flexWrap:'wrap',gap:10}}>
              ${(ca.videos||[]).map((v,j)=>html`<div key=${j} style=${{position:'relative',background:C.bg,border:`2px solid #06b6d444`,borderRadius:8,overflow:'hidden'}}>
                <video src=${v.url} controls style=${{width:160,height:100,display:'block',objectFit:'cover'}}/>
                <div style=${{padding:'4px 8px',fontSize:9,color:C.muted,fontFamily:mono,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:160}}>${v.name}</div>
                <button onClick=${()=>setField(area,cq,'videos',(ca.videos||[]).filter((_,k)=>k!==j))} style=${{position:'absolute',top:4,right:4,background:C.fail,color:'#fff',border:'none',borderRadius:'50%',width:20,height:20,cursor:'pointer',fontSize:11,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700}}>✕</button>
              </div>`)}
            </div>
          </div>
        `:''}
      </div>
      <div style=${{display:'flex',gap:10}}>
        <button onClick=${()=>setQi(i=>Math.max(0,i-1))} disabled=${qi===0} style=${{flex:1,background:'transparent',color:qi===0?C.muted+'66':C.muted,border:`1px solid ${C.border}`,borderRadius:6,padding:'14px 0',fontSize:11,fontFamily:mono,fontWeight:600,cursor:qi===0?'default':'pointer',letterSpacing:0.8,opacity:qi===0?0.3:1}}>← PREV</button>
        ${qi<qs.length-1?html`<button onClick=${()=>setQi(i=>i+1)} disabled=${!ca.answer} style=${{flex:2,background:ca.answer?C.accentBg:'transparent',color:ca.answer?C.accent:C.muted,border:`2px solid ${ca.answer?C.accent:C.border}`,borderRadius:6,padding:'14px 0',fontSize:12,fontFamily:mono,fontWeight:700,cursor:ca.answer?'pointer':'default',letterSpacing:0.8,opacity:ca.answer?1:0.4}}>NEXT QUESTION →</button>`:
        html`<button onClick=${submitArea} disabled=${!areaOk} style=${{flex:2,background:areaOk?C.pass+'22':'transparent',color:areaOk?C.pass:C.muted,border:`2px solid ${areaOk?C.pass:C.border}`,borderRadius:6,padding:'14px 0',fontSize:12,fontFamily:mono,fontWeight:700,cursor:areaOk?'pointer':'default',letterSpacing:0.8,opacity:areaOk?1:0.4}}>✓ SUBMIT AREA</button>`}
      </div>
    </div>
  </div>`;

  if(step==='areas')return html`<div style=${{minHeight:'100vh',background:C.bg}}>
    <div style=${{maxWidth:600,margin:'0 auto',padding:16}}>
      <div style=${{...card({padding:16,marginBottom:20})}}>
        <div style=${{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div><div style=${{fontFamily:mono,fontSize:16,fontWeight:700,color:C.text}}>${info.site}</div><div style=${{color:C.muted,fontSize:12,marginTop:4}}>Week ${info.week} • ${info.auditor}</div></div>
          <button onClick=${onLogout} style=${{background:'transparent',color:C.muted,border:'none',fontFamily:mono,fontSize:10,cursor:'pointer',letterSpacing:0.8}}>LOGOUT</button>
        </div>
        <div style=${{marginTop:14}}>
          <${Bar} v=${(done.length/AREAS.length)*100} color=${C.pass} h=${6}/>
          <div style=${{color:C.muted,fontSize:11,marginTop:5,fontFamily:mono}}>${done.length}/${AREAS.length} areas completed</div>
        </div>
      </div>
      <div style=${{color:C.muted,fontSize:10,fontFamily:mono,letterSpacing:1.5,marginBottom:12}}>SELECT AREA TO AUDIT</div>
      ${AREAS.map(ar=>{const isDone=done.includes(ar);return html`<button key=${ar} onClick=${()=>{if(!isDone){setArea(ar);setStep('questions');setQi(0);}}} disabled=${isDone} style=${{display:'flex',justifyContent:'space-between',alignItems:'center',width:'100%',background:isDone?C.pass+'0f':C.card,border:`1px solid ${isDone?C.pass+'44':C.border}`,borderRadius:10,padding:'16px 20px',marginBottom:10,color:isDone?C.pass:C.text,cursor:isDone?'default':'pointer',textAlign:'left'}}>
        <div>
          <div style=${{fontFamily:mono,fontSize:13,fontWeight:isDone?700:400}}>${ar}</div>
          <div style=${{color:C.muted,fontSize:11,marginTop:4}}>${QUESTIONS[ar].length} questions</div>
        </div>
        <span style=${{fontSize:20,color:isDone?C.pass:C.muted}}>${isDone?'✓':'→'}</span>
      </button>`;})  }
      ${done.length===AREAS.length?html`<button onClick=${()=>submitAll()} style=${{width:'100%',background:C.pass+'22',color:C.pass,border:`2px solid ${C.pass}`,borderRadius:8,padding:'16px 0',fontSize:14,fontFamily:mono,fontWeight:700,cursor:'pointer',marginTop:12,letterSpacing:0.8}}>✓ SUBMIT ALL — RECORD RESPONSE</button>`:''}
    </div>
  </div>`;

  // INFO FORM
  return html`<div style=${{minHeight:'100vh',background:C.bg}}>
    <div style=${{maxWidth:500,margin:'0 auto',padding:16}}>
      <div style=${{textAlign:'center',padding:'28px 0 36px'}}>
        <div style=${{color:C.accent,fontFamily:mono,fontSize:10,letterSpacing:3}}>AUDIT ENTRY</div>
        <h1 style=${{color:C.text,fontFamily:mono,fontSize:22,fontWeight:700,marginTop:6}}>FILL SCORECARD</h1>
      </div>
      ${[{label:'SITE NAME',key:'site',type:'select'},{label:'DATE',key:'date',type:'date'},{label:'WEEK NUMBER (AUTO)',key:'week',type:'number',ro:true},{label:'AUDITOR NAME',key:'auditor',type:'text',ph:'Enter full name'}].map(f=>html`
        <div key=${f.key} style=${{marginBottom:18}}>
          <label style=${{color:C.muted,fontSize:10,fontFamily:mono,letterSpacing:1.5,display:'block',marginBottom:8}}>${f.label}</label>
          ${f.type==='select'?html`<select value=${info[f.key]} onChange=${e=>setInfo(p=>({...p,[f.key]:e.target.value}))} style=${{width:'100%',background:C.card,color:C.text,border:`1px solid ${C.border}`,borderRadius:8,padding:'13px 14px',fontSize:14,fontFamily:'IBM Plex Sans,sans-serif',cursor:'pointer'}}>
            ${SITES.map(s=>html`<option key=${s}>${s}</option>`)}
          </select>`:html`<input type=${f.type} readOnly=${f.ro} value=${info[f.key]} placeholder=${f.ph||''} onInput=${e=>{if(f.key==='date'){const d=new Date(e.target.value);setInfo(p=>({...p,date:e.target.value,week:isNaN(d)?p.week:getWeekNum(d)}));}else{setInfo(p=>({...p,[f.key]:e.target.value}));}}} style=${{width:'100%',background:f.ro?'#0a0d12':C.card,color:f.ro?C.muted:C.text,border:`1px solid ${C.border}`,borderRadius:8,padding:'13px 14px',fontSize:14,fontFamily:'IBM Plex Sans,sans-serif'}}/>`}
        </div>
      `)}
      <button onClick=${()=>info.auditor.trim()?setStep('areas'):alert('Please enter auditor name')} style=${{width:'100%',background:C.accentBg,color:C.accent,border:`2px solid ${C.accent}`,borderRadius:8,padding:'16px 0',fontSize:15,fontFamily:mono,fontWeight:700,cursor:'pointer',marginTop:8,letterSpacing:1}}>START AUDIT →</button>
      <button onClick=${onLogout} style=${{width:'100%',background:C.fail+'22',color:C.fail,border:`2px solid ${C.fail}`,borderRadius:8,padding:'14px 0',fontFamily:mono,fontSize:14,fontWeight:700,cursor:'pointer',marginTop:10,letterSpacing:0.8,transition:'all 0.15s'}} onMouseEnter=${e=>{e.target.style.background=C.fail;e.target.style.color='#fff';}} onMouseLeave=${e=>{e.target.style.background=C.fail+'22';e.target.style.color=C.fail;}}>← BACK TO HOME</button>
    </div>
  </div>`;
}

// ═══ LOGIN ═══
function LoginPage({type,onLogin,onBack}){
  const[id,setId]=useState('');const[pw,setPw]=useState('');const[err,setErr]=useState('');
  const handle=()=>{const cr=CREDS[type];if(id===cr.id&&pw===cr.password)onLogin();else setErr('Invalid credentials. Please try again.');};
  return html`<div style=${{minHeight:'100vh',background:C.bg,display:'flex',alignItems:'center',justifyContent:'center',padding:16}}>
    <div style=${{width:'100%',maxWidth:400}}>
      <div style=${{textAlign:'center',marginBottom:40}}>
        <div style=${{color:C.accent,fontFamily:mono,fontSize:10,letterSpacing:3,marginBottom:8}}>${type==='viewer'?'DASHBOARD ACCESS':'AUDITOR ACCESS'}</div>
        <h1 style=${{color:C.text,fontFamily:mono,fontSize:22,fontWeight:700}}>${type==='viewer'?'VIEW DASHBOARD':'FILL SCORECARD'}</h1>
      </div>
      <div style=${{...card({borderRadius:12,padding:32})}}>
        ${[{label:'USER ID',v:id,s:setId,t:'text'},{label:'PASSWORD',v:pw,s:setPw,t:'password'}].map(f=>html`
          <div key=${f.label} style=${{marginBottom:20}}>
            <label style=${{color:C.muted,fontSize:10,fontFamily:mono,letterSpacing:1.5,display:'block',marginBottom:8}}>${f.label}</label>
            <input type=${f.t} value=${f.v} onInput=${e=>{f.s(e.target.value);setErr('');}} onKeyDown=${e=>e.key==='Enter'&&handle()} style=${{width:'100%',background:C.bg,color:C.text,border:`1px solid ${C.border}`,borderRadius:8,padding:'13px 14px',fontSize:14,fontFamily:'IBM Plex Sans,sans-serif'}}/>
          </div>
        `)}
        ${err?html`<div style=${{color:C.fail,fontSize:12,marginBottom:16,fontFamily:mono}}>✗ ${err}</div>`:''}
        <div style=${{background:C.bg,border:`1px solid ${C.border}`,borderRadius:6,padding:12,marginBottom:18}}>
          <div style=${{color:C.muted,fontSize:9,fontFamily:mono,letterSpacing:1}}>DEMO CREDENTIALS</div>
          <div style=${{color:C.accent,fontSize:11,fontFamily:mono,marginTop:5}}>ID: ${CREDS[type].id} &nbsp;|&nbsp; Password: ${CREDS[type].password}</div>
        </div>
        <button onClick=${handle} style=${{width:'100%',background:C.accentBg,color:C.accent,border:`2px solid ${C.accent}`,borderRadius:8,padding:'14px 0',fontSize:14,fontFamily:mono,fontWeight:700,cursor:'pointer',letterSpacing:1}}>SUBMIT →</button>
        <button onClick=${onBack} style=${{width:'100%',background:'transparent',color:C.muted,border:'none',padding:'12px 0',fontFamily:mono,fontSize:11,cursor:'pointer',marginTop:8,letterSpacing:0.8}}>← BACK</button>
      </div>
    </div>
  </div>`;
}

// ═══ LANDING ═══

    <div style=${{textAlign:'center',marginBottom:64}}>

      <p style=${{color:C.muted,marginTop:20,fontSize:14,maxWidth:380,margin:'20px auto 0',lineHeight:1.6}}>Track, measure and improve distribution center performance across all 23 sites</p>

    </div>

// ═══ APP ═══
function App(){
  const[page,setPage]=useState('landing');

  // Init: load ALL records from per-record localStorage keys
  // Also migrates any data from the old single-blob audit_subs key
  const[subs,setSubs]=useState(()=>{
    try{return _loadAllRecs();}
    catch(e){console.warn('[AUDIT SYNC] Init load failed:',e);return{};}
  });

  const allData=useMemo(()=>mergeData(MOCK,subs),[subs]);

  // Derive active weeks from every stored record across all DCs
  const activeWeeks=useMemo(()=>{
    const ws=new Set();
    Object.values(subs).forEach(sd=>Object.keys(sd).forEach(wk=>ws.add(parseInt(wk))));
    return[...ws].sort((a,b)=>a-b);
  },[subs]);

  // ── handleSub: save per-record + merge into state + broadcast ──
  const handleSub=(site,wk,rec)=>{
    // Step 1: persist to localStorage immediately (images stripped to stay within quota)
    _saveRec(site,wk,rec);

    // Step 2: merge into in-memory state — functional update guarantees latest prev
    // Full rec (with images) stays in memory; only slim version in localStorage
    setSubs(p=>({...p,[site]:{...(p[site]||{}),[wk]:rec}}));

    // Step 3: broadcast slim record to other open tabs — they merge it in
    try{
      if(typeof BroadcastChannel!=='undefined'){
        const bc=new BroadcastChannel('audit_sync');
        bc.postMessage({type:'sub',site,wk,rec:_stripImages(rec)});
        bc.close();
      }
    }catch(e){console.warn('[AUDIT SYNC] Broadcast failed:',e);}
  };

  useEffect(()=>{
    // ── BroadcastChannel: receive submissions from other open tabs ──
    // MERGE into state — never replace, never lose existing entries
    let bc=null;
    try{
      if(typeof BroadcastChannel!=='undefined'){
        bc=new BroadcastChannel('audit_sync');
        bc.onmessage=(e)=>{
          if(e.data?.type==='sub'){
            const{site,wk,rec}=e.data;
            if(site&&wk&&rec){
              setSubs(p=>({...p,[site]:{...(p[site]||{}),[parseInt(wk)]:rec}}));
            }
          }
        };
      }
    }catch(e){console.warn('[AUDIT SYNC] BroadcastChannel setup failed:',e);}

    // ── Storage event: another tab wrote a per-record key ──
    // Parse the specific site+wk from the key and merge just that record
    const handler=(e)=>{
      if(!e.key||!e.key.startsWith(_PFX)||e.key===_PFX+'idx')return;
      if(!e.newValue)return;
      try{
        // Key format: audit_r2_{encodeURIComponent(site)}__{wk}
        const body=e.key.slice(_PFX.length);
        const dbl=body.lastIndexOf('__');
        if(dbl===-1)return;
        const site=decodeURIComponent(body.slice(0,dbl));
        const wk=parseInt(body.slice(dbl+2));
        const rec=JSON.parse(e.newValue);
        if(site&&!isNaN(wk)&&rec){
          // Merge this single record — do NOT replace the whole subs state
          setSubs(p=>({...p,[site]:{...(p[site]||{}),[wk]:rec}}));
        }
      }catch(e2){console.warn('[AUDIT SYNC] Storage event parse failed:',e2);}
    };
    window.addEventListener('storage',handler);

    return()=>{
      window.removeEventListener('storage',handler);
      if(bc){try{bc.close();}catch{}}
    };
  },[]);

  if(page==='landing')return html`<${Landing} onV=${()=>setPage('lv')} onF=${()=>setPage('fill')}/>`;
  if(page==='lv')return html`<${LoginPage} type="viewer" onLogin=${()=>setPage('dash')} onBack=${()=>setPage('landing')}/>`;
  if(page==='dash')return html`<${Dashboard} data=${allData} activeWeeks=${activeWeeks} subs=${subs} onLogout=${()=>setPage('landing')}/>`;
  if(page==='fill')return html`<${FillScorecard} onLogout=${()=>setPage('landing')} onSubmit=${handleSub}/>`;
  return null;
}

render(html`<${App}/>`,document.getElementById('app'));
</script>
