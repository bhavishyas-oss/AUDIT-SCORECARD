};

// ════════════════════════════════════════════════════════

// ════════════════════════════════════════════════════════
const C={bg:'#0d1117',card:'#161b22',border:'#30363d',accent:'#f59e0b',abl:'rgba(245,158,11,.1)',
  text:'#e6edf3',muted:'#8b949e',pass:'#10b981',fail:'#ef4444',na:'#6b7280',
  blue:'#3b82f6',purple:'#8b5cf6',cyan:'#06b6d4'};
const mono="'IBM Plex Mono',monospace";

// ════════════════════════════════════════════════════════
//  UTILITIES

const scCol=v=>v>=80?C.pass:v>=60?C.accent:C.fail;
const scLabel=v=>v>=80?'GOOD':v>=60?'MONITOR':'ACTION';
function weekNum(d){const u=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));const day=u.getUTCDay()||7;u.setUTCDate(u.getUTCDate()+4-day);const y=new Date(Date.UTC(u.getUTCFullYear(),0,1));return Math.ceil((((u-y)/864e5)+1)/7);}
function toNeg(q){const c=q.replace(/\?.*$/,'').trim().toUpperCase();if(c.startsWith('IS '))return'NO '+c.slice(3);if(c.startsWith('ARE '))return'NOT '+c.slice(4);if(c.startsWith('HAS '))return'HAS NOT '+c.slice(4);if(c.startsWith('HAVE '))return'HAVE NOT '+c.slice(5);if(c.startsWith('DOES '))return'DOES NOT '+c.slice(5);return'ISSUE: '+c;}
function parseAns(rec){try{const v=rec['Answers_JSON'];return typeof v==='string'?JSON.parse(v||'{}'):(v||{});}catch{return{};}}
function fmtW(w){return'W'+String(w).padStart(2,'0');}
const pct=(n,d)=>d===0?0:Math.round(n/d*100);

// ── Image compression (for local storage when Cloudinary not configured) ──
// Compresses to max 400px wide at 0.55 quality → ~8-20KB per image (~11-27KB base64)
async function compressImg(src,maxW=400,q=0.55){
  return new Promise(res=>{
    const img=new Image();
    img.onload=()=>{
      const ratio=Math.min(1,maxW/img.width);
      const w=Math.round(img.width*ratio),h=Math.round(img.height*ratio);
      const cv=document.createElement('canvas');cv.width=w;cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);
      res(cv.toDataURL('image/jpeg',q));
    };
    img.onerror=()=>res(src);// fallback to original on error
    img.src=typeof src==='string'?src:URL.createObjectURL(src);
  });
}

// ── Convert any video source → base64 data URI for Drive storage ──
// Apps Script receives this, saves the file to Google Drive, and
// replaces the base64 with a permanent Drive preview URL.
async function vidSrcToBase64(src){
  try{
    let blob;
    if(src instanceof File||src instanceof Blob){blob=src;}
    else if(typeof src==='string'&&src.startsWith('blob:')){blob=await fetch(src).then(r=>r.blob());}
    else if(typeof src==='string'&&src.startsWith('data:')){return src;}// already encoded
    else return null;
    // Warn if video is very large (>25 MB)
    if(blob.size>25*1024*1024){console.warn('Video >25MB, may be slow to upload:',blob.size);} 
    return new Promise((res,rej)=>{
      const rd=new FileReader();
      rd.onload=e=>res(e.target.result);
      rd.onerror=()=>rej(new Error('FileReader failed'));
      rd.readAsDataURL(blob);
    });
  }catch(e){console.warn('vidSrcToBase64:',e);return null;}
}

// ════════════════════════════════════════════════════════
//  SHEET COMMUNICATION
// ════════════════════════════════════════════════════════
const sheetOK=()=>SHEET_URL&&!SHEET_URL.startsWith('YOUR_');
const cloudOK=()=>CL_CLOUD&&!CL_CLOUD.startsWith('YOUR_');

// ── Cloud upload (Cloudinary) ──
async function uploadToCloud(src,type='image'){
  if(!cloudOK())return null;
  const fd=new FormData();fd.append('upload_preset',CL_PRESET);
  let blob;
  if(src instanceof File||src instanceof Blob)blob=src;
  else if(typeof src==='string'&&(src.startsWith('data:')||src.startsWith('blob:')))blob=await fetch(src).then(r=>r.blob());
  else return null;
  fd.append('file',blob);
  const res=await fetch(`https://api.cloudinary.com/v1_1/${CL_CLOUD}/${type}/upload`,{method:'POST',body:fd});
  const d=await res.json();if(d.secure_url)return d.secure_url;throw new Error(d.error?.message||'Upload failed');
}

// ── Smart media handler: cloud if configured, compressed base64 fallback ──
async function uploadMedia(src,type='image'){
  // Try cloud first
  if(cloudOK())return uploadToCloud(src,type);
  // Fallback: compress and embed as base64 (images only — videos too large)
  if(type!=='image')return null;
  try{
    let dataUrl;
    if(src instanceof File||src instanceof Blob){
      dataUrl=await new Promise(r=>{const rd=new FileReader();rd.onload=e=>r(e.target.result);rd.readAsDataURL(src);});
    }else if(typeof src==='string'&&src.startsWith('data:')){dataUrl=src;}
    else if(typeof src==='string'&&src.startsWith('blob:')){
      const b=await fetch(src).then(r=>r.blob());
      dataUrl=await new Promise(r=>{const rd=new FileReader();rd.onload=e=>r(e.target.result);rd.readAsDataURL(b);});
    }else return null;
    return await compressImg(dataUrl);// returns compressed base64 data URI
  }catch(e){console.warn('compress fail',e);return null;}
}

async function postToSheet(payload){
  if(!sheetOK())throw new Error('Apps Script URL not configured.');
  try{await fetch(SHEET_URL,{method:'POST',mode:'no-cors',body:JSON.stringify(payload)});return{ok:true};}
  catch(e){throw new Error('Network error: '+e.message);}
}

// ── Fetch with in-memory cache for speed ──
const _cache={data:null,ts:0};
const CACHE_TTL=60000;// 60s — serve stale while refreshing

function _jsonp(url){
  return new Promise((res,rej)=>{
    const cb='_gs_'+Date.now()+'_'+Math.random().toString(36).slice(2,7);
    const tag=document.createElement('script');
    const t=setTimeout(()=>{cleanup();rej(new Error('Timed out after 15s.\nVerify Apps Script deploy: Execute as Me, Access: Anyone'));},15000);
    const cleanup=()=>{clearTimeout(t);try{delete window[cb];}catch(_){}tag.parentNode?.removeChild(tag);};
    window[cb]=data=>{cleanup();res(data);};
    tag.src=url+(url.includes('?')?'&':'?')+'callback='+cb+'&_t='+Date.now();
    tag.onerror=()=>{cleanup();rej(new Error('Cannot reach Apps Script.\nDeploy → Web App → Access: Anyone'));};
    document.head.appendChild(tag);
  });
}

async function fetchSheet(force=false){
  if(!sheetOK())return{ok:false,records:[],error:'Apps Script URL not configured.'};
  // Return cache immediately if fresh enough
  if(!force&&_cache.data&&Date.now()-_cache.ts<CACHE_TTL)return _cache.data;
  const result=await _jsonp(SHEET_URL+'?action=get');
  if(result.ok){
    // Remove legacy weeks (12-16) at fetch time — never shown anywhere
    const PURGE_WEEKS=new Set([12,13,14,15,16]);
    result.records=(result.records||[]).filter(r=>!PURGE_WEEKS.has(Number(r['Week_No'])));
    _cache.data=result;_cache.ts=Date.now();
  }
  return result;
}

// Chart.js wrapper
function ChartComp({type,data,options,style={}}){
  const ref=useRef(null);const inst=useRef(null);
  const sig=useMemo(()=>JSON.stringify({type,data,options}),[type,data,options]);
  useEffect(()=>{
    if(!ref.current||!window.Chart)return;
    inst.current?.destroy();inst.current=null;
    try{inst.current=new window.Chart(ref.current,{type,data,options});}catch(e){console.warn('Chart err',e);}
    return()=>{inst.current?.destroy();inst.current=null;};
  },[sig]);
  return html`<canvas ref=${ref} style=${style}/>`;
}

// ════════════════════════════════════════════════════════
//  VIDEO URL UTILITIES
// ════════════════════════════════════════════════════════
function resolveVideoUrl(url){
  if(!url||typeof url!=='string')return null;
  // Google Drive /file/d/ID/view|/preview|/edit
  const gdFile=url.match(/drive\.google\.com\/file\/d\/([a-zA-Z0-9_-]+)/);
  if(gdFile){const id=gdFile[1];return{type:'drive',id,
    preview:`https://drive.google.com/file/d/${id}/preview`,
    download:`https://drive.google.com/uc?id=${id}&export=download`,
    view:`https://drive.google.com/file/d/${id}/view`};}
  // Google Drive /open?id=ID
  const gdOpen=url.match(/drive\.google\.com\/open\?id=([a-zA-Z0-9_-]+)/);
  if(gdOpen){const id=gdOpen[1];return{type:'drive',id,
    preview:`https://drive.google.com/file/d/${id}/preview`,
    download:`https://drive.google.com/uc?id=${id}&export=download`,
    view:`https://drive.google.com/file/d/${id}/view`};}
  // Google Drive uc?id=ID (already a direct link)
  const gdUc=url.match(/drive\.google\.com\/uc\?.*id=([a-zA-Z0-9_-]+)/);
  if(gdUc){const id=gdUc[1];return{type:'drive',id,
    preview:`https://drive.google.com/file/d/${id}/preview`,
    download:`https://drive.google.com/uc?id=${id}&export=download`,
    view:`https://drive.google.com/file/d/${id}/view`};}
  // Base64 data URI (never expires — self-contained)
  if(url.startsWith('data:video/')||url.startsWith('data:application/octet-stream'))
    return{type:'data',src:url};
  // Blob URL (same-session only)
  if(url.startsWith('blob:'))return{type:'blob',src:url};
  // Direct HTTP/HTTPS (Cloudinary, CDN, etc.)
  if(url.startsWith('http'))return{type:'direct',src:url};
  return null;
}

// Download a video from any source type
async function downloadVideo(resolved,name){
  const fname=(name||'audit_video').replace(/\.[^.]+$/,'');
  if(resolved.type==='drive'){
    // Open Drive download in new tab
    window.open(resolved.download,'_blank');return;
  }
  if(resolved.type==='data'){
    const ext=resolved.src.includes('webm')?'.webm':resolved.src.includes('mp4')?'.mp4':'.webm';
    const a=document.createElement('a');a.href=resolved.src;a.download=fname+ext;
    document.body.appendChild(a);a.click();document.body.removeChild(a);return;
  }
  if(resolved.type==='blob'){
    // Try fetching the blob (works if still alive in this session)
    try{
      const r=await fetch(resolved.src);if(!r.ok)throw new Error('Blob expired');
      const blob=await r.blob();
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');a.href=url;a.download=fname+'.webm';
      document.body.appendChild(a);a.click();document.body.removeChild(a);
      setTimeout(()=>URL.revokeObjectURL(url),5000);
    }catch(e){alert('This video has expired and cannot be downloaded.\nPlease resubmit the scorecard to record it again.');}
    return;
  }
  if(resolved.type==='direct'){
    const a=document.createElement('a');a.href=resolved.src;a.download=fname;
    a.target='_blank';document.body.appendChild(a);a.click();document.body.removeChild(a);
  }
}

function VideoPlayer({src,name}){

  const resolved=useMemo(()=>resolveVideoUrl(src),[src]);

  // Reset state when src changes
  useEffect(()=>{setPhase('loading');setRetries(0);},[src]);

  const retry=()=>{
    setPhase('loading');setRetries(r=>r+1);
    if(videoRef.current){videoRef.current.load();}

      </div>
    </div>`;
  }

  // ────────────────────────────────────────────────────

  // ────────────────────────────────────────────────────
  if(resolved.type==='data'){

      ${phase==='loading'?html`<div style=${{background:'#000',borderRadius:10,height:60,display:'flex',alignItems:'center',justifyContent:'center'}}><span class="spin" style=${{color:C.accent,fontSize:22}}>◎</span></div>`:''}

          style=${{background:'rgba(16,185,129,.1)',color:C.pass,border:`1px solid ${C.pass}44`,borderRadius:6,padding:'8px 18px',fontFamily:mono,fontSize:11,fontWeight:700,cursor:'pointer',letterSpacing:.6}}>
          ⬇ DOWNLOAD VIDEO
        </button>
        ${phase==='error'?html`<button onClick=${retry}
          style=${{background:'rgba(245,158,11,.1)',color:C.accent,border:`1px solid ${C.accent}44`,borderRadius:6,padding:'8px 18px',fontFamily:mono,fontSize:11,fontWeight:700,cursor:'pointer',letterSpacing:.6}}>
          ↺ RETRY
        </button>`:''}

  // ────────────────────────────────────────────────────
  //  BLOB URL  — valid in current session only
  //  Try playing; if it fails offer diagnosis + actions
  // ────────────────────────────────────────────────────
  if(resolved.type==='blob'){
    if(phase==='error'){
      return html`<div style=${{display:'flex',flexDirection:'column',width:'100%',gap:12}}>
        <div style=${{background:'#0d1117',border:`1px solid ${C.fail}33`,borderRadius:10,padding:'28px 20px',textAlign:'center'}}>

      </div>
    </div>`;
  }

  // ────────────────────────────────────────────────────
  //  DIRECT HTTP/HTTPS  — Cloudinary, CDN, etc.
  // ────────────────────────────────────────────────────
  if(phase==='error'){

        </button>
        <a href=${resolved.src} target="_blank"
          style=${{background:'rgba(6,182,212,.1)',color:C.cyan,border:`1px solid ${C.cyan}44`,borderRadius:6,padding:'7px 14px',fontFamily:mono,fontSize:11,fontWeight:700,textDecoration:'none'}}>
          🔗 OPEN IN NEW TAB
        </a>
        <button onClick=${()=>downloadVideo(resolved,name)}
          style=${{background:'rgba(16,185,129,.1)',color:C.pass,border:`1px solid ${C.pass}44`,borderRadius:6,padding:'7px 14px',fontFamily:mono,fontSize:11,fontWeight:700,cursor:'pointer'}}>

    ${phase==='loading'?html`<div style=${{background:'#000',borderRadius:10,height:60,display:'flex',alignItems:'center',justifyContent:'center'}}><span class="spin" style=${{color:C.accent,fontSize:22}}>◎</span></div>`:''}
    <video ref=${videoRef} src=${resolved.src} controls preload="auto"
      key=${retries}
      onLoadedData=${()=>setPhase('playing')}
      onCanPlay=${()=>setPhase('playing')}
      onError=${()=>{if(retries<1){setRetries(1);if(videoRef.current)videoRef.current.load();}else setPhase('error');}}
      style=${{width:'100%',maxHeight:'65vh',display:phase==='loading'?'none':'block',borderRadius:10,background:'#000'}}/>

function Annotate({src,onSave,onDiscard}){
  const cv=useRef(null);const[draw,setDraw]=useState(false);const[clr,setClr]=useState('#ef4444');const[sz,setSz]=useState(4);const[tool,setTool]=useState('pen');const last=useRef(null);
  useEffect(()=>{if(!cv.current||!src)return;const el=cv.current,ctx=el.getContext('2d'),img=new Image();img.onload=()=>{el.width=img.naturalWidth;el.height=img.naturalHeight;ctx.drawImage(img,0,0);};img.src=src;},[src]);
  const pt=(e,el)=>{const r=el.getBoundingClientRect(),s=e.touches?e.touches[0]:e;return{x:(s.clientX-r.left)*el.width/r.width,y:(s.clientY-r.top)*el.height/r.height};};
  const sd=e=>{setDraw(true);last.current=pt(e,cv.current);};
  const dd=e=>{if(!draw||!cv.current)return;e.preventDefault();const ctx=cv.current.getContext('2d'),p=pt(e,cv.current);ctx.beginPath();ctx.moveTo(last.current.x,last.current.y);ctx.lineTo(p.x,p.y);ctx.strokeStyle=tool==='eraser'?'#fff':clr;ctx.lineWidth=tool==='eraser'?sz*6:sz;ctx.lineCap='round';ctx.lineJoin='round';ctx.globalCompositeOperation=tool==='eraser'?'destination-out':'source-over';ctx.stroke();last.current=p;};
  const ed=()=>{setDraw(false);last.current=null;};
  const COLS=['#ef4444','#f59e0b','#10b981','#3b82f6','#8b5cf6','#ffffff','#111111'];
  return html`<div class="overlay" onClick=${e=>e.stopPropagation()}>
    <div style=${{background:C.card,borderRadius:12,padding:16,width:'100%',maxWidth:680,maxHeight:'92vh',display:'flex',flexDirection:'column',gap:10}}>
      <div style=${{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <span style=${{color:C.accent,fontFamily:mono,fontSize:12,fontWeight:700}}>✏ ANNOTATE IMAGE</span>
        <div style=${{display:'flex',gap:8}}>
          <button onClick=${()=>cv.current&&onSave(cv.current.toDataURL())} style=${{background:C.pass+'33',color:C.pass,border:`1px solid ${C.pass}`,borderRadius:6,padding:'6px 16px',fontFamily:mono,fontSize:12,fontWeight:700,cursor:'pointer'}}>✓ SAVE</button>
          <button onClick=${onDiscard} style=${{background:C.fail+'22',color:C.fail,border:`1px solid ${C.fail}`,borderRadius:6,padding:'6px 16px',fontFamily:mono,fontSize:12,cursor:'pointer'}}>✕ DISCARD</button>
        </div>
      </div>
      <div style=${{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
        <div style=${{display:'flex',gap:5}}>${COLS.map(c=>html`<div key=${c} onClick=${()=>{setClr(c);setTool('pen');}} style=${{width:22,height:22,borderRadius:'50%',background:c,cursor:'pointer',border:`2px solid ${clr===c&&tool==='pen'?'#fff':C.border}`}}/>`)}</div>
        <div style=${{display:'flex',gap:5}}>${[2,4,8,14].map(s=>html`<div key=${s} onClick=${()=>setSz(s)} style=${{width:s+10,height:s+10,borderRadius:'50%',background:sz===s?C.accent:C.muted,cursor:'pointer',border:`2px solid ${sz===s?C.accent:C.border}`}}/>`)}</div>
        <button onClick=${()=>setTool(t=>t==='eraser'?'pen':'eraser')} style=${{background:tool==='eraser'?C.abl:'transparent',color:tool==='eraser'?C.accent:C.muted,border:`1px solid ${tool==='eraser'?C.accent:C.border}`,borderRadius:6,padding:'4px 12px',fontFamily:mono,fontSize:11,cursor:'pointer'}}>⬜ ERASER</button>
      </div>
      <div style=${{overflow:'auto',flex:1,borderRadius:8,border:`1px solid ${C.border}`,background:'#000',display:'flex',justifyContent:'center',alignItems:'center'}}>
        <canvas ref=${cv} style=${{maxWidth:'100%',maxHeight:'56vh',cursor:'crosshair',touchAction:'none'}} onMouseDown=${sd} onMouseMove=${dd} onMouseUp=${ed} onMouseLeave=${ed} onTouchStart=${sd} onTouchMove=${dd} onTouchEnd=${ed}/>
      </div>
    </div>
  </div>`;
}

//  FILL SCORECARD  — UNCHANGED (DO NOT MODIFY)

function FillScorecard({onBack}){
  const[step,setStep]=useState('info');
  const[info,setInfo]=useState({site:SITES[0],date:new Date().toISOString().slice(0,10),week:weekNum(new Date()),auditor:''});
  const[doneAr,setDoneAr]=useState([]);const[curAr,setCurAr]=useState(null);const[ans,setAns]=useState({});const[qi,setQi]=useState(0);
  const[cam,setCam]=useState(false);const[stream,setStream]=useState(null);
  const[vRec,setVRec]=useState(false);const[vStream,setVStream]=useState(null);const[mRec,setMRec]=useState(null);
  const[ann,setAnn]=useState(null);const[upP,setUpP]=useState({done:0,total:0,phase:''});const[errMsg,setErrMsg]=useState('');
  const vRef=useRef(null),cRef=useRef(null),fRef=useRef(null),vfRef=useRef(null),vvRef=useRef(null);
  const setFld=(ar,q,f,v)=>setAns(p=>({...p,[ar]:{...(p[ar]||{}),[q]:{...(p[ar]?.[q]||{answer:null,remark:'',images:[],videos:[]}),[f]:v}}}));
  const getA=(ar,q)=>ans[ar]?.[q]||{answer:null,remark:'',images:[],videos:[]};
  const startCam=async()=>{try{const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});setStream(s);setCam(true);setTimeout(()=>{if(vRef.current)vRef.current.srcObject=s;},80);}catch{alert('Camera unavailable — use file upload.');}};
  const capPhoto=(ar,q)=>{const el=cRef.current,vd=vRef.current;if(!el||!vd)return;el.width=vd.videoWidth||640;el.height=vd.videoHeight||480;el.getContext('2d').drawImage(vd,0,0);const img=el.toDataURL();if(stream)stream.getTracks().forEach(t=>t.stop());setStream(null);setCam(false);setAnn({src:img,ar,q});};
  const stopCam=()=>{if(stream)stream.getTracks().forEach(t=>t.stop());setStream(null);setCam(false);};
  const startVid=async(ar,q)=>{
    try{const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'},audio:true});setVStream(s);setVRec(true);setTimeout(()=>{if(vvRef.current)vvRef.current.srcObject=s;},80);
    const chunks=[];const mr=new MediaRecorder(s,{mimeType:MediaRecorder.isTypeSupported('video/webm;codecs=vp9')?'video/webm;codecs=vp9':'video/webm'});
    mr.ondataavailable=e=>{if(e.data.size>0)chunks.push(e.data);};
    mr.onstop=()=>{const blob=new Blob(chunks,{type:'video/webm'});const url=URL.createObjectURL(blob);setFld(ar,q,'videos',[...getA(ar,q).videos,{url,blob,name:'REC_'+Date.now()+'.webm'}]);if(s)s.getTracks().forEach(t=>t.stop());setVStream(null);setVRec(false);setMRec(null);};
    mr.start();setMRec({rec:mr});}catch{alert('Camera/mic unavailable.');}
  };
  const stopVid=()=>{if(mRec)mRec.rec.stop();};
  const vidFile=(e,ar,q)=>{Array.from(e.target.files).forEach(f=>{const url=URL.createObjectURL(f);setFld(ar,q,'videos',[...getA(ar,q).videos,{url,file:f,name:f.name}]);});e.target.value='';};
  const imgFile=(e,ar,q)=>{Array.from(e.target.files).forEach(f=>{const r=new FileReader();r.onload=ev=>setFld(ar,q,'images',[...getA(ar,q).images,ev.target.result]);r.readAsDataURL(f);});e.target.value='';};
  const submitArea=()=>{const nd=[...doneAr,curAr];setDoneAr(nd);setCurAr(null);setStep('areas');setQi(0);};
  const submitAll=async()=>{
    let totalMedia=0;Object.values(ans).forEach(aq=>Object.values(aq).forEach(a=>{totalMedia+=(a.images||[]).length+(a.videos||[]).length;}));
    setUpP({done:0,total:totalMedia,phase:'uploading'});setStep('uploading');let uploaded=0;const processed={};
    for(const ar of AREAS){processed[ar]={};for(const q of QS[ar]){
      const a=ans[ar]?.[q]||{answer:'NA',remark:'',images:[],videos:[]};const imgURLs=[],vidURLs=[];
      for(const img of(a.images||[])){
        try{
          // uploadMedia now handles both cloud and local-base64 fallback
          const u=await uploadMedia(img,'image');if(u)imgURLs.push(u);
        }catch(e){console.warn('img:',e);}
        uploaded++;setUpP({done:uploaded,total:totalMedia,phase:'uploading'});
      }
      for(const vid of(a.videos||[])){
        try{
          const src=vid.blob||vid.file||vid.url;
          if(cloudOK()){
            // Cloudinary path — upload directly to cloud
            const u=await uploadToCloud(src,'video');if(u)vidURLs.push(u);
          }else{
            // No Cloudinary: encode as base64 data URI.
            // Apps Script doPost() will detect this, save to Google Drive,
            // and replace with a permanent Drive preview URL in the sheet.
            const dataUri=await vidSrcToBase64(src);
            if(dataUri){vidURLs.push(dataUri);}
            else if(vid.url){vidURLs.push(vid.url);}// last-resort blob fallback
          }
        }catch(e){console.warn('vid:',e);}
        uploaded++;setUpP({done:uploaded,total:totalMedia,phase:'uploading'});
      }

    const score=tot>0?Math.round(pass/tot*100):0;
    setUpP(p=>({...p,phase:'submitting'}));
    try{await postToSheet({site:info.site,week:parseInt(info.week),date:new Date(info.date).toLocaleDateString('en-IN'),auditor:info.auditor,score,areaScores,answers:processed});setUpP({done:0,total:0,phase:''});setStep('done');}
    catch(e){setUpP({done:0,total:0,phase:''});setErrMsg(e.message||'Submission failed.');setStep('error');}
  };
  const qs=curAr?QS[curAr]:[];const cq=qs[qi]||'';const ca=getA(curAr,cq);
  const arOk=qs.length>0&&qs.every(q=>['PASS','FAIL','NA'].includes(getA(curAr,q).answer));
  if(step==='done')return html`<div style=${{minHeight:'100vh',background:C.bg,display:'flex',alignItems:'center',justifyContent:'center'}}><div style=${{textAlign:'center',padding:40}} class="fi"><div style=${{fontSize:72,color:C.pass,marginBottom:16}}>✓</div><div style=${{color:C.pass,fontFamily:mono,fontSize:22,fontWeight:700,marginBottom:10}}>RESPONSE RECORDED</div><div style=${{color:C.muted,fontSize:14,marginBottom:6}}>Audit submitted for <b style=${{color:C.text}}>${info.site}</b></div><div style=${{color:C.muted,fontFamily:mono,fontSize:13,marginBottom:32}}>Week ${info.week} · ${info.auditor}</div>${!cloudOK()?html`<div style=${{background:'#0a1a2a',border:`1px solid #3b82f644`,borderRadius:8,padding:12,marginBottom:14,color:'#60a5fa',fontSize:12,fontFamily:mono,lineHeight:1.7}}>ℹ Images compressed and stored in sheet.<br/>Videos saved to Google Drive automatically — links persist forever.</div>`:''}<button onClick=${onBack} style=${{background:C.abl,color:C.accent,border:`2px solid ${C.accent}`,borderRadius:8,padding:'14px 32px',fontSize:14,fontFamily:mono,fontWeight:700,cursor:'pointer',letterSpacing:1}}>← BACK TO HOME</button></div></div>`;
  if(step==='error')return html`<div style=${{minHeight:'100vh',background:C.bg,display:'flex',alignItems:'center',justifyContent:'center'}}><div style=${{textAlign:'center',padding:40,maxWidth:460}} class="fi"><div style=${{fontSize:60,marginBottom:12}}>⚠</div><div style=${{color:C.fail,fontFamily:mono,fontSize:18,fontWeight:700,marginBottom:12}}>SUBMISSION FAILED</div><div style=${{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:14,color:C.muted,fontSize:12,marginBottom:22,wordBreak:'break-all',whiteSpace:'pre-line'}}>${errMsg}</div><div style=${{display:'flex',gap:12,justifyContent:'center',flexWrap:'wrap'}}><button onClick=${()=>setStep('areas')} style=${{background:'transparent',color:C.muted,border:`1px solid ${C.border}`,borderRadius:8,padding:'12px 22px',fontFamily:mono,fontSize:13,cursor:'pointer'}}>← GO BACK</button><button onClick=${submitAll} style=${{background:C.fail+'22',color:C.fail,border:`2px solid ${C.fail}`,borderRadius:8,padding:'12px 22px',fontFamily:mono,fontSize:13,fontWeight:700,cursor:'pointer'}}>↺ RETRY</button></div></div></div>`;
  if(step==='uploading')return html`<${UploadModal} done=${upP.done} total=${upP.total} phase=${upP.phase}/>`;
  if(step==='questions'&&curAr)return html`<div style=${{minHeight:'100vh',background:C.bg}}>
    ${ann?html`<${Annotate} src=${ann.src} onSave=${s=>{setFld(ann.ar,ann.q,'images',[...getA(ann.ar,ann.q).images,s]);setAnn(null);}} onDiscard=${()=>setAnn(null)}/>`:''}
    ${cam?html`<div class="overlay"><div style=${{textAlign:'center',width:'100%',maxWidth:480}}><video ref=${vRef} autoPlay playsinline style=${{width:'100%',borderRadius:8}}/><canvas ref=${cRef} style=${{display:'none'}}/><div style=${{display:'flex',gap:14,marginTop:14,justifyContent:'center'}}><button onClick=${()=>capPhoto(curAr,cq)} style=${{background:C.pass+'33',color:C.pass,border:`2px solid ${C.pass}`,borderRadius:8,padding:'14px 28px',fontSize:14,fontFamily:mono,fontWeight:700,cursor:'pointer'}}>📸 CAPTURE</button><button onClick=${stopCam} style=${{background:C.fail+'33',color:C.fail,border:`2px solid ${C.fail}`,borderRadius:8,padding:'14px 20px',fontFamily:mono,fontWeight:700,cursor:'pointer'}}>✕</button></div></div></div>`:''}
    ${vRec?html`<div class="overlay"><div style=${{textAlign:'center',width:'100%',maxWidth:480}}><div style=${{display:'inline-flex',alignItems:'center',gap:8,background:C.fail+'22',border:`2px solid ${C.fail}`,borderRadius:6,padding:'6px 14px',marginBottom:10,fontFamily:mono,fontSize:12,color:C.fail}}><span class="blink" style=${{width:10,height:10,borderRadius:'50%',background:C.fail,display:'inline-block'}}/>⏺ RECORDING…</div><video ref=${vvRef} autoPlay playsinline muted style=${{width:'100%',borderRadius:8}}/><div style=${{display:'flex',gap:14,marginTop:14,justifyContent:'center'}}><button onClick=${stopVid} style=${{background:C.fail+'33',color:C.fail,border:`2px solid ${C.fail}`,borderRadius:8,padding:'14px 28px',fontSize:14,fontFamily:mono,fontWeight:700,cursor:'pointer'}}>⏹ STOP & SAVE</button></div></div></div>`:''}
    <div style=${{maxWidth:600,margin:'0 auto',padding:16}}>
      <div style=${{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:14,marginBottom:14}}><div style=${{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}><span style=${{color:ACLR[curAr],fontFamily:mono,fontSize:11,fontWeight:700}}>${curAr}</span><button onClick=${()=>{setStep('areas');setQi(0);}} style=${{background:'rgba(245,158,11,.15)',color:C.accent,border:`2px solid ${C.accent}66`,fontFamily:mono,fontSize:12,fontWeight:700,cursor:'pointer',padding:'5px 14px',borderRadius:6,letterSpacing:.6}}>☰ AREAS</button></div><div style=${{color:C.muted,fontSize:11,marginBottom:8}}>${info.site} · Week ${info.week} · ${info.auditor}</div><${PBar} v=${((qi+1)/qs.length)*100} color=${ACLR[curAr]}/><div style=${{color:C.muted,fontSize:10,marginTop:4,textAlign:'right',fontFamily:mono}}>Q${qi+1}/${qs.length}</div></div>
      <div style=${{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:20,marginBottom:14}} class="fi">
        <div style=${{color:C.text,fontSize:15,fontWeight:500,lineHeight:1.6,marginBottom:20,minHeight:54}}>${cq}</div>

function generateEmailReport(records,activeWeeks,displayWeek,downloadOnly=false){
  // All weeks from data, dynamically (week 16 already filtered from records)
  const allWeeks=[...new Set(records.map(r=>Number(r['Week_No'])).filter(Boolean))].sort((a,b)=>a-b);

  // Network avg for display week
  const wRecs=records.filter(r=>Number(r['Week_No'])===displayWeek);
  const netAvg=wRecs.length?Math.round(wRecs.reduce((s,r)=>s+(Number(r['Overall_Score_%'])||0),0)/wRecs.length):0;

  // Weekly performance table
  const siteWeekMap={};
  records.forEach(r=>{const site=String(r['Site']||'');const wk=Number(r['Week_No']);if(site&&wk){if(!siteWeekMap[site])siteWeekMap[site]={};siteWeekMap[site][wk]=Number(r['Overall_Score_%'])||0;}});

  // Sorted by score for current week
  const wScores=wRecs.map(r=>({site:String(r['Site']||''),score:Number(r['Overall_Score_%'])||0})).sort((a,b)=>b.score-a.score);
  const top3=wScores.slice(0,3);
  const bot3=[...wScores].sort((a,b)=>a.score-b.score).slice(0,3);

  // Master comparison
  const allQ=[];AREAS.forEach(area=>(QS[area]||[]).forEach(q=>allQ.push({area,q})));
  const ansMap={};
  wRecs.forEach(r=>{const site=String(r['Site']||'');const ans=parseAns(r);ansMap[site]=ans;});
  const auditedSites=wRecs.map(r=>String(r['Site']||'')).filter(Boolean);

  // DC breakdowns — include images and video links
  const dcBreakdowns=wRecs.map(r=>{
    const site=String(r['Site']||'');const ans=parseAns(r);const score=Number(r['Overall_Score_%'])||0;
    const areas=AREAS.map(area=>{
      const aScore=Number(r[ACOL[area]])||0;const fails=[];
      Object.entries(ans[area]||{}).forEach(([q,a])=>{
        if(a?.answer==='FAIL'){
          const imgs=(a.imageURLs||[]).filter(u=>u&&(u.startsWith('http')||u.startsWith('data:')));
          const vids=(a.videoURLs||[]).filter(u=>u&&(u.startsWith('http')||u.startsWith('blob:')));
          fails.push({neg:toNeg(q),remark:a.remark||'',imgs,vids});
        }
      });
      return{area,aScore,fails};
    });
    return{site,score,areas,auditor:String(r['Auditor']||'—'),date:String(r['Audit_Date']||'—')};
  });

  const sc=(v)=>v>=80?'g':v>=60?'a':'r';
  const colBg=(v)=>v>=80?'#d1fae5':v>=60?'#fef3c7':'#fee2e2';
  const colFg=(v)=>v>=80?'#065f46':v>=60?'#92400e':'#991b1b';

  const htmlBody=`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Collated Audit Report — ${fmtW(displayWeek)}</title>

<div class="section-title">A. OVERALL NETWORK PERFORMANCE — ${fmtW(displayWeek)}</div>

${AREAS.map(area=>{const avg=wRecs.length?Math.round(wRecs.reduce((s,r)=>s+(Number(r[ACOL[area]])||0),0)/wRecs.length):0;return`<tr><td class="left">${area}</td><td class="${sc(avg)}">${avg}%</td></tr>`;}).join('')}

${SITES.map(site=>{const wkVals=allWeeks.map(wk=>siteWeekMap[site]?.[wk]??null);const valid=wkVals.filter(v=>v!==null);const avg=valid.length?Math.round(valid.reduce((a,b)=>a+b,0)/valid.length):null;
return`<tr><td class="left" style="font-weight:600">${site}</td>${wkVals.map(v=>v===null?'<td class="n">—</td>':`<td class="${sc(v)}">${v}%</td>`).join('')}<td style="background:${avg!==null?colBg(avg):'#f8fafc'};color:${avg!==null?colFg(avg):'#94a3b8'};font-weight:700;text-align:center">${avg!==null?avg+'%':'—'}</td></tr>`;}).join('')}

  if(downloadOnly){

    <div style=${{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(155px,1fr))',gap:12,marginBottom:24}}>
      <div class="stat-card amber"><div style=${{color:C.muted,fontSize:9,fontFamily:mono,letterSpacing:1.4,marginBottom:8}}>DCS SUBMITTED</div><div style=${{color:C.accent,fontFamily:mono,fontSize:28,fontWeight:700,lineHeight:1}}>${siteScores.length}</div><div style=${{color:C.muted,fontSize:10,marginTop:4}}>of ${SITES.length} total</div></div>
      <div class="stat-card ${netAvg>=80?'green':netAvg>=60?'amber':'red'}"><div style=${{color:C.muted,fontSize:9,fontFamily:mono,letterSpacing:1.4,marginBottom:8}}>NETWORK AVERAGE</div><div style=${{color:scCol(netAvg),fontFamily:mono,fontSize:28,fontWeight:700,lineHeight:1}}>${netAvg}%</div><div style=${{color:C.muted,fontSize:10,marginTop:4}}>${scLabel(netAvg)}</div></div>
      <div class="stat-card green"><div style=${{color:C.muted,fontSize:9,fontFamily:mono,letterSpacing:1.4,marginBottom:8}}>≥ 80% GOOD</div><div style=${{color:C.pass,fontFamily:mono,fontSize:28,fontWeight:700,lineHeight:1}}>${siteScores.filter(s=>s.score>=80).length}</div><div style=${{color:C.muted,fontSize:10,marginTop:4}}>sites</div></div>
      <div class="stat-card red"><div style=${{color:C.muted,fontSize:9,fontFamily:mono,letterSpacing:1.4,marginBottom:8}}>&lt; 60% ACTION NEEDED</div><div style=${{color:C.fail,fontFamily:mono,fontSize:28,fontWeight:700,lineHeight:1}}>${siteScores.filter(s=>s.score<60).length}</div><div style=${{color:C.muted,fontSize:10,marginTop:4}}>sites</div></div>
    </div>

    ${/* ── Top / Bottom 3 ── */null}
    <div style=${{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:24}} class="col-2">
      ${[{label:'▲ TOP 3 PERFORMING',color:C.pass,data:top3},{label:'▼ BOTTOM 3 PERFORMING',color:C.fail,data:bot3}].map(({label,color,data},gi)=>html`
        <div key=${gi} style=${{background:C.card,border:`1px solid ${color}22`,borderRadius:10,padding:16}}>
          <${SH} c=${color}>${label}</${SH}>
          ${data.map((s,i)=>html`<div key=${i} style=${{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 0',borderBottom:i<data.length-1?`1px solid ${C.border}20`:'none'}}>
            <div style=${{display:'flex',alignItems:'center',gap:10}}>
              <div class=${rankCls(i)}>${i+1}</div>
              <div><div style=${{color:C.text,fontSize:13,fontWeight:500}}>${s.site}</div><div style=${{color:C.muted,fontSize:10,marginTop:1}}>${s.auditor}</div></div>
            </div>
            <${ScBadge} score=${s.score}/>
          </div>`)}
        </div>`)}
    </div>

    ${/* ── Donut + area bars ── */null}
    <div class="card" style=${{padding:20,marginBottom:24}}>
      <${SH}>Network Average — Area Breakdown (${fmtW(week)})</${SH}>
      <div style=${{display:'flex',gap:28,alignItems:'center',flexWrap:'wrap'}}>
        <div style=${{position:'relative',width:200,height:200,flexShrink:0,margin:'0 auto'}}>
          ${donutAreas.length>0?html`<${ChartComp} type="doughnut" data=${donutData} options=${donutOpts} style=${{width:'100%',height:'100%'}}/>`:html`<div style=${{width:'100%',height:'100%',display:'flex',alignItems:'center',justifyContent:'center',borderRadius:'50%',border:`2px dashed ${C.border}`,color:C.muted,fontFamily:mono,fontSize:10}}>NO DATA</div>`}
          <div style=${{position:'absolute',top:'50%',left:'50%',transform:'translate(-50%,-50%)',textAlign:'center',pointerEvents:'none'}}>
            <div style=${{fontSize:22,fontFamily:mono,fontWeight:700,color:C.accent,lineHeight:1}}>${netAvg}%</div>
            <div style=${{fontSize:8,color:C.muted,fontFamily:mono,letterSpacing:1.5,marginTop:3}}>NETWORK</div>
          </div>
        </div>
        <div style=${{flex:1,minWidth:200}}>
          ${areaAvgs.map(a=>html`<div key=${a.area} style=${{marginBottom:11}}>
            <div style=${{display:'flex',justifyContent:'space-between',marginBottom:4,alignItems:'baseline'}}>
              <span style=${{fontSize:10,color:C.text,fontFamily:mono}}><span style=${{color:a.color,fontWeight:700}}>${a.short}</span> ${a.area}</span>
              <span style=${{fontSize:14,color:a.color,fontFamily:mono,fontWeight:700,flexShrink:0,marginLeft:8}}>${a.avg}%</span>
            </div>
            <${PBar} v=${a.avg} color=${a.color} h=${5}/>
          </div>`)}
        </div>
      </div>
    </div>

    ${/* ── List / Chart toggle ── */null}
    <div class="card" style=${{padding:16}}>
      <div style=${{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16,flexWrap:'wrap',gap:10}}>
        <${SH} mb=${0}>All Sites — ${fmtW(week)} Performance</${SH}>
        <div class="tgl">
          <button class=${'tgl-btn'+(view==='list'?' on':'')} onClick=${()=>setView('list')}>≡ LIST</button>
          <button class=${'tgl-btn'+(view==='chart'?' on':'')} onClick=${()=>setView('chart')}>▦ CHART</button>
        </div>
      </div>
      ${view==='list'
        ?html`<div>${siteScores.map((s,i)=>html`<div key=${i} style=${{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 0',borderBottom:i<siteScores.length-1?`1px solid ${C.border}20`:'none'}}>
          <div><span style=${{color:C.text,fontSize:13,fontWeight:500}}>${s.site}</span><span style=${{color:C.muted,fontSize:10,marginLeft:10,fontFamily:mono}}>${s.auditor}</span></div>
          <div style=${{display:'flex',alignItems:'center',gap:14}}><div style=${{width:120,height:5,background:C.border,borderRadius:3,overflow:'hidden'}}><div style=${{width:s.score+'%',height:'100%',background:scCol(s.score),borderRadius:3}}/></div><${ScBadge} score=${s.score}/></div>
        </div>`)}</div>`
        :html`<div style=${{height:Math.max(260,siteScores.length*18)+'px'}}><${ChartComp} type="bar" data=${barData} options=${barOpts} style=${{width:'100%',height:'100%'}}/></div>`}
    </div>
  </div>`;
}

// ════════════════════════════════════════════════════════
//  TAB 2: DC DETAIL VIEW
// ════════════════════════════════════════════════════════
function DCDetailTab({records,week,site,setSite}){
  const[sub,setSub]=useState('performance');
  const[lb,setLb]=useState(null);

  const rec=useMemo(()=>records.find(r=>String(r['Site'])===site&&Number(r['Week_No'])===week)||null,[records,site,week]);
  const answers=useMemo(()=>rec?parseAns(rec):{},[rec]);

  const areaScores=useMemo(()=>AREAS.map(a=>({area:a,score:Number(rec?.[ACOL[a]])||0,color:ACLR[a],short:ASHORT[a]})),[rec]);
  const score=Number(rec?.['Overall_Score_%'])||0;
  const auditor=String(rec?.['Auditor']||'—');
  const date=String(rec?.['Audit_Date']||'—');
  const passC=Number(rec?.['Pass_Count'])||0;
  const failC=Number(rec?.['Fail_Count'])||0;
  const naC=Number(rec?.['NA_Count'])||0;

  // Build fails with media — supports both http URLs and data: URIs (local fallback)
  const fails=useMemo(()=>{
    const out=[];
    AREAS.forEach(area=>{
      Object.entries(answers[area]||{}).forEach(([q,a])=>{
        if(a?.answer==='FAIL'){
          // Accept both http URLs and base64 data URIs
          const imgs=(a.imageURLs||[]).filter(u=>u&&(u.startsWith('http')||u.startsWith('data:')));
          const vids=(a.videoURLs||[]).filter(u=>u&&(u.startsWith('http')||u.startsWith('blob:')));
          out.push({area,q,neg:toNeg(q),remark:a.remark||'',imgs,vids});
        }
      });
    });
    return out;
  },[answers]);

  const allMedia=useMemo(()=>{
    const items=[];
    AREAS.forEach(area=>{
      Object.entries(answers[area]||{}).forEach(([q,a])=>{
        (a?.imageURLs||[]).forEach(u=>{if(u&&(u.startsWith('http')||u.startsWith('data:')))items.push({type:'image',src:u,area,q});});
        (a?.videoURLs||[]).forEach(u=>{if(u&&(u.startsWith('http')||u.startsWith('blob:')))items.push({type:'video',url:u,area,q});});
      });
    });
    return items;
  },[answers]);

  const barData={labels:areaScores.map(a=>a.short),datasets:[{label:'Score %',data:areaScores.map(a=>a.score),backgroundColor:areaScores.map(a=>a.color+'bb'),borderColor:areaScores.map(a=>a.color),borderWidth:1,borderRadius:4}]};
  const barOpts={responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},datalabels:{display:true,color:'#e6edf3',font:{size:11,weight:'bold',family:mono},formatter:v=>v+'%',anchor:'end',align:'top',offset:3}},scales:{x:{ticks:{color:C.muted,font:{size:10}},grid:{color:C.border+'33'}},y:{min:0,max:105,ticks:{color:C.muted,callback:v=>v>100?'':v+'%'},grid:{color:C.border+'33'}}}};

  return html`<div class="fi">
    ${lb?html`<${Lightbox} items=${lb.items} idx=${lb.idx} onClose=${()=>setLb(null)}/>`:''}

    <div style=${{marginBottom:20}}>
      <div style=${{color:C.muted,fontSize:9,fontFamily:mono,letterSpacing:1.5,marginBottom:6}}>SELECT SITE</div>
      <select value=${site} onChange=${e=>setSite(e.target.value)} style=${{background:C.card,color:C.text,border:`1px solid ${C.border}`,borderRadius:8,padding:'11px 18px',fontSize:14,fontFamily:mono,cursor:'pointer',minWidth:220}}>
        ${SITES.map(s=>html`<option key=${s}>${s}</option>`)}
      </select>
    </div>

    ${rec?html`<div style=${{background:'linear-gradient(135deg,#161b22 0%,#1a2234 100%)',border:`1px solid ${scCol(score)}33`,borderRadius:14,padding:'22px 26px',marginBottom:20,position:'relative',overflow:'hidden'}}>
      <div style=${{position:'absolute',top:0,left:0,right:0,height:3,background:`linear-gradient(90deg,${scCol(score)},${scCol(score)}88)`}}/>
      <div style=${{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:16}}>
        <div>
          <h2 style=${{fontFamily:mono,fontSize:26,fontWeight:700,color:C.text,margin:'0 0 8px',letterSpacing:-1}}>${site}</h2>
          <div style=${{display:'flex',gap:6,flexWrap:'wrap',marginBottom:8}}>
            <span style=${{background:scCol(score)+'20',color:scCol(score),border:`1px solid ${scCol(score)}44`,borderRadius:4,padding:'3px 10px',fontFamily:mono,fontSize:10,fontWeight:700}}>${scLabel(score)}</span>
            <span style=${{background:'#ffffff08',color:C.muted,borderRadius:4,padding:'3px 10px',fontSize:10,fontFamily:mono}}>${date}</span>
            <span style=${{background:'#ffffff08',color:C.muted,borderRadius:4,padding:'3px 10px',fontSize:10,fontFamily:mono}}>${auditor}</span>
          </div>
          <div style=${{display:'flex',gap:14,fontFamily:mono,fontSize:11}}><span style=${{color:C.pass}}>✓ ${passC} PASS</span><span style=${{color:C.fail}}>✗ ${failC} FAIL</span><span style=${{color:C.na}}>— ${naC} NA</span></div>
        </div>
        <div style=${{textAlign:'right'}}><div style=${{fontSize:52,fontFamily:mono,fontWeight:700,color:scCol(score),lineHeight:1}}>${score}%</div><div style=${{color:C.muted,fontSize:8,fontFamily:mono,letterSpacing:2,marginTop:4}}>PERFORMANCE SCORE</div></div>
      </div>
      <div style=${{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(100px,1fr))',gap:8,marginTop:18}}>
        ${areaScores.map(a=>html`<div key=${a.area} style=${{background:a.color+'12',border:`1px solid ${a.color}33`,borderRadius:6,padding:'8px 10px',textAlign:'center'}}>
          <div style=${{fontSize:8,color:a.color,fontFamily:mono,fontWeight:700,marginBottom:3,letterSpacing:.5}}>${a.short}</div>
          <div style=${{fontSize:18,fontFamily:mono,fontWeight:700,color:a.color}}>${a.score}%</div>
        </div>`)}
      </div>
    </div>`:html`<div class="card" style=${{padding:36,textAlign:'center',marginBottom:20}}><${Empty} icon="📭" title=${'NO AUDIT DATA'} sub=${site+' has not been audited for '+fmtW(week)}/></div>`}

    ${rec?html`<div>
      <div style=${{display:'flex',gap:8,marginBottom:20,flexWrap:'wrap'}}>
        ${['performance','improvement','snaps','checklist'].map(v=>html`<button key=${v} class=${'sub-btn'+(sub===v?' act':'')} onClick=${()=>setSub(v)}>
          ${v==='performance'?'📊 PERFORMANCE':v==='improvement'?'⚠ IMPROVEMENT AREAS':v==='snaps'?'📸 SNAP COLLATED':'☑ CHECKLIST'}
        </button>`)}
      </div>

      ${sub==='performance'?html`<div class="card" style=${{padding:18}} class="fi">
        <${SH}>Area Performance — ${site}</${SH}>
        <div style=${{height:280}}><${ChartComp} type="bar" data=${barData} options=${barOpts} style=${{width:'100%',height:'100%'}}/></div>
        <div style=${{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(140px,1fr))',gap:8,marginTop:16}}>
          ${areaScores.map(a=>html`<div key=${a.area} style=${{background:a.color+'10',border:`1px solid ${a.color}33`,borderRadius:6,padding:12}}>
            <div style=${{fontSize:8,color:a.color,fontFamily:mono,fontWeight:700,marginBottom:4,letterSpacing:.8}}>${a.area}</div>
            <div style=${{fontSize:20,fontFamily:mono,fontWeight:700,color:a.color,marginBottom:4}}>${a.score}%</div>
            <${PBar} v=${a.score} color=${a.color} h=${4}/>
          </div>`)}
        </div>
      </div>`:''}

      ${sub==='improvement'?html`<div class="card" style=${{padding:18}} class="fi">
        <${SH} c=${C.fail}>Improvement Areas — ${fails.length} Failed Question${fails.length!==1?'s':''}</${SH}>
        ${fails.length===0
          ?html`<div style=${{textAlign:'center',padding:36}}><div style=${{fontSize:40,marginBottom:12}}>🎉</div><div style=${{color:C.pass,fontFamily:mono,fontSize:13,fontWeight:700}}>EXCELLENT — NO FAILURES RECORDED</div></div>`
          :fails.map((f,i)=>html`<div key=${i} style=${{background:C.fail+'06',border:`1px solid ${C.fail}18`,borderRadius:8,padding:14,marginBottom:10}}>
            <div style=${{display:'flex',gap:10,alignItems:'flex-start',flexWrap:'wrap'}}>
              <div style=${{flex:1,minWidth:180}}>
                <div style=${{display:'flex',gap:8,alignItems:'flex-start',marginBottom:f.remark?6:0}}>
                  <span style=${{color:C.fail,fontSize:16,lineHeight:1.3,flexShrink:0,marginTop:1}}>✗</span>
                  <div>
                    <div style=${{color:'#fca5a5',fontFamily:mono,fontSize:11,fontWeight:700,lineHeight:1.5}}>${f.neg}</div>
                    <div style=${{color:C.muted,fontSize:9,marginTop:2,fontFamily:mono,letterSpacing:.4}}>${f.area}</div>
                  </div>
                </div>
                ${f.remark?html`<div style=${{marginLeft:24,marginTop:4,paddingLeft:10,borderLeft:`2px solid #fbbf2466`,color:'#fbbf24',fontSize:11,lineHeight:1.5,fontStyle:'italic'}}>
                  <span style=${{color:C.muted,fontSize:9,fontFamily:mono,fontStyle:'normal',display:'block',marginBottom:1,letterSpacing:.4}}>REMARK</span>
                  ${f.remark}
                </div>`:''}
              </div>
              ${/* ── Media column — images + videos beside improvement area ── */null}
              ${(f.imgs.length>0||f.vids.length>0)?html`<div style=${{display:'flex',gap:6,flexWrap:'wrap',flexShrink:0,alignItems:'flex-start'}}>
                ${f.imgs.map((u,j)=>html`<img key=${j} src=${u}
                  onClick=${()=>setLb({items:[...f.imgs.map(s=>({type:'image',src:s})),...f.vids.map(s=>({type:'video',url:s}))],idx:j})}
                  style=${{width:72,height:72,objectFit:'cover',borderRadius:6,cursor:'pointer',border:`2px solid ${C.fail}44`,transition:'all .15s'}}
                  onMouseEnter=${e=>{e.currentTarget.style.borderColor=C.fail;e.currentTarget.style.transform='scale(1.05)';}}
                  onMouseLeave=${e=>{e.currentTarget.style.borderColor=C.fail+'44';e.currentTarget.style.transform='scale(1)';}}/>`)}
                ${f.vids.map((u,j)=>html`<div key=${j}
                  onClick=${()=>setLb({items:[...f.imgs.map(s=>({type:'image',src:s})),...f.vids.map(s=>({type:'video',url:s}))],idx:f.imgs.length+j})}
                  style=${{width:72,height:72,background:'#0a2030',border:`2px solid #06b6d444`,borderRadius:6,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',cursor:'pointer',fontSize:22,transition:'border-color .15s'}}
                  onMouseEnter=${e=>e.currentTarget.style.borderColor='#06b6d4'}
                  onMouseLeave=${e=>e.currentTarget.style.borderColor='#06b6d444'}>
                  🎥<span style=${{color:C.cyan,fontSize:8,fontFamily:mono,marginTop:2}}>PLAY</span>
                </div>`)}
              </div>`:''}
            </div>
          </div>`)}
      </div>`:''}

      ${sub==='snaps'?html`<div class="card" style=${{padding:18}} class="fi">
        <${SH}>Snap Collated — All Media</${SH}>
        ${allMedia.length===0?html`<${Empty} icon="📷" title="NO MEDIA RECORDED" sub="Images/videos will appear here once uploaded."/>`:html`
          ${AREAS.map(area=>{
            const aMedia=allMedia.filter(m=>m.area===area);
            if(!aMedia.length)return null;
            return html`<div key=${area} style=${{marginBottom:20}}>
              <div style=${{color:ACLR[area],fontFamily:mono,fontSize:10,fontWeight:700,marginBottom:10,padding:'5px 12px',background:ACLR[area]+'10',borderLeft:`3px solid ${ACLR[area]}`,borderRadius:'0 5px 5px 0',letterSpacing:.8}}>${area}</div>
              <div style=${{display:'flex',flexWrap:'wrap',gap:8}}>
                ${aMedia.map((m,j)=>m.type==='image'
                  ?html`<div key=${j} style=${{position:'relative',cursor:'pointer'}} onClick=${()=>setLb({items:allMedia,idx:allMedia.indexOf(m)})}>
                    <img src=${m.src} style=${{width:84,height:84,objectFit:'cover',borderRadius:6,border:`2px solid ${C.border}`,display:'block',transition:'all .15s'}} onMouseEnter=${e=>{e.currentTarget.style.borderColor=ACLR[area];e.currentTarget.style.transform='scale(1.05)';}} onMouseLeave=${e=>{e.currentTarget.style.borderColor=C.border;e.currentTarget.style.transform='scale(1)';}}/>
                  </div>`
                  :html`<div key=${j} style=${{width:84,height:84,background:'#0a2030',border:`2px solid #06b6d444`,borderRadius:6,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',fontSize:28,cursor:'pointer',gap:3,transition:'border-color .15s'}} onClick=${()=>setLb({items:allMedia,idx:allMedia.indexOf(m)})} onMouseEnter=${e=>e.currentTarget.style.borderColor='#06b6d4'} onMouseLeave=${e=>e.currentTarget.style.borderColor='#06b6d444'}>
                    🎥<span style=${{color:C.cyan,fontSize:8,fontFamily:mono}}>PLAY</span>
                  </div>`)}
              </div>
            </div>`;
          })}
        `}
      </div>`:''}

      ${sub==='checklist'?html`<div class="card" style=${{padding:18}} class="fi">
        <${SH}>Full Checklist — ${site} (${fmtW(week)})</${SH}>
        ${AREAS.map(area=>{
          const qs=answers[area]||{};
          return html`<div key=${area} style=${{marginBottom:22}}>
            <div style=${{color:ACLR[area],fontFamily:mono,fontSize:10,fontWeight:700,padding:'6px 12px',background:ACLR[area]+'10',borderLeft:`3px solid ${ACLR[area]}`,borderRadius:'0 5px 5px 0',marginBottom:8,letterSpacing:.8}}>${area}</div>
            ${(QS[area]||[]).map((q,i)=>{const a=qs[q]||{};const ac=a.answer==='PASS'?C.pass:a.answer==='FAIL'?C.fail:C.na;
              return html`<div key=${i} style=${{display:'flex',gap:10,padding:'8px 6px',borderBottom:`1px solid ${C.border}18`,alignItems:'flex-start',background:a.answer==='FAIL'?C.fail+'05':'transparent',borderRadius:4}}>
                <span style=${{background:ac+'20',color:ac,border:`1px solid ${ac}44`,borderRadius:3,padding:'2px 8px',fontFamily:mono,fontSize:9,fontWeight:700,flexShrink:0,marginTop:2,minWidth:44,textAlign:'center'}}>${a.answer||'—'}</span>
                <div style=${{flex:1}}><div style=${{color:a.answer==='FAIL'?'#fca5a5':C.text,fontSize:12,lineHeight:1.5}}>${q}</div>${a.remark?html`<div style=${{color:'#fbbf24',fontSize:10,marginTop:3,fontStyle:'italic'}}>↳ ${a.remark}</div>`:''}</div>
              </div>`;
            })}
          </div>`;
        })}
      </div>`:''}
    </div>`:''}
  </div>`;
}

// ════════════════════════════════════════════════════════
//  TAB 3: WEEKLY PERFORMANCE
// ════════════════════════════════════════════════════════
function WeeklyPerfTab({records,site,setSite,activeWeeks}){
  const[ct,setCt]=useState('line');
  const[lb,setLb]=useState(null);// lightbox for improvement area media
  const wkLabels=activeWeeks.map(fmtW);
  const netByWeek=useMemo(()=>activeWeeks.map(wk=>{const wr=records.filter(r=>Number(r['Week_No'])===wk);return wr.length?Math.round(wr.reduce((s,r)=>s+(Number(r['Overall_Score_%'])||0),0)/wr.length):null;}),[records,activeWeeks]);
  const dcByWeek=useMemo(()=>activeWeeks.map(wk=>{const r=records.find(r=>String(r['Site'])===site&&Number(r['Week_No'])===wk);return r?Number(r['Overall_Score_%'])||0:null;}),[records,site,activeWeeks]);
  const netData={labels:wkLabels,datasets:[{label:'Network Avg %',data:netByWeek,borderColor:C.accent,backgroundColor:ct==='bar'?C.accent+'99':'rgba(245,158,11,.15)',borderWidth:2.5,tension:.35,fill:ct==='line',pointBackgroundColor:C.accent,pointRadius:5,pointHoverRadius:8,spanGaps:false}]};
  const netOpts={responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},datalabels:{display:ctx=>netByWeek[ctx.dataIndex]!==null,color:C.accent,font:{size:10,weight:'bold',family:mono},formatter:v=>v+'%',anchor:'end',align:'top',offset:4}},scales:{x:{ticks:{color:C.muted},grid:{color:C.border+'33'}},y:{min:0,max:105,ticks:{color:C.muted,callback:v=>v>100?'':v+'%'},grid:{color:C.border+'33'}}}};
  const dcData={labels:wkLabels,datasets:[{label:`${site} Overall`,data:dcByWeek,borderColor:C.blue,backgroundColor:C.blue+'25',borderWidth:2.5,tension:.35,fill:true,pointBackgroundColor:C.blue,pointRadius:5,spanGaps:false},...AREAS.map(a=>({label:ASHORT[a],data:activeWeeks.map(wk=>{const r=records.find(r=>String(r['Site'])===site&&Number(r['Week_No'])===wk);return r?Number(r[ACOL[a]])||null:null;}),borderColor:ACLR[a],backgroundColor:'transparent',borderWidth:1.5,tension:.35,borderDash:[4,4],pointRadius:3,spanGaps:false}))]};

    body+=`<h2>WEEK-BY-WEEK PERFORMANCE</h2><table><tr><th class="left">WEEK</th><th>OVERALL %</th>${AREAS.map(a=>`<th>${ASHORT[a]}</th>`).join('')}<th>PASS</th><th>FAIL</th><th>NA</th></tr>`;
    allRecs.forEach(rec=>{const sv=Number(rec['Overall_Score_%'])||0;const cls=sv>=80?'g':sv>=60?'a':'r';body+=`<tr><td class="left" style="font-weight:600">${fmtW(Number(rec['Week_No']))}</td><td class="${cls}">${sv}%</td>${AREAS.map(a=>{const v=Number(rec[ACOL[a]])||0;const c=v>=80?'g':v>=60?'a':'r';return`<td class="${c}">${v}%</td>`;}).join('')}<td>${rec['Pass_Count']||0}</td><td>${rec['Fail_Count']||0}</td><td>${rec['NA_Count']||0}</td></tr>`;});

    body+=`<footer>Weekly Audit Scorecard · ${site} · ${new Date().getFullYear()}</footer></div></body></html>`;
    w.document.write(body);w.document.close();setTimeout(()=>w.print(),800);

  return html`<div class="fi">
    ${lb?html`<${Lightbox} items=${lb.items} idx=${lb.idx} onClose=${()=>setLb(null)}/>`:''}
    <div class="card" style=${{padding:18,marginBottom:20}}>

          <select value=${site} onChange=${e=>setSite(e.target.value)} style=${{background:C.bg,color:C.text,border:`1px solid ${C.border}`,borderRadius:8,padding:'10px 16px',fontSize:13,fontFamily:mono,cursor:'pointer',minWidth:200}}>${SITES.map(s=>html`<option key=${s}>${s}</option>`)}</select>
        </div>
        <button onClick=${downloadReport} style=${{background:'linear-gradient(135deg,#065f46,#059669)',color:'#fff',border:'none',borderRadius:8,padding:'11px 22px',fontFamily:mono,fontSize:12,fontWeight:700,cursor:'pointer',letterSpacing:.8,boxShadow:'0 4px 16px rgba(16,185,129,.25)',transition:'all .2s'}} onMouseEnter=${e=>{e.currentTarget.style.transform='translateY(-1px)';}} onMouseLeave=${e=>{e.currentTarget.style.transform='translateY(0)';}}>⬇ DC PERFORMANCE REPORT (PDF)</button>
      </div>
      <${SH}>Week-on-Week Trend — ${site}</${SH}>
      ${activeWeeks.length===0?html`<${Empty} icon="📈" title="NO DATA"/>`:html`<div style=${{height:280}}><${ChartComp} type="line" data=${dcData} options=${dcOpts} style=${{width:'100%',height:'100%'}}/></div>`}
    </div>
    <div class="card" style=${{padding:18,marginBottom:20,overflowX:'auto'}}>

      ${activeWeeks.length===0?html`<${Empty} icon="📋" title="NO DATA"/>`:html`<table class="dt">
        <thead><tr><th style=${{textAlign:'left',minWidth:130}}>AREA</th>${activeWeeks.map(w=>html`<th key=${w} style=${{textAlign:'center'}}>${fmtW(w)}</th>`)}<th style=${{textAlign:'center',color:C.accent}}>AVG</th></tr></thead>
        <tbody>${tableData.map(row=>{const valid=row.weeks.filter(v=>v!==null);const avg=valid.length?Math.round(valid.reduce((a,b)=>a+b,0)/valid.length):null;return html`<tr key=${row.area}>
          <td style=${{color:row.color,fontFamily:mono,fontSize:10,fontWeight:600,textAlign:'left'}}>${row.area}</td>
          ${row.weeks.map((v,j)=>html`<td key=${j} style=${{textAlign:'center',color:v===null?C.border:scCol(v),fontFamily:mono,fontWeight:700,fontSize:12}}>${v===null?'—':v+'%'}</td>`)}

        </tr>`;})}</tbody>
      </table>`}
    </div>

    ${/* ── Improvement Areas with media for selected DC — latest week with data ── */null}
    ${(()=>{
      // Find the most recent week this DC has data for
      const dcRecs=records.filter(r=>String(r['Site'])===site).sort((a,b)=>Number(b['Week_No'])-Number(a['Week_No']));
      if(!dcRecs.length)return null;

            const imgs=(a.imageURLs||[]).filter(u=>u&&(u.startsWith('http')||u.startsWith('data:')));

      if(!fails.length)return html`<div class="card" style=${{padding:18}}><div style=${{textAlign:'center',padding:24}}><div style=${{fontSize:36,marginBottom:8}}>🎉</div><div style=${{color:C.pass,fontFamily:mono,fontSize:12,fontWeight:700}}>NO FAILURES FOR ${site} IN ${fmtW(latestWk)}</div></div></div>`;
      return html`<div class="card" style=${{padding:18}}>
        <${SH} c=${C.fail}>Improvement Areas — ${site} (${fmtW(latestWk)}) — ${fails.length} Failed</${SH}>
        ${fails.map((f,i)=>{
          const mediaItems=[...f.imgs.map(s=>({type:'image',src:s})),...f.vids.map(s=>({type:'video',url:s}))];
          return html`<div key=${i} style=${{display:'flex',gap:12,padding:'12px 0',borderBottom:i<fails.length-1?`1px solid ${C.border}18`:'none',alignItems:'flex-start',flexWrap:'wrap'}}>
            ${/* ── Fail text ── */null}
            <div style=${{flex:1,minWidth:200}}>

            </div>

            ${mediaItems.length>0?html`<div style=${{display:'flex',gap:6,flexWrap:'wrap',flexShrink:0,alignItems:'flex-start'}}>
              ${f.imgs.map((u,j)=>html`<div key=${j} style=${{position:'relative'}}>

                  onClick=${()=>setLb({items:mediaItems,idx:j})}

function DCFacilityTab({records,week}){
  const[size,setSize]=useState('Large');const[lb,setLb]=useState(null);
  const sites=FMAP[size];
  const siteData=useMemo(()=>sites.map(site=>{
    const r=records.find(r=>String(r['Site'])===site&&Number(r['Week_No'])===week);
    if(!r)return{site,score:0,auditor:'—',date:'—',hasData:false,areaScores:{},fails:[],imgs:[]};
    const ans=parseAns(r);const fails=[];
    AREAS.forEach(area=>Object.entries(ans[area]||{}).forEach(([q,a])=>{if(a?.answer==='FAIL')fails.push({area,neg:toNeg(q),remark:a.remark||''});}));
    const imgs=[];
    AREAS.forEach(area=>Object.values(ans[area]||{}).forEach(a=>{(a?.imageURLs||[]).forEach(u=>{if(u&&(u.startsWith('http')||u.startsWith('data:')))imgs.push({type:'image',src:u});});}));
    return{site,score:Number(r['Overall_Score_%'])||0,auditor:String(r['Auditor']||'—'),date:String(r['Audit_Date']||'—'),hasData:true,areaScores:Object.fromEntries(AREAS.map(a=>[a,Number(r[ACOL[a]])||0])),fails,imgs};
  }),[records,sites,week]);
  const audited=siteData.filter(s=>s.hasData);
  const netAvg=audited.length?Math.round(audited.reduce((s,x)=>s+x.score,0)/audited.length):0;
  const areaAvgs=AREAS.map(area=>({area,color:ACLR[area],short:ASHORT[area],avg:audited.length?Math.round(audited.reduce((s,x)=>s+(x.areaScores[area]||0),0)/audited.length):0}));
  const commonFails=useMemo(()=>{const f={};audited.forEach(s=>s.fails.forEach(fi=>{if(!f[fi.neg])f[fi.neg]={neg:fi.neg,count:0};f[fi.neg].count++;}));return Object.values(f).sort((a,b)=>b.count-a.count).slice(0,8);},[audited]);
  const barData={labels:audited.map(s=>s.site.length>11?s.site.slice(0,11)+'…':s.site),datasets:[{label:'Score %',data:audited.map(s=>s.score),backgroundColor:audited.map(s=>scCol(s.score)+'99'),borderColor:audited.map(s=>scCol(s.score)),borderWidth:1,borderRadius:4}]};
  const barOpts={responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},datalabels:{display:true,color:'#e6edf3',font:{size:9,weight:'bold',family:mono},formatter:v=>v+'%',anchor:'end',align:'top',offset:2}},scales:{x:{ticks:{color:C.muted,font:{size:9},maxRotation:45},grid:{color:C.border+'33'}},y:{min:0,max:105,ticks:{color:C.muted,callback:v=>v>100?'':v+'%'},grid:{color:C.border+'33'}}}};
  const sizeColor={Large:C.accent,Medium:C.blue,Small:C.purple};
  return html`<div class="fi">
    ${lb?html`<${Lightbox} items=${lb.items} idx=${lb.idx} onClose=${()=>setLb(null)}/>`:''}
    <div style=${{display:'flex',gap:16,alignItems:'center',marginBottom:24,flexWrap:'wrap'}}>
      <div><div style=${{color:C.muted,fontSize:9,fontFamily:mono,letterSpacing:1.5,marginBottom:6}}>FACILITY SIZE</div>
        <div style=${{display:'flex',gap:8}}>
          ${['Large','Medium','Small'].map(s=>html`<button key=${s} onClick=${()=>setSize(s)} style=${{background:size===s?sizeColor[s]+'20':'transparent',color:size===s?sizeColor[s]:C.muted,border:`2px solid ${size===s?sizeColor[s]:C.border}`,borderRadius:8,padding:'9px 20px',fontFamily:mono,fontSize:11,fontWeight:size===s?700:500,cursor:'pointer',letterSpacing:.8,transition:'all .18s'}}>${s.toUpperCase()}</button>`)}
        </div>
      </div>
      <div style=${{marginLeft:'auto',background:`linear-gradient(135deg,${sizeColor[size]}12,${sizeColor[size]}06)`,border:`1px solid ${sizeColor[size]}33`,borderRadius:10,padding:'12px 22px',textAlign:'center',minWidth:160}}>
        <div style=${{color:C.muted,fontSize:8,fontFamily:mono,letterSpacing:1.5,marginBottom:4}}>${size.toUpperCase()} AVG — ${fmtW(week)}</div>
        <div style=${{color:audited.length?sizeColor[size]:C.muted,fontSize:30,fontFamily:mono,fontWeight:700,lineHeight:1}}>${audited.length?netAvg+'%':'—'}</div>
        <div style=${{color:C.muted,fontSize:10,marginTop:4}}>${audited.length} / ${sites.length} audited</div>
      </div>
    </div>
    <div class="card" style=${{padding:16,marginBottom:20}}><${SH}>${size} DCs — ${fmtW(week)} Comparison</${SH}>${audited.length===0?html`<${Empty} icon="📊" title=${'NO '+size.toUpperCase()+' DCS AUDITED THIS WEEK'}/>`:html`<div style=${{height:200}}><${ChartComp} type="bar" data=${barData} options=${barOpts} style=${{width:'100%',height:'100%'}}/></div>`}</div>
    <div style=${{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(170px,1fr))',gap:12,marginBottom:20}}>
      ${siteData.map(s=>html`<div key=${s.site} style=${{background:C.card,border:`1px solid ${s.hasData?scCol(s.score)+'44':C.border}`,borderRadius:10,padding:14,opacity:s.hasData?1:.45,position:'relative',overflow:'hidden'}}>
        ${s.hasData?html`<div style=${{position:'absolute',top:0,left:0,right:0,height:2,background:scCol(s.score)}}/>`:''}
        <div style=${{fontFamily:mono,fontSize:12,fontWeight:700,color:C.text,marginBottom:4,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>${s.site}</div>
        <div style=${{fontSize:26,fontFamily:mono,fontWeight:700,color:s.hasData?scCol(s.score):C.muted,lineHeight:1,marginBottom:6}}>${s.hasData?s.score+'%':'—'}</div>
        <div style=${{fontSize:10,color:C.muted,lineHeight:1.8}}><div>${s.date}</div><div style=${{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>${s.hasData?s.auditor:'Not audited'}</div></div>
      </div>`)}
    </div>
    ${audited.length>0?html`<div>
      <div class="card" style=${{padding:16,marginBottom:20}}><${SH}>${size} Segment — Area Averages</${SH}>${areaAvgs.map(a=>html`<div key=${a.area} style=${{marginBottom:12}}><div style=${{display:'flex',justifyContent:'space-between',marginBottom:4}}><span style=${{fontSize:10,color:C.text,fontFamily:mono}}><b style=${{color:a.color}}>${a.short}</b> ${a.area}</span><span style=${{fontSize:14,color:a.color,fontFamily:mono,fontWeight:700}}>${a.avg}%</span></div><${PBar} v=${a.avg} color=${a.color} h=${6}/></div>`)}</div>
      ${commonFails.length>0?html`<div class="card" style=${{padding:16,marginBottom:20}}><${SH} c=${C.fail}>Common Issues — ${size} Segment</${SH}>${commonFails.map((item,i)=>html`<div key=${i} style=${{display:'flex',gap:12,padding:'10px 0',borderBottom:i<commonFails.length-1?`1px solid ${C.border}20`:'none',alignItems:'flex-start'}}><div style=${{background:C.fail+'20',color:C.fail,border:`1px solid ${C.fail}44`,borderRadius:4,padding:'3px 10px',fontFamily:mono,fontSize:13,fontWeight:700,flexShrink:0,minWidth:42,textAlign:'center'}}>${item.count}</div><div style=${{color:'#fca5a5',fontFamily:mono,fontSize:11,fontWeight:600}}>${item.neg}</div></div>`)}</div>`:''}
      ${audited.some(s=>s.imgs.length>0)?html`<div class="card" style=${{padding:16}}><${SH}>Image Gallery — ${size} DCs</${SH}>${audited.filter(s=>s.imgs.length>0).map(s=>html`<div key=${s.site} style=${{marginBottom:16}}><div style=${{color:C.muted,fontSize:10,fontFamily:mono,fontWeight:700,marginBottom:8}}>${s.site}</div><div style=${{display:'flex',flexWrap:'wrap',gap:8}}>${s.imgs.map((img,j)=>html`<img key=${j} src=${img.src} onClick=${()=>setLb({items:s.imgs,idx:j})} style=${{width:72,height:72,objectFit:'cover',borderRadius:6,cursor:'pointer',border:`2px solid ${C.border}`,transition:'all .15s'}} onMouseEnter=${e=>{e.currentTarget.style.borderColor=sizeColor[size];e.currentTarget.style.transform='scale(1.06)';}} onMouseLeave=${e=>{e.currentTarget.style.borderColor=C.border;e.currentTarget.style.transform='scale(1)';}}/>`)}</div></div>`)}</div>`:''}
    </div>`:''}
  </div>`;
}

  const[selWeek,setSelWeek]=useState(null);
  const[selSite,setSelSite]=useState(SITES[0]);

  const activeWeeks=useMemo(()=>[...new Set(records.map(r=>Number(r['Week_No'])).filter(Boolean))].sort((a,b)=>a-b),[records]);

  useEffect(()=>{
    if(activeWeeks.length>0&&(selWeek===null||!activeWeeks.includes(selWeek)))setSelWeek(activeWeeks[activeWeeks.length-1]);
  },[JSON.stringify(activeWeeks)]);

  const load=useCallback(async(force=false)=>{
    // If cache available, show it immediately (no spinner) while refreshing in background
    if(!force&&_cache.data&&_cache.data.ok){setRecords(_cache.data.records||[]);setLoading(false);}
    else if(!_cache.data)setLoading(true);
    else setBgLoading(true);
    setError('');
    try{
      const r=await fetchSheet(force);
      if(r.ok){setRecords(r.records||[]);setLastSync(new Date());}
      else setError(r.error||'Fetch returned ok:false');
    }catch(e){setError(e.message);}
    setLoading(false);setBgLoading(false);
  },[]);

  useEffect(()=>{load();const iv=setInterval(()=>load(true),5*60*1000);return()=>clearInterval(iv);},[]);

  const TABS=['OVERVIEW','DC DETAIL VIEW','WEEKLY PERFORMANCE','DC FACILITY'];
  const ICONS=['▤','◉','📈','🏢'];
  const displayWeek=selWeek??(activeWeeks.length>0?activeWeeks[activeWeeks.length-1]:1);
  const syncStr=lastSync?lastSync.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'}):'—';

  return html`<div style=${{minHeight:'100vh',background:C.bg}}>
    <div style=${{background:'linear-gradient(180deg,#1a2030 0%,#161b22 100%)',borderBottom:`1px solid ${C.border}`,padding:'0 20px',display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:8,position:'sticky',top:0,zIndex:100,boxShadow:'0 2px 20px rgba(0,0,0,.4)'}}>
      <div style=${{padding:'12px 0'}}>
        <div style=${{color:C.accent,fontFamily:mono,fontSize:8,letterSpacing:3,marginBottom:2}}>LOGISTICS OPERATIONS MANAGEMENT</div>
        <div style=${{color:C.text,fontFamily:mono,fontSize:18,fontWeight:700,letterSpacing:.5}}>WEEKLY AUDIT <span style=${{color:C.accent}}>SCORECARD</span></div>
      </div>
      <div style=${{display:'flex',gap:10,alignItems:'center',flexWrap:'wrap',padding:'8px 0'}}>
        <div>
          <div style=${{color:C.muted,fontSize:8,fontFamily:mono,letterSpacing:1.2,marginBottom:3,textAlign:'center'}}>WEEK</div>
          <select value=${displayWeek} onChange=${e=>setSelWeek(Number(e.target.value))} style=${{background:'#0d1117',color:C.accent,border:`2px solid ${C.accent}55`,borderRadius:8,padding:'7px 14px',fontSize:20,fontFamily:mono,fontWeight:700,cursor:'pointer',minWidth:90}}>
            ${activeWeeks.length>0?activeWeeks.map(w=>html`<option key=${w} value=${w}>${fmtW(w)}</option>`):html`<option value=${1}>${fmtW(1)}</option>`}
          </select>
        </div>
        <div style=${{display:'flex',flexDirection:'column',alignItems:'center',gap:2}}>
          <button onClick=${()=>load(true)} disabled=${loading||bgLoading} style=${{background:(loading||bgLoading)?C.border+'33':C.abl,color:(loading||bgLoading)?C.muted:C.accent,border:`1px solid ${(loading||bgLoading)?C.border:C.accent+'44'}`,borderRadius:8,padding:'8px 14px',fontFamily:mono,fontSize:11,fontWeight:600,cursor:(loading||bgLoading)?'default':'pointer',letterSpacing:.6,minWidth:100}}>
            ${(loading||bgLoading)?html`<span class="spin">↻</span> SYNCING`:'↻ REFRESH'}
          </button>
          <span style=${{color:C.muted,fontSize:8,fontFamily:mono}}>Last: ${syncStr}</span>
        </div>
        <button onClick=${onBack} style=${{background:'linear-gradient(135deg,#991b1b,#7f1d1d)',color:'#fff',border:'none',borderRadius:8,padding:'9px 18px',fontFamily:mono,fontSize:12,fontWeight:700,cursor:'pointer',letterSpacing:.8,boxShadow:'0 4px 12px rgba(239,68,68,.25)',transition:'all .15s'}} onMouseEnter=${e=>{e.currentTarget.style.transform='translateY(-1px)';}} onMouseLeave=${e=>{e.currentTarget.style.transform='translateY(0)';}}>⏻ LOGOUT</button>
      </div>
    </div>
    <div class="tab-bar">${TABS.map((t,i)=>html`<button key=${t} class=${'tab-btn'+(tab===i?' act':'')} onClick=${()=>setTab(i)}>${ICONS[i]} ${t}</button>`)}</div>
    ${!sheetOK()?html`<div style=${{background:'#1a1200',borderBottom:`1px solid #f59e0b22`,padding:'7px 24px',fontFamily:mono,fontSize:11,color:'#d97706'}}>⚠ SHEET_URL not configured. Set the Apps Script URL in the CONFIG section.</div>`:''}
    ${loading?html`<div style=${{display:'flex',alignItems:'center',justifyContent:'center',gap:14,padding:72,color:C.muted,fontFamily:mono,fontSize:13}}><span class="spin" style=${{fontSize:22,color:C.accent}}>◎</span> Fetching from Google Sheets…</div>`:''}
    ${!loading&&error?html`<div style=${{margin:'24px',background:C.card,border:`1px solid ${C.fail}33`,borderRadius:12,padding:'40px 24px',textAlign:'center'}}>
      <div style=${{fontSize:36,marginBottom:12,opacity:.3}}>⚠</div>
      <div style=${{color:C.fail,fontFamily:mono,fontSize:13,fontWeight:700,marginBottom:10,letterSpacing:1}}>FETCH ERROR</div>
      <div style=${{color:C.muted,fontSize:12,marginBottom:16,maxWidth:500,margin:'0 auto 16px',whiteSpace:'pre-line',lineHeight:1.7}}>${error}</div>
      <div style=${{color:C.muted,fontSize:11,marginBottom:16,background:C.bg,borderRadius:6,padding:'10px 16px',display:'inline-block',fontFamily:mono,textAlign:'left',lineHeight:1.9}}>
        Fix checklist:<br/>1. Apps Script deployed as Web App?<br/>2. Execute as: Me<br/>3. Access: Anyone (not "with Google account")<br/>4. Created NEW deployment after code changes?
      </div><br/>
      <button onClick=${()=>load(true)} style=${{background:C.abl,color:C.accent,border:`1px solid ${C.accent}`,borderRadius:8,padding:'10px 28px',fontFamily:mono,fontSize:12,fontWeight:700,cursor:'pointer'}}>↺ RETRY</button>
    </div>`:''}
    ${!loading&&!error?html`<div style=${{padding:'20px',maxWidth:1400,margin:'0 auto'}}>
      ${tab===0?html`<${OverviewTab} records=${records} week=${displayWeek}/>`:''}
      ${tab===1?html`<${DCDetailTab} records=${records} week=${displayWeek} site=${selSite} setSite=${setSelSite}/>`:''}
      ${tab===2?html`<${WeeklyPerfTab} records=${records} site=${selSite} setSite=${setSelSite} activeWeeks=${activeWeeks}/>`:''}
      ${tab===3?html`<${DCFacilityTab} records=${records} week=${displayWeek}/>`:''}
    </div>`:''}
  </div>`;
}

// ════════════════════════════════════════════════════════
//  APP ROOT
// ════════════════════════════════════════════════════════
function App(){
  const[page,setPage]=useState('landing');
  if(page==='landing')return html`<${Landing} onFill=${()=>setPage('fill')} onView=${()=>setPage('view')}/>`;
  if(page==='fill')   return html`<${FillScorecard} onBack=${()=>setPage('landing')}/>`;
  if(page==='view')   return html`<${Dashboard} onBack=${()=>setPage('landing')}/>`;
  return null;
}
render(html`<${App}/>`,document.getElementById('app'));
</script>
</body>
</html>
