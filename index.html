<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>Weekly Audit Scorecard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#0d1117;color:#e6edf3;font-family:'IBM Plex Sans',-apple-system,sans-serif;overflow-x:hidden}
#app{min-height:100vh}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:#0d1117}
::-webkit-scrollbar-thumb{background:#30363d;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#484f58}
input,select,textarea,button{font-family:inherit}
input[type=date]{color-scheme:dark}
select option{background:#161b22;color:#e6edf3}

/* ── Overlay ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.94);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(3px)}

/* ── Animations ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(245,158,11,.4)}50%{box-shadow:0 0 0 8px rgba(245,158,11,0)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
.fi{animation:fadeUp .25s ease-out}
.spin{display:inline-block;animation:spin .8s linear infinite}
.blink{animation:blink 1s infinite}

/* ── Tabs ── */
.tab-bar{display:flex;overflow-x:auto;background:#161b22;border-bottom:2px solid #30363d;padding:0 20px;scrollbar-width:none;gap:4px}
.tab-bar::-webkit-scrollbar{display:none}
.tab-btn{background:transparent;border:none;border-bottom:3px solid transparent;margin-bottom:-2px;padding:15px 22px;font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:500;color:#8b949e;cursor:pointer;white-space:nowrap;transition:all .18s;letter-spacing:.8px;position:relative}
.tab-btn::after{content:'';position:absolute;bottom:-2px;left:0;right:0;height:3px;background:#f59e0b;transform:scaleX(0);transition:transform .2s}
.tab-btn.act{color:#f59e0b;font-weight:700}
.tab-btn.act::after{transform:scaleX(1)}
.tab-btn:hover:not(.act){color:#e6edf3}

/* ── Sub-buttons ── */
.sub-btn{background:transparent;border:1px solid #30363d;border-radius:6px;padding:9px 16px;font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:500;color:#8b949e;cursor:pointer;letter-spacing:.6px;transition:all .18s}
.sub-btn.act{background:rgba(245,158,11,.12);color:#f59e0b;border-color:#f59e0b66;font-weight:700}
.sub-btn:hover:not(.act){color:#e6edf3;border-color:#484f58;background:#ffffff08}

/* ── Cards ── */
.card{background:#161b22;border:1px solid #30363d;border-radius:10px}
.card-glow{background:#161b22;border:1px solid #f59e0b22;border-radius:10px;box-shadow:0 0 24px rgba(245,158,11,.06)}
.card-pass{background:#161b22;border:1px solid #10b98122;border-radius:10px}
.card-fail{background:#161b22;border:1px solid #ef444422;border-radius:10px}

/* ── Tables ── */
table.dt{width:100%;border-collapse:collapse;font-size:12px}
table.dt th{background:#0d1117;color:#8b949e;padding:10px 14px;text-align:left;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.8px;border-bottom:2px solid #30363d;white-space:nowrap;position:sticky;top:0}
table.dt td{padding:9px 14px;border-bottom:1px solid rgba(48,54,61,.3);vertical-align:middle}
table.dt tbody tr:hover td{background:rgba(22,27,34,.6)}

/* ── Landing grid bg ── */
.landing-bg{min-height:100vh;background:#0d1117;background-image:linear-gradient(rgba(245,158,11,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(245,158,11,.03) 1px,transparent 1px);background-size:60px 60px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;position:relative}
.landing-bg::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 40%,rgba(245,158,11,.06) 0%,transparent 70%);pointer-events:none}

/* ── Stat cards ── */
.stat-card{background:linear-gradient(135deg,#161b22 0%,#1a2030 100%);border-radius:10px;padding:18px;border:1px solid #30363d;position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.stat-card.amber::before{background:linear-gradient(90deg,#f59e0b,#d97706)}
.stat-card.green::before{background:linear-gradient(90deg,#10b981,#059669)}
.stat-card.red::before{background:linear-gradient(90deg,#ef4444,#dc2626)}
.stat-card.blue::before{background:linear-gradient(90deg,#3b82f6,#2563eb)}

/* ── Progress bar ── */
.pbar-wrap{background:#30363d;border-radius:4px;overflow:hidden}
.pbar-fill{height:100%;border-radius:4px;transition:width .5s ease}

/* ── Toggle group ── */
.tgl{display:flex;background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:3px;gap:2px}
.tgl-btn{border:none;background:transparent;color:#8b949e;padding:6px 14px;font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:500;cursor:pointer;border-radius:4px;transition:all .15s;letter-spacing:.6px}
.tgl-btn.on{background:#f59e0b22;color:#f59e0b;font-weight:700}
.tgl-btn:hover:not(.on){background:#ffffff08;color:#e6edf3}

/* ── Rank medals ── */
.rank{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:700;flex-shrink:0}
.rank-1{background:linear-gradient(135deg,#fbbf24,#d97706);color:#000}
.rank-2{background:linear-gradient(135deg,#94a3b8,#64748b);color:#000}
.rank-3{background:linear-gradient(135deg,#cd7c2b,#92400e);color:#fff}

/* ── Badges ── */
.badge{display:inline-flex;align-items:center;border-radius:4px;font-family:'IBM Plex Mono',monospace;font-weight:700}

@media(max-width:640px){.hide-sm{display:none!important}.col-1{grid-template-columns:1fr!important}}
@media(max-width:900px){.col-2{grid-template-columns:1fr!important}}
@media print{.no-print{display:none!important}}
</style>
</head>
<body>
<div id="app"><div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#8b949e;font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:2px;gap:10px"><span style="animation:spin .8s linear infinite;display:inline-block">◎</span> INITIALISING…</div></div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
<script type="module">
import{h,render}from'https://esm.sh/preact@10.22.0';
import{useState,useRef,useMemo,useEffect,useCallback}from'https://esm.sh/preact@10.22.0/hooks';
import htm from'https://esm.sh/htm@3.1.1';
const html=htm.bind(h);

if(window.Chart&&window.ChartDataLabels)window.Chart.register(window.ChartDataLabels);

// ════════════════════════════════════════════════════════
//  ⚙  CONFIG — paste your Apps Script URL here
// ════════════════════════════════════════════════════════
const SHEET_URL='https://script.google.com/macros/s/AKfycbwZn8WNN80h0R01HcasMFbYzCQBmpeWhaPJVBVIWELsGlmVVEYLROX_16TY50R7xjaH/exec';
const CL_CLOUD ='YOUR_CLOUDINARY_CLOUD_NAME';
const CL_PRESET='YOUR_UNSIGNED_UPLOAD_PRESET';

// ════════════════════════════════════════════════════════
//  DATA CONSTANTS
// ════════════════════════════════════════════════════════
const SITES=['BANGALORE','MUMBAI','SURAT','ONE NCR','NCR BILASPUR','NCR TAURU','NCR BAMNOLI',
  'JAIPUR','INDORE','HYDERABAD','AHMEDABAD','NAGPUR','KOLKATA','KOLKATA 2','LUCKNOW',
  'PATNA','LUDIANA','COIMBATORE','CHENNAI','GUWAHATI','VIJAYAWADA','HUBLI','SAGAR'];

const AREAS=['INBOUND OUTBOUND STAGING','BBB AREA','PRIMARY SORTING AREA',
  'SECONDARY SORTING AREA','EXCEPTION AREA','VOLUMETRIC HANDLING'];

const ACLR={'INBOUND OUTBOUND STAGING':'#f59e0b','BBB AREA':'#3b82f6',
  'PRIMARY SORTING AREA':'#10b981','SECONDARY SORTING AREA':'#8b5cf6',
  'EXCEPTION AREA':'#ef4444','VOLUMETRIC HANDLING':'#06b6d4'};

const ASHORT={'INBOUND OUTBOUND STAGING':'IOS','BBB AREA':'BBB',
  'PRIMARY SORTING AREA':'PSA','SECONDARY SORTING AREA':'SSA',
  'EXCEPTION AREA':'EXC','VOLUMETRIC HANDLING':'VOL'};

const ACOL={'INBOUND OUTBOUND STAGING':'IOS_Score_%','BBB AREA':'BBB_Score_%',
  'PRIMARY SORTING AREA':'PSA_Score_%','SECONDARY SORTING AREA':'SSA_Score_%',
  'EXCEPTION AREA':'EXC_Score_%','VOLUMETRIC HANDLING':'VOL_Score_%'};

const FMAP={
  Large:['NCR BILASPUR','ONE NCR','SURAT','NCR TAURU','BANGALORE'],
  Medium:['KOLKATA 2','KOLKATA','LUCKNOW','PATNA','NAGPUR','AHMEDABAD','JAIPUR','HYDERABAD','NCR BAMNOLI','MUMBAI'],
  Small:['LUDIANA','CHENNAI','GUWAHATI','VIJAYAWADA','COIMBATORE','HUBLI','INDORE','SAGAR']
};

const QS={
  'INBOUND OUTBOUND STAGING':['Open shipments found near the dock area?','Is Real time taping happening at the DC (dock & staging area)?','Are the dock team doing proper segregation of the bags while unloading?','Is there a separate dock exception area or cowkart at the dock?','Are damaged/problematic shipments or bags handed over to Exception Team in real time?','Is real time clearance happening at dock exception?','Are bags being handled properly during loading and unloading?','Is the In/Out-scanning activity of the bags done under CCTV coverage?','Are bags in-scanned (received) in real time while unloading?','Are the dock shutters closed after unloading/loading a vehicle? (cut-off 2hrs)','Are all bags correctly sorted at the staging areas?','Is bag integrity maintained at the staging area and during loading?','Are there any random trolleys of bags left unattended at dock/staging area?','Is FIFO getting maintained for locations which are on hold?','Are all bags at the staging area sealed with valid seals and manifest labels?','Are GCs stepping on the manifests at staging or while unloading?','Are GCs using their own credentials for scanning while loading or unloading?','Is the vehicle seal applied by the security/dock team?','Are the vehicle seals being verified by the security team as per the docket copy?'],
  'BBB AREA':['Are GCs at BBB Area using their own credentials?','Are different area barcodes being used for each BBB receiving station?','Are Temp IDs being used for BBB receiving with GC credentials recorded by Ops?','Are EXP barcodes being stuck and in-scanned for all exception shipments found during BBB in real time?','Are real time taping of damage shipments/empty happening at BBB?','Are bags being emptied inside out at the BBB area?','Are the BBB layouts fixed & under CCTV camera coverage?'],
  'PRIMARY SORTING AREA':['Are all shipments properly placed and not lying loose on the floor under PTL or near sorter areas?','Are there dedicated bins for rejection shipments at primary layout?','Are the primary layouts fixed?','Are inside out process of manifests being followed at the primary sorting area?','Are Higher ageing FWD Cancel and REV shipments (2+ ageing) found in FWD layouts?'],
  'SECONDARY SORTING AREA':['Are barcodes of different layouts placed separately?','Are the correct bin barcodes being pasted on the PTL?','Have bags been set up all the 15/30 bins on the PTL?','Is manifesting process being done on PTL rack at the PTLs?','Are the GCs removing the bags from the PTL and then closing a manifest?','Is bulk manifesting/bulk label pasting being followed at the site?','Are yellow bags being used for creating Within DC bags at the site?','Is only one person working on PTL in manifesting process?','Are inside out process of manifest being followed at the secondary sorting area?','Are there dedicated bins for rejection shipments at secondary layouts?','Are Problematic shipments being moved to exception area every 1 hour?','Are problematic shipments from BBB, primary and secondary being mixed into a single trolley?','Are GCs closing the bags at secondary layouts by hole-punch process?','Are the manifests being created with shipments below 80% capacity?','Does the Ops give prior intimation on layout changes or duplicate PTL layouts?','Are all corners of the DC clear of any shipment pile-ups?','Are higher ageing Rejection shipments found on floor? (CFGR/WPTR)'],
  'EXCEPTION AREA':['Are EXP barcodes being pasted on all shipments which are pending at exception?','Are all the orphan shipments entered in the exception sheet using EXP barcodes in real time?','Are HOV shipments being kept inside HOV cages?','Are orphan shipments from BBB and FWD processing kept separately with date wise segregation?'],
  'VOLUMETRIC HANDLING':['Are volumetric shipments handled properly during loading and unloading?','Are volumetric shipments processed on a separate table instead of running conveyors?','Is real-time taping of volumetric shipments being followed?','Are there any loose volumetric shipments found scattered on the floor?','Is there a separate staging area designated for volumetric shipments?','Are volumetric shipments handled correctly within the processing area?','Are non-volumetric shipments incorrectly processed as volumetric shipments on the floor?'],
};

// ════════════════════════════════════════════════════════
//  THEME
// ════════════════════════════════════════════════════════
const C={bg:'#0d1117',card:'#161b22',border:'#30363d',accent:'#f59e0b',abl:'rgba(245,158,11,.1)',
  text:'#e6edf3',muted:'#8b949e',pass:'#10b981',fail:'#ef4444',na:'#6b7280',
  blue:'#3b82f6',purple:'#8b5cf6',cyan:'#06b6d4'};
const mono="'IBM Plex Mono',monospace";

// ════════════════════════════════════════════════════════
//  UTILITIES
// ════════════════════════════════════════════════════════
const scCol=v=>v>=80?C.pass:v>=60?C.accent:C.fail;
const scLabel=v=>v>=80?'GOOD':v>=60?'MONITOR':'ACTION';
function weekNum(d){const u=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));const day=u.getUTCDay()||7;u.setUTCDate(u.getUTCDate()+4-day);const y=new Date(Date.UTC(u.getUTCFullYear(),0,1));return Math.ceil((((u-y)/864e5)+1)/7);}
function toNeg(q){const c=q.replace(/\?.*$/,'').trim().toUpperCase();if(c.startsWith('IS '))return'NO '+c.slice(3);if(c.startsWith('ARE '))return'NOT '+c.slice(4);if(c.startsWith('HAS '))return'HAS NOT '+c.slice(4);if(c.startsWith('HAVE '))return'HAVE NOT '+c.slice(5);if(c.startsWith('DOES '))return'DOES NOT '+c.slice(5);return'ISSUE: '+c;}
function parseURLs(raw){if(!raw)return[];return String(raw).split('\n').map(u=>u.trim()).filter(u=>u.startsWith('http'));}
function parseAns(rec){try{const v=rec['Answers_JSON'];return typeof v==='string'?JSON.parse(v||'{}'):(v||{});}catch{return{};}}
function fmtW(w){return'W'+String(w).padStart(2,'0');}
const pct=(n,d)=>d===0?0:Math.round(n/d*100);

// ════════════════════════════════════════════════════════
//  SHEET COMMUNICATION
// ════════════════════════════════════════════════════════
const sheetOK=()=>SHEET_URL&&!SHEET_URL.startsWith('YOUR_');
const cloudOK=()=>CL_CLOUD&&!CL_CLOUD.startsWith('YOUR_');

async function uploadMedia(src,type='image'){
  if(!cloudOK())return null;const fd=new FormData();fd.append('upload_preset',CL_PRESET);
  let blob;
  if(src instanceof File||src instanceof Blob)blob=src;
  else if(typeof src==='string'&&(src.startsWith('data:')||src.startsWith('blob:')))blob=await fetch(src).then(r=>r.blob());
  else return null;
  fd.append('file',blob);
  const res=await fetch(`https://api.cloudinary.com/v1_1/${CL_CLOUD}/${type}/upload`,{method:'POST',body:fd});
  const d=await res.json();if(d.secure_url)return d.secure_url;throw new Error(d.error?.message||'Upload failed');
}

async function postToSheet(payload){
  if(!sheetOK())throw new Error('Apps Script URL not configured.');
  try{await fetch(SHEET_URL,{method:'POST',mode:'no-cors',body:JSON.stringify(payload)});return{ok:true};}
  catch(e){throw new Error('Network error: '+e.message);}
}

function _jsonp(url){
  return new Promise((res,rej)=>{
    const cb='_gs_'+Date.now()+'_'+Math.random().toString(36).slice(2,7);
    const tag=document.createElement('script');
    const t=setTimeout(()=>{cleanup();rej(new Error('Timed out after 25s.\nVerify the Apps Script is deployed with "Anyone" access.'));},25000);
    const cleanup=()=>{clearTimeout(t);try{delete window[cb];}catch(_){}tag.parentNode?.removeChild(tag);};
    window[cb]=data=>{cleanup();res(data);};
    tag.src=url+(url.includes('?')?'&':'?')+'callback='+cb+'&_t='+Date.now();
    tag.onerror=()=>{cleanup();rej(new Error('Script load failed.\nDeploy Apps Script → Web App → Access: Anyone'));};
    document.head.appendChild(tag);
  });
}

async function fetchSheet(){
  if(!sheetOK())return{ok:false,records:[],error:'Apps Script URL not configured in SHEET_URL constant.'};
  return _jsonp(SHEET_URL+'?action=get');
}

// ════════════════════════════════════════════════════════
//  SHARED COMPONENTS
// ════════════════════════════════════════════════════════
function ScBadge({score,lg}){
  const c=scCol(score);
  return html`<span class="badge" style=${{background:c+'20',color:c,border:`1px solid ${c}44`,padding:lg?'6px 16px':'3px 10px',fontSize:lg?18:12}}>${score}%</span>`;
}
function PBar({v,color=C.accent,h=6}){
  return html`<div class="pbar-wrap" style=${{height:h}}><div class="pbar-fill" style=${{width:`${Math.min(100,Math.max(0,v))}%`,height:h,background:color}}/></div>`;
}
function SH({children,c=C.muted,mb=14}){
  return html`<div style=${{color:c,fontSize:11,fontFamily:mono,letterSpacing:1.4,fontWeight:700,marginBottom:mb,textTransform:'uppercase',borderLeft:`3px solid ${c}66`,paddingLeft:10}}>${children}</div>`;
}
function Empty({icon='📭',title='NO DATA',sub=''}){
  return html`<div style=${{textAlign:'center',padding:'50px 20px'}}>
    <div style=${{fontSize:44,opacity:.15,marginBottom:14}}>${icon}</div>
    <div style=${{color:C.muted,fontFamily:mono,fontSize:12,fontWeight:700,letterSpacing:1.5}}>${title}</div>
    ${sub?html`<div style=${{color:C.muted,fontSize:11,marginTop:8,opacity:.7}}>${sub}</div>`:''}
  </div>`;
}

// Chart.js wrapper — destroys and recreates on data change
function ChartComp({type,data,options,style={}}){
  const ref=useRef(null);const inst=useRef(null);
  const sig=useMemo(()=>JSON.stringify({type,data,options}),[type,data,options]);
  useEffect(()=>{
    if(!ref.current||!window.Chart)return;
    inst.current?.destroy();inst.current=null;
    try{inst.current=new window.Chart(ref.current,{type,data,options});}catch(e){console.warn('Chart err',e);}
    return()=>{inst.current?.destroy();inst.current=null;};
  },[sig]);
  return html`<canvas ref=${ref} style=${style}/>`;
}

// ════════════════════════════════════════════════════════
//  LIGHTBOX
// ════════════════════════════════════════════════════════
function Lightbox({items,idx:start=0,onClose}){
  const[idx,setIdx]=useState(start);const[zoom,setZoom]=useState(1);
  useEffect(()=>setZoom(1),[idx]);
  if(!items?.length)return null;
  const it=items[Math.min(idx,items.length-1)];
  const isImg=it.type==='image';
  const prev=()=>setIdx(i=>Math.max(0,i-1));
  const next=()=>setIdx(i=>Math.min(items.length-1,i+1));
  const navBtn=(txt,fn,dis)=>html`<button onClick=${fn} disabled=${dis} style=${{background:'rgba(255,255,255,.08)',color:dis?C.border:C.text,border:`1px solid ${dis?C.border:C.muted}`,borderRadius:6,padding:'9px 20px',fontFamily:mono,fontSize:12,cursor:dis?'default':'pointer',opacity:dis?.35:1,flex:1}}>
    ${txt}
  </button>`;
  return html`<div class="overlay" onClick=${onClose}>
    <div onClick=${e=>e.stopPropagation()} style=${{display:'flex',flexDirection:'column',alignItems:'center',width:'100%',maxWidth:'92vw',gap:12}}>
      <div style=${{display:'flex',justifyContent:'space-between',width:'100%',alignItems:'center'}}>
        <span style=${{color:C.muted,fontFamily:mono,fontSize:10,letterSpacing:1}}>${isImg?'📷':'🎥'} ${idx+1} / ${items.length}</span>
        <div style=${{display:'flex',gap:8,alignItems:'center'}}>
          ${isImg?html`
            <div style=${{display:'flex',gap:4,background:'rgba(255,255,255,.06)',borderRadius:6,padding:4}}>
              <button onClick=${()=>setZoom(z=>Math.min(4,+(z+.5).toFixed(1)))} style=${{background:'transparent',color:C.muted,border:'none',width:28,height:28,cursor:'pointer',fontSize:14,display:'flex',alignItems:'center',justifyContent:'center',borderRadius:4}}>+</button>
              <span style=${{color:C.accent,fontFamily:mono,fontSize:10,alignSelf:'center',minWidth:36,textAlign:'center'}}>${Math.round(zoom*100)}%</span>
              <button onClick=${()=>setZoom(z=>Math.max(1,+(z-.5).toFixed(1)))} style=${{background:'transparent',color:C.muted,border:'none',width:28,height:28,cursor:'pointer',fontSize:14,display:'flex',alignItems:'center',justifyContent:'center',borderRadius:4}}>−</button>
            </div>`:''}
          <button onClick=${onClose} style=${{background:C.fail+'22',color:C.fail,border:`1px solid ${C.fail}44`,borderRadius:6,padding:'6px 16px',cursor:'pointer',fontFamily:mono,fontSize:11,fontWeight:700,letterSpacing:.5}}>✕ CLOSE</button>
        </div>
      </div>
      <div style=${{width:'100%',background:'#050709',borderRadius:12,display:'flex',justifyContent:'center',alignItems:'center',minHeight:220,maxHeight:'68vh',overflow:'hidden',border:`1px solid ${C.border}`}}>
        ${isImg
          ?html`<img src=${it.src||it.url} style=${{maxWidth:'100%',maxHeight:'68vh',objectFit:'contain',transform:`scale(${zoom})`,transition:'transform .2s',cursor:zoom>1?'grab':'default'}}/>`
          :html`<video src=${it.url||it.src} controls autoPlay style=${{maxWidth:'100%',maxHeight:'68vh',borderRadius:8}}/>`}
      </div>
      ${items.length>1?html`<div style=${{display:'flex',gap:6,flexWrap:'wrap',justifyContent:'center',maxWidth:'90vw'}}>
        ${items.map((x,j)=>html`<div key=${j} onClick=${()=>setIdx(j)} style=${{width:48,height:48,borderRadius:6,overflow:'hidden',cursor:'pointer',border:`2px solid ${j===idx?C.accent:C.border}`,background:'#050709',transition:'border-color .15s'}}>
          ${x.type==='image'?html`<img src=${x.src||x.url} style=${{width:'100%',height:'100%',objectFit:'cover'}}/>`:html`<div style=${{width:'100%',height:'100%',display:'flex',alignItems:'center',justifyContent:'center',background:'#0a2030',fontSize:18}}>🎥</div>`}
        </div>`)}
      </div>`:''}

function Annotate({src,onSave,onDiscard}){
  const cv=useRef(null);const[draw,setDraw]=useState(false);const[clr,setClr]=useState('#ef4444');const[sz,setSz]=useState(4);const[tool,setTool]=useState('pen');const last=useRef(null);
  useEffect(()=>{if(!cv.current||!src)return;const el=cv.current,ctx=el.getContext('2d'),img=new Image();img.onload=()=>{el.width=img.naturalWidth;el.height=img.naturalHeight;ctx.drawImage(img,0,0);};img.src=src;},[src]);
  const pt=(e,el)=>{const r=el.getBoundingClientRect(),s=e.touches?e.touches[0]:e;return{x:(s.clientX-r.left)*el.width/r.width,y:(s.clientY-r.top)*el.height/r.height};};
  const sd=e=>{setDraw(true);last.current=pt(e,cv.current);};
  const dd=e=>{if(!draw||!cv.current)return;e.preventDefault();const ctx=cv.current.getContext('2d'),p=pt(e,cv.current);ctx.beginPath();ctx.moveTo(last.current.x,last.current.y);ctx.lineTo(p.x,p.y);ctx.strokeStyle=tool==='eraser'?'#fff':clr;ctx.lineWidth=tool==='eraser'?sz*6:sz;ctx.lineCap='round';ctx.lineJoin='round';ctx.globalCompositeOperation=tool==='eraser'?'destination-out':'source-over';ctx.stroke();last.current=p;};
  const ed=()=>{setDraw(false);last.current=null;};
  const COLS=['#ef4444','#f59e0b','#10b981','#3b82f6','#8b5cf6','#ffffff','#111111'];
  return html`<div class="overlay" onClick=${e=>e.stopPropagation()}>
    <div style=${{background:C.card,borderRadius:12,padding:16,width:'100%',maxWidth:680,maxHeight:'92vh',display:'flex',flexDirection:'column',gap:10}}>
      <div style=${{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <span style=${{color:C.accent,fontFamily:mono,fontSize:12,fontWeight:700}}>✏ ANNOTATE IMAGE</span>
        <div style=${{display:'flex',gap:8}}>
          <button onClick=${()=>cv.current&&onSave(cv.current.toDataURL())} style=${{background:C.pass+'33',color:C.pass,border:`1px solid ${C.pass}`,borderRadius:6,padding:'6px 16px',fontFamily:mono,fontSize:12,fontWeight:700,cursor:'pointer'}}>✓ SAVE</button>
          <button onClick=${onDiscard} style=${{background:C.fail+'22',color:C.fail,border:`1px solid ${C.fail}`,borderRadius:6,padding:'6px 16px',fontFamily:mono,fontSize:12,cursor:'pointer'}}>✕ DISCARD</button>
        </div>
      </div>
      <div style=${{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
        <div style=${{display:'flex',gap:5}}>${COLS.map(c=>html`<div key=${c} onClick=${()=>{setClr(c);setTool('pen');}} style=${{width:22,height:22,borderRadius:'50%',background:c,cursor:'pointer',border:`2px solid ${clr===c&&tool==='pen'?'#fff':C.border}`}}/>`)}</div>
        <div style=${{display:'flex',gap:5}}>${[2,4,8,14].map(s=>html`<div key=${s} onClick=${()=>setSz(s)} style=${{width:s+10,height:s+10,borderRadius:'50%',background:sz===s?C.accent:C.muted,cursor:'pointer',border:`2px solid ${sz===s?C.accent:C.border}`}}/>`)}</div>
        <button onClick=${()=>setTool(t=>t==='eraser'?'pen':'eraser')} style=${{background:tool==='eraser'?C.abl:'transparent',color:tool==='eraser'?C.accent:C.muted,border:`1px solid ${tool==='eraser'?C.accent:C.border}`,borderRadius:6,padding:'4px 12px',fontFamily:mono,fontSize:11,cursor:'pointer'}}>⬜ ERASER</button>
      </div>
      <div style=${{overflow:'auto',flex:1,borderRadius:8,border:`1px solid ${C.border}`,background:'#000',display:'flex',justifyContent:'center',alignItems:'center'}}>
        <canvas ref=${cv} style=${{maxWidth:'100%',maxHeight:'56vh',cursor:'crosshair',touchAction:'none'}} onMouseDown=${sd} onMouseMove=${dd} onMouseUp=${ed} onMouseLeave=${ed} onTouchStart=${sd} onTouchMove=${dd} onTouchEnd=${ed}/>
      </div>
    </div>
  </div>`;
}

          <button onClick=${()=>vfRef.current?.click()} style=${{background:'#0891b222',color:'#0891b2',border:`1px solid #0891b2`,borderRadius:6,padding:'8px 12px',fontSize:11,fontFamily:mono,cursor:'pointer'}}>📹 VIDEO</button>
          <input ref=${vfRef} type="file" accept="video/*" multiple style=${{display:'none'}} onChange=${e=>vidFile(e,curAr,cq)}/>
        </div>
        ${(ca.images||[]).length>0?html`<div style=${{display:'flex',flexWrap:'wrap',gap:8,marginTop:12}}>${(ca.images||[]).map((img,j)=>html`<div key=${j} style=${{position:'relative'}}><img src=${img} style=${{width:68,height:68,objectFit:'cover',borderRadius:6,border:`2px solid ${C.border}`}}/><button onClick=${()=>setFld(curAr,cq,'images',ca.images.filter((_,k)=>k!==j))} style=${{position:'absolute',top:-5,right:-5,background:C.fail,color:'#fff',border:'none',borderRadius:'50%',width:18,height:18,cursor:'pointer',fontSize:10,display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button></div>`)}</div>`:''}
        ${(ca.videos||[]).length>0?html`<div style=${{display:'flex',flexWrap:'wrap',gap:8,marginTop:10}}>${(ca.videos||[]).map((v,j)=>html`<div key=${j} style=${{position:'relative',background:C.bg,border:`2px solid #06b6d444`,borderRadius:8,overflow:'hidden'}}><video src=${v.url} controls style=${{width:150,height:90,objectFit:'cover',display:'block'}}/><div style=${{padding:'3px 8px',fontSize:9,color:C.muted,fontFamily:mono,maxWidth:150,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>${v.name}</div><button onClick=${()=>setFld(curAr,cq,'videos',ca.videos.filter((_,k)=>k!==j))} style=${{position:'absolute',top:4,right:4,background:C.fail,color:'#fff',border:'none',borderRadius:'50%',width:20,height:20,cursor:'pointer',fontSize:11,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button></div>`)}</div>`:''}
      </div>
      <div style=${{display:'flex',gap:10}}>
        <button onClick=${()=>setQi(i=>Math.max(0,i-1))} disabled=${qi===0} style=${{flex:1,background:'transparent',color:C.muted,border:`1px solid ${C.border}`,borderRadius:6,padding:'13px 0',fontFamily:mono,fontSize:11,cursor:qi===0?'default':'pointer',opacity:qi===0?.3:1}}>← PREV</button>
        ${qi<qs.length-1?html`<button onClick=${()=>setQi(i=>i+1)} disabled=${!ca.answer} style=${{flex:2,background:ca.answer?C.abl:'transparent',color:ca.answer?C.accent:C.muted,border:`2px solid ${ca.answer?C.accent:C.border}`,borderRadius:6,padding:'13px 0',fontSize:12,fontFamily:mono,fontWeight:700,cursor:ca.answer?'pointer':'default',opacity:ca.answer?1:.4}}>NEXT QUESTION →</button>`:html`<button onClick=${submitArea} disabled=${!arOk} style=${{flex:2,background:arOk?C.pass+'22':'transparent',color:arOk?C.pass:C.muted,border:`2px solid ${arOk?C.pass:C.border}`,borderRadius:6,padding:'13px 0',fontSize:12,fontFamily:mono,fontWeight:700,cursor:arOk?'pointer':'default',opacity:arOk?1:.4}}>✓ SUBMIT AREA</button>`}
      </div>
    </div>
  </div>`;
  if(step==='areas')return html`<div style=${{minHeight:'100vh',background:C.bg}}>
    <div style=${{maxWidth:600,margin:'0 auto',padding:16}}>
      <div style=${{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:16,marginBottom:20}}>
        <div style=${{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div><div style=${{fontFamily:mono,fontSize:16,fontWeight:700,color:C.text}}>${info.site}</div><div style=${{color:C.muted,fontSize:12,marginTop:4}}>Week ${info.week} · ${info.auditor}</div></div>
          <button onClick=${onBack} style=${{background:'transparent',color:C.muted,border:'none',fontFamily:mono,fontSize:10,cursor:'pointer'}}>← HOME</button>
        </div>
        <div style=${{marginTop:14}}><${PBar} v=${(doneAr.length/AREAS.length)*100} color=${C.pass}/><div style=${{color:C.muted,fontSize:11,marginTop:5,fontFamily:mono}}>${doneAr.length}/${AREAS.length} areas completed</div></div>
      </div>
      <div style=${{color:C.muted,fontSize:10,fontFamily:mono,letterSpacing:1.5,marginBottom:12}}>SELECT AREA TO AUDIT</div>
      ${AREAS.map(ar=>{const done=doneAr.includes(ar);return html`<button key=${ar} onClick=${()=>{if(!done){setCurAr(ar);setStep('questions');setQi(0);}}} disabled=${done} style=${{display:'flex',justifyContent:'space-between',alignItems:'center',width:'100%',background:done?C.pass+'0f':C.card,border:`1px solid ${done?C.pass+'44':C.border}`,borderRadius:10,padding:'16px 20px',marginBottom:10,color:done?C.pass:C.text,cursor:done?'default':'pointer',textAlign:'left'}}>
        <div><div style=${{fontFamily:mono,fontSize:13,fontWeight:done?700:400}}>${ar}</div><div style=${{color:C.muted,fontSize:11,marginTop:4}}>${QS[ar].length} questions</div></div>
        <span style=${{fontSize:20,color:done?C.pass:ACLR[ar]}}>${done?'✓':'→'}</span>
      </button>`;})}
      ${doneAr.length===AREAS.length?html`<button onClick=${submitAll} style=${{width:'100%',background:C.pass+'22',color:C.pass,border:`2px solid ${C.pass}`,borderRadius:8,padding:'16px 0',fontSize:14,fontFamily:mono,fontWeight:700,cursor:'pointer',marginTop:12,letterSpacing:.8}}>✓ SUBMIT ALL — RECORD RESPONSE</button>`:''}
    </div>
  </div>`;
  return html`<div style=${{minHeight:'100vh',background:C.bg}}>
    <div style=${{maxWidth:500,margin:'0 auto',padding:16}}>
      <div style=${{textAlign:'center',padding:'28px 0 34px'}}>
        <div style=${{color:C.accent,fontFamily:mono,fontSize:10,letterSpacing:3}}>AUDIT ENTRY</div>
        <h1 style=${{color:C.text,fontFamily:mono,fontSize:22,fontWeight:700,marginTop:6}}>FILL SCORECARD</h1>
      </div>
      ${[{label:'SITE NAME',key:'site',type:'select'},{label:'DATE',key:'date',type:'date'},{label:'WEEK NUMBER (AUTO)',key:'week',type:'number',ro:true},{label:'AUDITOR NAME',key:'auditor',type:'text',ph:'Enter full name'}].map(f=>html`
        <div key=${f.key} style=${{marginBottom:18}}>
          <label style=${{color:C.muted,fontSize:10,fontFamily:mono,letterSpacing:1.5,display:'block',marginBottom:8}}>${f.label}</label>
          ${f.type==='select'?html`<select value=${info[f.key]} onChange=${e=>setInfo(p=>({...p,[f.key]:e.target.value}))} style=${{width:'100%',background:C.card,color:C.text,border:`1px solid ${C.border}`,borderRadius:8,padding:'13px 14px',fontSize:14,cursor:'pointer'}}>${SITES.map(s=>html`<option key=${s}>${s}</option>`)}</select>`:html`<input type=${f.type} readOnly=${!!f.ro} value=${info[f.key]} placeholder=${f.ph||''} onInput=${e=>{if(f.key==='date'){const d=new Date(e.target.value);setInfo(p=>({...p,date:e.target.value,week:isNaN(d.getTime())?p.week:weekNum(d)}));}else setInfo(p=>({...p,[f.key]:e.target.value}));}} style=${{width:'100%',background:f.ro?'#0a0d12':C.card,color:f.ro?C.muted:C.text,border:`1px solid ${C.border}`,borderRadius:8,padding:'13px 14px',fontSize:14}}/>`}
        </div>`)}
      <button onClick=${()=>info.auditor.trim()?setStep('areas'):alert('Please enter auditor name')} style=${{width:'100%',background:C.abl,color:C.accent,border:`2px solid ${C.accent}`,borderRadius:8,padding:'16px 0',fontSize:15,fontFamily:mono,fontWeight:700,cursor:'pointer',marginTop:8,letterSpacing:1}}>START AUDIT →</button>
      <button onClick=${onBack} style=${{width:'100%',background:'transparent',color:C.muted,border:`1px solid ${C.border}`,borderRadius:8,padding:'13px 0',fontFamily:mono,fontSize:13,cursor:'pointer',marginTop:10}}>← BACK TO HOME</button>
    </div>
  </div>`;
}

// ════════════════════════════════════════════════════════
//  TAB 1: OVERVIEW
// ════════════════════════════════════════════════════════
function OverviewTab({records,week}){
  const[view,setView]=useState('list');
  const[lb,setLb]=useState(null);

  const wRecs=useMemo(()=>records.filter(r=>Number(r['Week_No'])===week),[records,week]);

  const siteScores=useMemo(()=>wRecs.map(r=>({
    site:String(r['Site']||''),
    score:Number(r['Overall_Score_%'])||0,
    auditor:String(r['Auditor']||'—'),
    date:String(r['Audit_Date']||'—'),
  })).sort((a,b)=>b.score-a.score),[wRecs]);

  const netAvg=siteScores.length?Math.round(siteScores.reduce((s,x)=>s+x.score,0)/siteScores.length):0;
  const top3=siteScores.slice(0,3);
  const bot3=[...siteScores].sort((a,b)=>a.score-b.score).slice(0,3);

  const areaAvgs=useMemo(()=>AREAS.map(area=>({
    area,short:ASHORT[area],color:ACLR[area],
    avg:wRecs.length?Math.round(wRecs.reduce((s,r)=>s+(Number(r[ACOL[area]])||0),0)/wRecs.length):0
  })),[wRecs]);

  // Fixed donut: only include areas with avg > 0 to avoid chart distortion
  const donutAreas=areaAvgs.filter(a=>a.avg>0);
  const hasDonutData=donutAreas.length>0;

  const donutData={
    labels:donutAreas.map(a=>a.short),
    datasets:[{
      data:donutAreas.map(a=>a.avg),
      backgroundColor:donutAreas.map(a=>a.color+'cc'),
      borderColor:donutAreas.map(a=>a.color),
      borderWidth:2,hoverOffset:8
    }]
  };
  const donutOpts={
    responsive:true,maintainAspectRatio:false,cutout:'60%',
    plugins:{
      legend:{display:false},
      tooltip:{callbacks:{label:ctx=>`${donutAreas[ctx.dataIndex]?.area||''}: ${donutAreas[ctx.dataIndex]?.avg||0}%`}},
      datalabels:{
        color:'#fff',
        font:{size:9,weight:'bold',family:mono},
        formatter:(_,ctx)=>`${donutAreas[ctx.dataIndex]?.short}\n${donutAreas[ctx.dataIndex]?.avg}%`,
        textAlign:'center',anchor:'center',align:'center',padding:2
      }
    }
  };

  const barData={
    labels:siteScores.map(s=>s.site.length>11?s.site.slice(0,11)+'…':s.site),
    datasets:[{
      label:'Score %',data:siteScores.map(s=>s.score),
      backgroundColor:siteScores.map(s=>scCol(s.score)+'aa'),
      borderColor:siteScores.map(s=>scCol(s.score)),
      borderWidth:1,borderRadius:4
    }]
  };
  const barOpts={
    responsive:true,maintainAspectRatio:false,
    plugins:{legend:{display:false},datalabels:{display:true,color:'#e6edf3',font:{size:9,weight:'bold',family:mono},formatter:v=>v+'%',anchor:'end',align:'top',offset:2}},
    scales:{
      x:{ticks:{color:C.muted,font:{size:9},maxRotation:55},grid:{color:C.border+'33'}},
      y:{min:0,max:105,ticks:{color:C.muted,callback:v=>v>100?'':v+'%'},grid:{color:C.border+'33'}}
    }
  };

  if(!wRecs.length)return html`<${Empty} icon="📋" title=${'NO DATA FOR WEEK '+fmtW(week)} sub="Submit scorecards to populate this view."/>`;

  const rankCls=i=>i===0?'rank rank-1':i===1?'rank rank-2':'rank rank-3';

  return html`<div class="fi">
    ${lb?html`<${Lightbox} items=${lb.items} idx=${lb.idx} onClose=${()=>setLb(null)}/>`:''}

    ${/* Stat cards */null}
    <div style=${{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(155px,1fr))',gap:12,marginBottom:24}}>
      <div class="stat-card amber"><div style=${{color:C.muted,fontSize:9,fontFamily:mono,letterSpacing:1.4,marginBottom:8}}>DCS SUBMITTED</div><div style=${{color:C.accent,fontFamily:mono,fontSize:28,fontWeight:700,lineHeight:1}}>${siteScores.length}</div><div style=${{color:C.muted,fontSize:10,marginTop:4}}>of ${SITES.length} total</div></div>
      <div class="stat-card ${netAvg>=80?'green':netAvg>=60?'amber':'red'}"><div style=${{color:C.muted,fontSize:9,fontFamily:mono,letterSpacing:1.4,marginBottom:8}}>NETWORK AVERAGE</div><div style=${{color:scCol(netAvg),fontFamily:mono,fontSize:28,fontWeight:700,lineHeight:1}}>${netAvg}%</div><div style=${{color:C.muted,fontSize:10,marginTop:4}}>${scLabel(netAvg)}</div></div>
      <div class="stat-card green"><div style=${{color:C.muted,fontSize:9,fontFamily:mono,letterSpacing:1.4,marginBottom:8}}>≥ 80% GOOD</div><div style=${{color:C.pass,fontFamily:mono,fontSize:28,fontWeight:700,lineHeight:1}}>${siteScores.filter(s=>s.score>=80).length}</div><div style=${{color:C.muted,fontSize:10,marginTop:4}}>sites</div></div>
      <div class="stat-card red"><div style=${{color:C.muted,fontSize:9,fontFamily:mono,letterSpacing:1.4,marginBottom:8}}>&lt; 60% ACTION NEEDED</div><div style=${{color:C.fail,fontFamily:mono,fontSize:28,fontWeight:700,lineHeight:1}}>${siteScores.filter(s=>s.score<60).length}</div><div style=${{color:C.muted,fontSize:10,marginTop:4}}>sites</div></div>
    </div>

    ${/* Top 3 / Bottom 3 */null}
    <div style=${{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:24}} class="col-2">
      ${[{label:'▲ TOP 3 PERFORMING',color:C.pass,data:top3},{label:'▼ BOTTOM 3 PERFORMING',color:C.fail,data:bot3}].map(({label,color,data},gi)=>html`
        <div key=${gi} style=${{background:C.card,border:`1px solid ${color}22`,borderRadius:10,padding:16}}>
          <${SH} c=${color}>${label}</${SH}>
          ${data.map((s,i)=>html`<div key=${i} style=${{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 0',borderBottom:i<data.length-1?`1px solid ${C.border}20`:'none'}}>
            <div style=${{display:'flex',alignItems:'center',gap:10}}>
              <div class=${rankCls(i)}>${i+1}</div>
              <div>
                <div style=${{color:C.text,fontSize:13,fontWeight:500}}>${s.site}</div>
                <div style=${{color:C.muted,fontSize:10,marginTop:1}}>${s.auditor}</div>
              </div>
            </div>
            <${ScBadge} score=${s.score}/>
          </div>`)}
        </div>`)}
    </div>

    ${/* Donut + area bars */null}
    <div class="card" style=${{padding:20,marginBottom:24}}>
      <${SH}>Network Average — Area Breakdown (${fmtW(week)})</${SH}>
      <div style=${{display:'flex',gap:28,alignItems:'center',flexWrap:'wrap'}}>
        <div style=${{position:'relative',width:200,height:200,flexShrink:0,margin:'0 auto'}}>
          ${hasDonutData
            ?html`<${ChartComp} type="doughnut" data=${donutData} options=${donutOpts} style=${{width:'100%',height:'100%'}}/>`
            :html`<div style=${{width:'100%',height:'100%',display:'flex',alignItems:'center',justifyContent:'center',borderRadius:'50%',border:`2px dashed ${C.border}`,color:C.muted,fontFamily:mono,fontSize:10}}>NO DATA</div>`}
          <div style=${{position:'absolute',top:'50%',left:'50%',transform:'translate(-50%,-50%)',textAlign:'center',pointerEvents:'none'}}>
            <div style=${{fontSize:22,fontFamily:mono,fontWeight:700,color:C.accent,lineHeight:1}}>${netAvg}%</div>
            <div style=${{fontSize:8,color:C.muted,fontFamily:mono,letterSpacing:1.5,marginTop:3}}>NETWORK</div>
          </div>
        </div>
        <div style=${{flex:1,minWidth:200}}>
          ${areaAvgs.map(a=>html`<div key=${a.area} style=${{marginBottom:11}}>
            <div style=${{display:'flex',justifyContent:'space-between',marginBottom:4,alignItems:'baseline'}}>
              <span style=${{fontSize:10,color:C.text,fontFamily:mono}}><span style=${{color:a.color,fontWeight:700}}>${a.short}</span> ${a.area}</span>
              <span style=${{fontSize:14,color:a.color,fontFamily:mono,fontWeight:700,flexShrink:0,marginLeft:8}}>${a.avg}%</span>
            </div>
            <${PBar} v=${a.avg} color=${a.color} h=${5}/>
          </div>`)}
        </div>
      </div>
    </div>

    ${/* List / Chart toggle + all sites */null}
    <div class="card" style=${{padding:16}}>
      <div style=${{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16,flexWrap:'wrap',gap:10}}>
        <${SH} mb=${0}>All Sites — ${fmtW(week)} Performance</${SH}>
        <div class="tgl">
          <button class=${'tgl-btn'+(view==='list'?' on':'')} onClick=${()=>setView('list')}>≡ LIST</button>
          <button class=${'tgl-btn'+(view==='chart'?' on':'')} onClick=${()=>setView('chart')}>▦ CHART</button>
        </div>
      </div>
      ${view==='list'
        ?html`<div>${siteScores.map((s,i)=>html`<div key=${i} style=${{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 0',borderBottom:i<siteScores.length-1?`1px solid ${C.border}20`:'none'}}>
          <div>
            <span style=${{color:C.text,fontSize:13,fontWeight:500}}>${s.site}</span>
            <span style=${{color:C.muted,fontSize:10,marginLeft:10,fontFamily:mono}}>${s.auditor}</span>
          </div>
          <div style=${{display:'flex',alignItems:'center',gap:14}}>
            <div style=${{width:120,height:5,background:C.border,borderRadius:3,overflow:'hidden'}}><div style=${{width:s.score+'%',height:'100%',background:scCol(s.score),borderRadius:3}}/></div>
            <${ScBadge} score=${s.score}/>
          </div>
        </div>`)}</div>`
        :html`<div style=${{height:Math.max(260,siteScores.length*18)+'px'}}><${ChartComp} type="bar" data=${barData} options=${barOpts} style=${{width:'100%',height:'100%'}}/></div>`}
    </div>
  </div>`;
}

// ════════════════════════════════════════════════════════
//  TAB 2: DC DETAIL VIEW
// ════════════════════════════════════════════════════════
function DCDetailTab({records,week,site,setSite}){
  const[sub,setSub]=useState('performance');
  const[lb,setLb]=useState(null);

  const rec=useMemo(()=>records.find(r=>String(r['Site'])===site&&Number(r['Week_No'])===week)||null,[records,site,week]);
  const answers=useMemo(()=>rec?parseAns(rec):{},[rec]);

  const areaScores=useMemo(()=>AREAS.map(a=>({area:a,score:Number(rec?.[ACOL[a]])||0,color:ACLR[a],short:ASHORT[a]})),[rec]);
  const score=Number(rec?.['Overall_Score_%'])||0;
  const auditor=String(rec?.['Auditor']||'—');
  const date=String(rec?.['Audit_Date']||'—');
  const passC=Number(rec?.['Pass_Count'])||0;
  const failC=Number(rec?.['Fail_Count'])||0;
  const naC=Number(rec?.['NA_Count'])||0;

  const fails=useMemo(()=>{
    const out=[];
    AREAS.forEach(area=>{
      Object.entries(answers[area]||{}).forEach(([q,a])=>{
        if(a?.answer==='FAIL')out.push({area,q,neg:toNeg(q),remark:a.remark||'',
          imgs:(a.imageURLs||[]).filter(u=>u?.startsWith('http')),
          vids:(a.videoURLs||[]).filter(u=>u?.startsWith('http'))});
      });
    });
    return out;
  },[answers]);

  const allMedia=useMemo(()=>{
    const items=[];
    AREAS.forEach(area=>{
      Object.entries(answers[area]||{}).forEach(([q,a])=>{
        (a?.imageURLs||[]).forEach(u=>{if(u?.startsWith('http'))items.push({type:'image',src:u,area,q});});
        (a?.videoURLs||[]).forEach(u=>{if(u?.startsWith('http'))items.push({type:'video',url:u,area,q});});
      });
    });
    return items;
  },[answers]);

  const barData={
    labels:areaScores.map(a=>a.short),
    datasets:[{label:'Score %',data:areaScores.map(a=>a.score),
      backgroundColor:areaScores.map(a=>a.color+'bb'),
      borderColor:areaScores.map(a=>a.color),
      borderWidth:1,borderRadius:4}]
  };
  const barOpts={
    responsive:true,maintainAspectRatio:false,
    plugins:{legend:{display:false},datalabels:{display:true,color:'#e6edf3',font:{size:11,weight:'bold',family:mono},formatter:v=>v+'%',anchor:'end',align:'top',offset:3}},
    scales:{x:{ticks:{color:C.muted,font:{size:10}},grid:{color:C.border+'33'}},y:{min:0,max:105,ticks:{color:C.muted,callback:v=>v>100?'':v+'%'},grid:{color:C.border+'33'}}}
  };

  return html`<div class="fi">
    ${lb?html`<${Lightbox} items=${lb.items} idx=${lb.idx} onClose=${()=>setLb(null)}/>`:''}

    ${/* Site selector */null}
    <div style=${{marginBottom:20}}>
      <div style=${{color:C.muted,fontSize:9,fontFamily:mono,letterSpacing:1.5,marginBottom:6}}>SELECT SITE</div>
      <select value=${site} onChange=${e=>setSite(e.target.value)} style=${{background:C.card,color:C.text,border:`1px solid ${C.border}`,borderRadius:8,padding:'11px 18px',fontSize:14,fontFamily:mono,cursor:'pointer',minWidth:220}}>
        ${SITES.map(s=>html`<option key=${s}>${s}</option>`)}
      </select>
    </div>

    ${/* Score header */null}
    ${rec?html`<div style=${{background:'linear-gradient(135deg,#161b22 0%,#1a2234 100%)',border:`1px solid ${scCol(score)}33`,borderRadius:14,padding:'22px 26px',marginBottom:20,position:'relative',overflow:'hidden'}}>
      <div style=${{position:'absolute',top:0,left:0,right:0,height:3,background:`linear-gradient(90deg,${scCol(score)},${scCol(score)}88)`}}/>
      <div style=${{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:16}}>
        <div>
          <h2 style=${{fontFamily:mono,fontSize:26,fontWeight:700,color:C.text,margin:'0 0 8px',letterSpacing:-1}}>${site}</h2>
          <div style=${{display:'flex',gap:6,flexWrap:'wrap',marginBottom:8}}>
            <span style=${{background:scCol(score)+'20',color:scCol(score),border:`1px solid ${scCol(score)}44`,borderRadius:4,padding:'3px 10px',fontFamily:mono,fontSize:10,fontWeight:700}}>${scLabel(score)}</span>
            <span style=${{background:'#ffffff08',color:C.muted,borderRadius:4,padding:'3px 10px',fontSize:10,fontFamily:mono}}>${date}</span>
            <span style=${{background:'#ffffff08',color:C.muted,borderRadius:4,padding:'3px 10px',fontSize:10,fontFamily:mono}}>${auditor}</span>
          </div>
          <div style=${{display:'flex',gap:14,fontFamily:mono,fontSize:11}}>
            <span style=${{color:C.pass}}>✓ ${passC} PASS</span>
            <span style=${{color:C.fail}}>✗ ${failC} FAIL</span>

  const dcByWeek=useMemo(()=>activeWeeks.map(wk=>{

    responsive:true,maintainAspectRatio:false,
    plugins:{legend:{display:false},datalabels:{display:ctx=>netByWeek[ctx.dataIndex]!==null,color:C.accent,font:{size:10,weight:'bold',family:mono},formatter:v=>v+'%',anchor:'end',align:'top',offset:4}},
    scales:{x:{ticks:{color:C.muted},grid:{color:C.border+'33'}},y:{min:0,max:105,ticks:{color:C.muted,callback:v=>v>100?'':v+'%'},grid:{color:C.border+'33'}}}
  };

  const dcData={
    labels:wkLabels,
    datasets:[
      {label:`${site} Overall`,data:dcByWeek,borderColor:C.blue,backgroundColor:C.blue+'25',
        borderWidth:2.5,tension:.35,fill:true,pointBackgroundColor:C.blue,pointRadius:5,spanGaps:false},
      ...AREAS.map(a=>({
        label:ASHORT[a],
        data:activeWeeks.map(wk=>{const r=records.find(r=>String(r['Site'])===site&&Number(r['Week_No'])===wk);return r?Number(r[ACOL[a]])||null:null;}),
        borderColor:ACLR[a],backgroundColor:'transparent',borderWidth:1.5,
        tension:.35,borderDash:[4,4],pointRadius:3,spanGaps:false
      }))
    ]
  };
  const dcOpts={
    responsive:true,maintainAspectRatio:false,
    plugins:{legend:{position:'bottom',labels:{color:C.muted,font:{size:10,family:mono},boxWidth:12,padding:12,usePointStyle:true}},datalabels:{display:false}},
    scales:{x:{ticks:{color:C.muted},grid:{color:C.border+'33'}},y:{min:0,max:105,ticks:{color:C.muted,callback:v=>v>100?'':v+'%'},grid:{color:C.border+'33'}}}
  };

  const tableData=AREAS.map(area=>({area,short:ASHORT[area],color:ACLR[area],
    weeks:activeWeeks.map(wk=>{const r=records.find(r=>String(r['Site'])===site&&Number(r['Week_No'])===wk);return r?Number(r[ACOL[area]])||0:null;})}));

    const fails={};
    allRecs.forEach(rec=>{const ans=parseAns(rec);AREAS.forEach(a=>{Object.entries(ans[a]||{}).forEach(([q,av])=>{if(av?.answer==='FAIL'){if(!fails[q])fails[q]={q,neg:toNeg(q),count:0,area:a};fails[q].count++;}});});});
    const topFails=Object.values(fails).sort((a,b)=>b.count-a.count).slice(0,12);
    const allImgs=[];
    allRecs.forEach(rec=>{const ans=parseAns(rec);AREAS.forEach(a=>{Object.values(ans[a]||{}).forEach(v=>{(v?.imageURLs||[]).forEach(u=>{if(u?.startsWith('http'))allImgs.push({url:u,wk:rec['Week_No'],area:a});});});});});
    const w=window.open('','_blank');if(!w)return alert('Popup blocked — allow popups for this site');

    const scoreBg=(v)=>v>=80?'#d1fae5':v>=60?'#fef3c7':'#fee2e2';
    let body=`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>DC Performance Report — ${site}</title>

<p class="sub">Generated: ${new Date().toLocaleString('en-IN')} &nbsp;|&nbsp; Weeks covered: ${allRecs.length>0?fmtW(Math.min(...allRecs.map(r=>Number(r['Week_No']))))+' – '+fmtW(Math.max(...allRecs.map(r=>Number(r['Week_No'])))):'None'}</p>

<h2>WEEK-BY-WEEK PERFORMANCE</h2>
<table><tr><th class="left">WEEK</th><th>OVERALL %</th>${AREAS.map(a=>`<th>${ASHORT[a]}</th>`).join('')}<th>PASS</th><th>FAIL</th><th>NA</th></tr>`;
    allRecs.forEach(rec=>{
      const sv=Number(rec['Overall_Score_%'])||0;const cls=sv>=80?'g':sv>=60?'a':'r';
      body+=`<tr><td class="left" style="font-weight:600">${fmtW(Number(rec['Week_No']))}</td><td class="${cls}">${sv}%</td>${AREAS.map(a=>{const v=Number(rec[ACOL[a]])||0;const c=v>=80?'g':v>=60?'a':'r';return`<td class="${c}">${v}%</td>`;}).join('')}<td>${rec['Pass_Count']||0}</td><td>${rec['Fail_Count']||0}</td><td>${rec['NA_Count']||0}</td></tr>`;
    });
    body+=`</table>

<h2>TOP REPEATED FAILURES (${topFails.length})</h2>
<table><tr><th>COUNT</th><th class="left">ISSUE</th><th class="left">AREA</th></tr>`;
    topFails.forEach(f=>{body+=`<tr><td><span class="fail-badge">${f.count}x</span></td><td class="left">${f.neg}</td><td class="left" style="font-size:10px;color:#64748b">${f.area}</td></tr>`;});
    body+=`</table>`;
    if(allImgs.length>0){body+=`<h2>EVIDENCE IMAGES (${allImgs.length})</h2><div class="img-grid">${allImgs.map(i=>`<img src="${i.url}" alt="${i.area} — ${fmtW(i.wk)}" loading="lazy"/>`).join('')}</div>`;}
    body+=`<div class="footer">Weekly Audit Scorecard System · ${site} · ${new Date().getFullYear()}</div>
</div></body></html>`;
    w.document.write(body);w.document.close();setTimeout(()=>w.print(),800);
  };

  return html`<div class="fi">
    ${/* Network avg trend */null}
    <div class="card" style=${{padding:18,marginBottom:20}}>
      <div style=${{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16,flexWrap:'wrap',gap:10}}>

        <div class="tgl">
          <button class=${'tgl-btn'+(ct==='line'?' on':'')} onClick=${()=>setCt('line')}>📈 LINE</button>
          <button class=${'tgl-btn'+(ct==='bar'?' on':'')} onClick=${()=>setCt('bar')}>📊 BAR</button>
        </div>
      </div>
      ${activeWeeks.length===0
        ?html`<${Empty} icon="📊" title="NO DATA YET" sub="Submit scorecards to generate trend data."/>`
        :html`<div style=${{height:240}}><${ChartComp} type=${ct} data=${netData} options=${netOpts} style=${{width:'100%',height:'100%'}}/></div>`}
    </div>

    ${/* DC trend */null}
    <div class="card" style=${{padding:18,marginBottom:20}}>
      <div style=${{display:'flex',justifyContent:'space-between',alignItems:'flex-end',marginBottom:16,flexWrap:'wrap',gap:14}}>

            ${SITES.map(s=>html`<option key=${s}>${s}</option>`)}

      ${activeWeeks.length===0?html`<${Empty} icon="📋" title="NO DATA"/>`:html`<table class="dt">
        <thead><tr>

        </tr>`;})}</tbody>

// ════════════════════════════════════════════════════════
//  TAB 4: DC FACILITY
// ════════════════════════════════════════════════════════
function DCFacilityTab({records,week}){
  const[size,setSize]=useState('Large');
  const[lb,setLb]=useState(null);

  const sites=FMAP[size];

  const siteData=useMemo(()=>sites.map(site=>{
    const r=records.find(r=>String(r['Site'])===site&&Number(r['Week_No'])===week);
    if(!r)return{site,score:0,auditor:'—',date:'—',hasData:false,areaScores:{},fails:[],imgs:[]};
    const ans=parseAns(r);
    const fails=[];
    AREAS.forEach(area=>Object.entries(ans[area]||{}).forEach(([q,a])=>{if(a?.answer==='FAIL')fails.push({area,neg:toNeg(q),remark:a.remark||''});}));
    const imgs=[];
    AREAS.forEach(area=>Object.values(ans[area]||{}).forEach(a=>{(a?.imageURLs||[]).forEach(u=>{if(u?.startsWith('http'))imgs.push({type:'image',src:u});});}));
    return{site,score:Number(r['Overall_Score_%'])||0,auditor:String(r['Auditor']||'—'),date:String(r['Audit_Date']||'—'),
      hasData:true,areaScores:Object.fromEntries(AREAS.map(a=>[a,Number(r[ACOL[a]])||0])),fails,imgs};
  }),[records,sites,week]);

  const audited=siteData.filter(s=>s.hasData);
  const netAvg=audited.length?Math.round(audited.reduce((s,x)=>s+x.score,0)/audited.length):0;
  const areaAvgs=AREAS.map(area=>({area,color:ACLR[area],short:ASHORT[area],avg:audited.length?Math.round(audited.reduce((s,x)=>s+(x.areaScores[area]||0),0)/audited.length):0}));

  const commonFails=useMemo(()=>{
    const f={};audited.forEach(s=>s.fails.forEach(fi=>{if(!f[fi.neg])f[fi.neg]={neg:fi.neg,count:0,remarks:[]};f[fi.neg].count++;if(fi.remark)f[fi.neg].remarks.push(fi.remark);}));
    return Object.values(f).sort((a,b)=>b.count-a.count).slice(0,8);
  },[audited]);

  const barData={
    labels:audited.map(s=>s.site.length>11?s.site.slice(0,11)+'…':s.site),
    datasets:[{label:'Score %',data:audited.map(s=>s.score),
      backgroundColor:audited.map(s=>scCol(s.score)+'99'),
      borderColor:audited.map(s=>scCol(s.score)),
      borderWidth:1,borderRadius:4}]
  };
  const barOpts={responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},datalabels:{display:true,color:'#e6edf3',font:{size:9,weight:'bold',family:mono},formatter:v=>v+'%',anchor:'end',align:'top',offset:2}},scales:{x:{ticks:{color:C.muted,font:{size:9},maxRotation:45},grid:{color:C.border+'33'}},y:{min:0,max:105,ticks:{color:C.muted,callback:v=>v>100?'':v+'%'},grid:{color:C.border+'33'}}}};

  const sizeColor={Large:C.accent,Medium:C.blue,Small:C.purple};

  return html`<div class="fi">
    ${lb?html`<${Lightbox} items=${lb.items} idx=${lb.idx} onClose=${()=>setLb(null)}/>`:''}

    ${/* Filters + summary */null}
    <div style=${{display:'flex',gap:16,alignItems:'center',marginBottom:24,flexWrap:'wrap'}}>
      <div>
        <div style=${{color:C.muted,fontSize:9,fontFamily:mono,letterSpacing:1.5,marginBottom:6}}>FACILITY SIZE</div>
        <div style=${{display:'flex',gap:8}}>
          ${['Large','Medium','Small'].map(s=>html`<button key=${s} onClick=${()=>setSize(s)}
            style=${{background:size===s?sizeColor[s]+'20':'transparent',color:size===s?sizeColor[s]:C.muted,border:`2px solid ${size===s?sizeColor[s]:C.border}`,borderRadius:8,padding:'9px 20px',fontFamily:mono,fontSize:11,fontWeight:size===s?700:500,cursor:'pointer',letterSpacing:.8,transition:'all .18s'}}>
            ${s.toUpperCase()}
          </button>`)}
        </div>
      </div>
      <div style=${{marginLeft:'auto',background:`linear-gradient(135deg,${sizeColor[size]}12,${sizeColor[size]}06)`,border:`1px solid ${sizeColor[size]}33`,borderRadius:10,padding:'12px 22px',textAlign:'center',minWidth:160}}>
        <div style=${{color:C.muted,fontSize:8,fontFamily:mono,letterSpacing:1.5,marginBottom:4}}>${size.toUpperCase()} AVG — ${fmtW(week)}</div>
        <div style=${{color:audited.length?sizeColor[size]:C.muted,fontSize:30,fontFamily:mono,fontWeight:700,lineHeight:1}}>${audited.length?netAvg+'%':'—'}</div>
        <div style=${{color:C.muted,fontSize:10,marginTop:4}}>${audited.length} / ${sites.length} audited</div>
      </div>
    </div>

    ${/* Bar chart comparison */null}
    <div class="card" style=${{padding:16,marginBottom:20}}>
      <${SH}>${size} DCs — ${fmtW(week)} Comparison</${SH}>
      ${audited.length===0?html`<${Empty} icon="📊" title=${'NO '+size.toUpperCase()+' DCS AUDITED'} sub=${'Week '+fmtW(week)+' has no submissions for '+size+' facilities.'}/>`:html`<div style=${{height:200}}><${ChartComp} type="bar" data=${barData} options=${barOpts} style=${{width:'100%',height:'100%'}}/></div>`}
    </div>

    ${/* Scorecard grid */null}
    <div style=${{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(170px,1fr))',gap:12,marginBottom:20}}>
      ${siteData.map(s=>html`<div key=${s.site} style=${{background:C.card,border:`1px solid ${s.hasData?scCol(s.score)+'44':C.border}`,borderRadius:10,padding:14,opacity:s.hasData?1:.45,position:'relative',overflow:'hidden'}}>
        ${s.hasData?html`<div style=${{position:'absolute',top:0,left:0,right:0,height:2,background:scCol(s.score)}}/>`:''}
        <div style=${{fontFamily:mono,fontSize:12,fontWeight:700,color:C.text,marginBottom:4,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>${s.site}</div>
        <div style=${{fontSize:26,fontFamily:mono,fontWeight:700,color:s.hasData?scCol(s.score):C.muted,lineHeight:1,marginBottom:6}}>${s.hasData?s.score+'%':'—'}</div>
        <div style=${{fontSize:10,color:C.muted,lineHeight:1.8}}><div>${s.date}</div><div style=${{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>${s.hasData?s.auditor:'Not audited'}</div></div>
      </div>`)}
    </div>

    ${audited.length>0?html`<div>
      ${/* Area progress bars */null}
      <div class="card" style=${{padding:16,marginBottom:20}}>
        <${SH}>${size} Segment — Area Averages (${audited.length} DC${audited.length!==1?'s':''})</${SH}>
        ${areaAvgs.map(a=>html`<div key=${a.area} style=${{marginBottom:12}}>
          <div style=${{display:'flex',justifyContent:'space-between',marginBottom:4}}>
            <span style=${{fontSize:10,color:C.text,fontFamily:mono}}><b style=${{color:a.color}}>${a.short}</b> ${a.area}</span>
            <span style=${{fontSize:14,color:a.color,fontFamily:mono,fontWeight:700}}>${a.avg}%</span>
          </div>
          <${PBar} v=${a.avg} color=${a.color} h=${6}/>
        </div>`)}
      </div>

      ${/* Common failures */null}
      ${commonFails.length>0?html`<div class="card" style=${{padding:16,marginBottom:20}}>
        <${SH} c=${C.fail}>Common Improvement Areas — ${size} Segment</${SH}>
        ${commonFails.map((item,i)=>html`<div key=${i} style=${{display:'flex',gap:12,padding:'10px 0',borderBottom:i<commonFails.length-1?`1px solid ${C.border}20`:'none',alignItems:'flex-start'}}>
          <div style=${{background:C.fail+'20',color:C.fail,border:`1px solid ${C.fail}44`,borderRadius:4,padding:'3px 10px',fontFamily:mono,fontSize:13,fontWeight:700,flexShrink:0,minWidth:42,textAlign:'center'}}>${item.count}</div>
          <div style=${{flex:1}}>
            <div style=${{color:'#fca5a5',fontFamily:mono,fontSize:11,fontWeight:600,lineHeight:1.4}}>${item.neg}</div>
            <div style=${{color:C.muted,fontSize:10,marginTop:2}}>Reported by ${item.count} of ${audited.length} DCs</div>
          </div>
        </div>`)}
      </div>`:''}

      ${/* Image gallery */null}
      ${audited.some(s=>s.imgs.length>0)?html`<div class="card" style=${{padding:16}}>
        <${SH}>Image Gallery — ${size} DCs</${SH}>
        ${audited.filter(s=>s.imgs.length>0).map(s=>html`<div key=${s.site} style=${{marginBottom:16}}>
          <div style=${{color:C.muted,fontSize:10,fontFamily:mono,fontWeight:700,marginBottom:8,letterSpacing:.8}}>${s.site}</div>
          <div style=${{display:'flex',flexWrap:'wrap',gap:8}}>
            ${s.imgs.map((img,j)=>html`<img key=${j} src=${img.src}
              onClick=${()=>setLb({items:s.imgs,idx:j})}
              style=${{width:72,height:72,objectFit:'cover',borderRadius:6,cursor:'pointer',border:`2px solid ${C.border}`,transition:'all .15s'}}
              onMouseEnter=${e=>{e.currentTarget.style.borderColor=sizeColor[size];e.currentTarget.style.transform='scale(1.06)';}}
              onMouseLeave=${e=>{e.currentTarget.style.borderColor=C.border;e.currentTarget.style.transform='scale(1)';}}
            />`)}
          </div>
        </div>`)}
      </div>`:''}
    </div>`:''}
  </div>`;
}

// ════════════════════════════════════════════════════════
//  DASHBOARD SHELL
// ════════════════════════════════════════════════════════
function Dashboard({onBack}){
  const[tab,setTab]=useState(0);
  const[records,setRecords]=useState([]);
  const[loading,setLoading]=useState(true);
  const[error,setError]=useState('');
  const[lastSync,setLastSync]=useState(null);
  const[selWeek,setSelWeek]=useState(null);
  const[selSite,setSelSite]=useState(SITES[0]);

  const activeWeeks=useMemo(()=>[...new Set(records.map(r=>Number(r['Week_No'])).filter(Boolean))].sort((a,b)=>a-b),[records]);

  // Auto-select latest week when data loads
  useEffect(()=>{
    if(activeWeeks.length>0&&(selWeek===null||!activeWeeks.includes(selWeek))){
      setSelWeek(activeWeeks[activeWeeks.length-1]);
    }
  },[JSON.stringify(activeWeeks)]);

  const load=useCallback(async()=>{
    setLoading(true);setError('');
    try{
      const r=await fetchSheet();
      if(r.ok){setRecords(r.records||[]);setLastSync(new Date());}
      else setError(r.error||'Fetch returned ok:false');
    }catch(e){setError(e.message);}
    setLoading(false);
  },[]);

  useEffect(()=>{load();const iv=setInterval(load,5*60*1000);return()=>clearInterval(iv);},[]);

  const TABS=['OVERVIEW','DC DETAIL VIEW','WEEKLY PERFORMANCE','DC FACILITY'];
  const ICONS=['▤','◉','📈','🏢'];
  const displayWeek=selWeek??(activeWeeks.length>0?activeWeeks[activeWeeks.length-1]:1);

  const syncStr=lastSync?lastSync.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'}):'—';

  return html`<div style=${{minHeight:'100vh',background:C.bg}}>

    ${/* ── Header ── */null}
    <div style=${{background:'linear-gradient(180deg,#1a2030 0%,#161b22 100%)',borderBottom:`1px solid ${C.border}`,padding:'0 20px',display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:8,position:'sticky',top:0,zIndex:100,boxShadow:'0 2px 20px rgba(0,0,0,.4)'}}>
      <div style=${{padding:'12px 0'}}>
        <div style=${{color:C.accent,fontFamily:mono,fontSize:8,letterSpacing:3,marginBottom:2}}>LOGISTICS OPERATIONS MANAGEMENT</div>
        <div style=${{color:C.text,fontFamily:mono,fontSize:18,fontWeight:700,letterSpacing:.5}}>WEEKLY AUDIT <span style=${{color:C.accent}}>SCORECARD</span></div>
      </div>

      <div style=${{display:'flex',gap:10,alignItems:'center',flexWrap:'wrap',padding:'8px 0'}}>
        ${/* Shared week selector */null}
        <div>
          <div style=${{color:C.muted,fontSize:8,fontFamily:mono,letterSpacing:1.2,marginBottom:3,textAlign:'center'}}>WEEK</div>
          <select value=${displayWeek} onChange=${e=>setSelWeek(Number(e.target.value))}
            style=${{background:'#0d1117',color:C.accent,border:`2px solid ${C.accent}55`,borderRadius:8,padding:'7px 14px',fontSize:20,fontFamily:mono,fontWeight:700,cursor:'pointer',minWidth:90}}>
            ${activeWeeks.length>0
              ?activeWeeks.map(w=>html`<option key=${w} value=${w}>${fmtW(w)}</option>`)
              :html`<option value=${1}>${fmtW(1)}</option>`}
          </select>
        </div>

        <div style=${{display:'flex',flexDirection:'column',alignItems:'center',gap:2}}>
          <button onClick=${load} disabled=${loading}
            style=${{background:loading?C.border+'33':C.abl,color:loading?C.muted:C.accent,border:`1px solid ${loading?C.border:C.accent+'44'}`,borderRadius:8,padding:'8px 14px',fontFamily:mono,fontSize:11,fontWeight:600,cursor:loading?'default':'pointer',letterSpacing:.6,minWidth:100}}>
            ${loading?html`<span class="spin">↻</span> SYNCING`:'↻ REFRESH'}
          </button>
          <span style=${{color:C.muted,fontSize:8,fontFamily:mono}}>Last: ${syncStr}</span>
        </div>

        <button onClick=${onBack}
          style=${{background:'linear-gradient(135deg,#991b1b,#7f1d1d)',color:'#fff',border:'none',borderRadius:8,padding:'9px 18px',fontFamily:mono,fontSize:12,fontWeight:700,cursor:'pointer',letterSpacing:.8,boxShadow:'0 4px 12px rgba(239,68,68,.25)',transition:'all .15s'}}
          onMouseEnter=${e=>{e.currentTarget.style.transform='translateY(-1px)';e.currentTarget.style.boxShadow='0 6px 16px rgba(239,68,68,.4)';}}
          onMouseLeave=${e=>{e.currentTarget.style.transform='translateY(0)';e.currentTarget.style.boxShadow='0 4px 12px rgba(239,68,68,.25)';}}>
          ⏻ LOGOUT
        </button>
      </div>
    </div>

    ${/* ── Tab bar ── */null}
    <div class="tab-bar">
      ${TABS.map((t,i)=>html`<button key=${t} class=${'tab-btn'+(tab===i?' act':'')} onClick=${()=>setTab(i)}>${ICONS[i]} ${t}</button>`)}
    </div>

    ${/* ── Config warning ── */null}
    ${!sheetOK()?html`<div style=${{background:'#1a1200',borderBottom:`1px solid #f59e0b22`,padding:'7px 24px',fontFamily:mono,fontSize:11,color:'#d97706'}}>⚠ SHEET_URL is not configured — set the Apps Script URL in the CONFIG section at the top of this file.</div>`:''}

    ${/* ── Loading ── */null}
    ${loading?html`<div style=${{display:'flex',alignItems:'center',justifyContent:'center',gap:14,padding:72,color:C.muted,fontFamily:mono,fontSize:13}}>
      <span class="spin" style=${{fontSize:22,color:C.accent}}>◎</span> Fetching from Google Sheets…
    </div>`:''}

    ${/* ── Error ── */null}
    ${!loading&&error?html`<div style=${{margin:'24px',background:C.card,border:`1px solid ${C.fail}33`,borderRadius:12,padding:'40px 24px',textAlign:'center'}}>
      <div style=${{fontSize:36,marginBottom:12,opacity:.3}}>⚠</div>
      <div style=${{color:C.fail,fontFamily:mono,fontSize:13,fontWeight:700,marginBottom:10,letterSpacing:1}}>FETCH ERROR</div>
      <div style=${{color:C.muted,fontSize:12,marginBottom:22,maxWidth:500,margin:'0 auto 22px',whiteSpace:'pre-line',lineHeight:1.7}}>${error}</div>
      <div style=${{color:C.muted,fontSize:11,marginBottom:16,background:C.bg,borderRadius:6,padding:'10px 16px',display:'inline-block',fontFamily:mono,textAlign:'left'}}>
        Fix checklist:<br/>
        1. Apps Script deployed as Web App?<br/>
        2. Execute as: Me<br/>
        3. Access: Anyone (not "Anyone with Google account")<br/>
        4. Created a New Deployment (not edited existing)?
      </div><br/>
      <button onClick=${load} style=${{background:C.abl,color:C.accent,border:`1px solid ${C.accent}`,borderRadius:8,padding:'10px 28px',fontFamily:mono,fontSize:12,fontWeight:700,cursor:'pointer'}}>↺ RETRY</button>
    </div>`:''}

    ${/* ── Tab content ── */null}
    ${!loading&&!error?html`<div style=${{padding:'20px',maxWidth:1400,margin:'0 auto'}}>
      ${tab===0?html`<${OverviewTab} records=${records} week=${displayWeek}/>`:''}
      ${tab===1?html`<${DCDetailTab} records=${records} week=${displayWeek} site=${selSite} setSite=${setSelSite}/>`:''}
      ${tab===2?html`<${WeeklyPerfTab} records=${records} site=${selSite} setSite=${setSelSite} activeWeeks=${activeWeeks}/>`:''}
      ${tab===3?html`<${DCFacilityTab} records=${records} week=${displayWeek}/>`:''}
    </div>`:''}
  </div>`;
}

// ════════════════════════════════════════════════════════
//  APP ROOT
// ════════════════════════════════════════════════════════
function App(){
  const[page,setPage]=useState('landing');
  if(page==='landing')return html`<${Landing} onFill=${()=>setPage('fill')} onView=${()=>setPage('view')}/>`;
  if(page==='fill')   return html`<${FillScorecard} onBack=${()=>setPage('landing')}/>`;
  if(page==='view')   return html`<${Dashboard} onBack=${()=>setPage('landing')}/>`;
  return null;
}

render(html`<${App}/>`,document.getElementById('app'));
</script>
</body>
</html>
