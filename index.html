  text:'#FFFFFF',muted:'rgba(255,255,255,.55)',pass:'#4ade80',fail:'#f87171',na:'rgba(255,255,255,.35)',

function weekNum(d){const u=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));const day=u.getUTCDay()||7;u.setUTCDate(u.getUTCDate()+4-day);const y=new Date(Date.UTC(u.getUTCFullYear(),0,1));return Math.ceil((((u-y)/864e5)+1)/7);}
function toNeg(q){const c=q.replace(/\?.*$/,'').trim().toUpperCase();if(c.startsWith('IS '))return'NO '+c.slice(3);if(c.startsWith('ARE '))return'NOT '+c.slice(4);if(c.startsWith('HAS '))return'HAS NOT '+c.slice(4);if(c.startsWith('HAVE '))return'HAVE NOT '+c.slice(5);if(c.startsWith('DOES '))return'DOES NOT '+c.slice(5);return'ISSUE: '+c;}
function parseAns(rec){try{const v=rec['Answers_JSON'];return typeof v==='string'?JSON.parse(v||'{}'):(v||{});}catch{return{};}}
function fmtW(w){return'W'+String(w).padStart(2,'0');}
const pct=(n,d)=>d===0?0:Math.round(n/d*100);

// ── Image compression (for local storage when Cloudinary not configured) ──
// Compresses to max 400px wide at 0.55 quality → ~8-20KB per image (~11-27KB base64)
async function compressImg(src,maxW=400,q=0.55){
  return new Promise(res=>{
    const img=new Image();
    img.onload=()=>{
      const ratio=Math.min(1,maxW/img.width);
      const w=Math.round(img.width*ratio),h=Math.round(img.height*ratio);
      const cv=document.createElement('canvas');cv.width=w;cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);
      res(cv.toDataURL('image/jpeg',q));
    };
    img.onerror=()=>res(src);// fallback to original on error
    img.src=typeof src==='string'?src:URL.createObjectURL(src);
  });
}

// ── Convert any video source → base64 data URI for Drive storage ──
// Apps Script receives this, saves the file to Google Drive, and
// replaces the base64 with a permanent Drive preview URL.
async function vidSrcToBase64(src){
  try{
    let blob;
    if(src instanceof File||src instanceof Blob){blob=src;}
    else if(typeof src==='string'&&src.startsWith('blob:')){blob=await fetch(src).then(r=>r.blob());}
    else if(typeof src==='string'&&src.startsWith('data:')){return src;}// already encoded
    else return null;
    // Warn if video is very large (>25 MB)
    if(blob.size>25*1024*1024){console.warn('Video >25MB, may be slow to upload:',blob.size);} 
    return new Promise((res,rej)=>{
      const rd=new FileReader();
      rd.onload=e=>res(e.target.result);
      rd.onerror=()=>rej(new Error('FileReader failed'));
      rd.readAsDataURL(blob);
    });
  }catch(e){console.warn('vidSrcToBase64:',e);return null;}
}

// ════════════════════════════════════════════════════════
//  SHEET COMMUNICATION
// ════════════════════════════════════════════════════════
const sheetOK=()=>SHEET_URL&&!SHEET_URL.startsWith('YOUR_');
const cloudOK=()=>CL_CLOUD&&!CL_CLOUD.startsWith('YOUR_');

// ── Cloud upload (Cloudinary) ──
async function uploadToCloud(src,type='image'){
  if(!cloudOK())return null;
  const fd=new FormData();fd.append('upload_preset',CL_PRESET);
  let blob;
  if(src instanceof File||src instanceof Blob)blob=src;
  else if(typeof src==='string'&&(src.startsWith('data:')||src.startsWith('blob:')))blob=await fetch(src).then(r=>r.blob());
  else return null;
  fd.append('file',blob);
  const res=await fetch(`https://api.cloudinary.com/v1_1/${CL_CLOUD}/${type}/upload`,{method:'POST',body:fd});
  const d=await res.json();if(d.secure_url)return d.secure_url;throw new Error(d.error?.message||'Upload failed');
}

// ── Smart media handler: cloud if configured, compressed base64 fallback ──
async function uploadMedia(src,type='image'){
  // Try cloud first
  if(cloudOK())return uploadToCloud(src,type);
  // Fallback: compress and embed as base64 (images only — videos too large)
  if(type!=='image')return null;
  try{
    let dataUrl;
    if(src instanceof File||src instanceof Blob){
      dataUrl=await new Promise(r=>{const rd=new FileReader();rd.onload=e=>r(e.target.result);rd.readAsDataURL(src);});
    }else if(typeof src==='string'&&src.startsWith('data:')){dataUrl=src;}
    else if(typeof src==='string'&&src.startsWith('blob:')){
      const b=await fetch(src).then(r=>r.blob());
      dataUrl=await new Promise(r=>{const rd=new FileReader();rd.onload=e=>r(e.target.result);rd.readAsDataURL(b);});
    }else return null;
    return await compressImg(dataUrl);// returns compressed base64 data URI
  }catch(e){console.warn('compress fail',e);return null;}
}

async function postToSheet(payload){
  if(!sheetOK())throw new Error('Apps Script URL not configured.');
  // no-cors POST: response is always opaque — we can't read it.
  // Fire up to 3 times with exponential back-off to guard against dropped requests.
  const body=JSON.stringify(payload);
  let lastErr=null;
  for(let attempt=0;attempt<3;attempt++){
    try{
      await fetch(SHEET_URL,{
        method:'POST',
        mode:'no-cors',
        // Content-Type text/plain avoids CORS preflight while still sending the body
        headers:{'Content-Type':'text/plain;charset=UTF-8'},
        body
      });
      return{ok:true};// opaque response — assume success if no network error
    }catch(e){
      lastErr=e;
      if(attempt<2)await new Promise(r=>setTimeout(r,1000*(attempt+1)));
    }
  }
  throw new Error('Network error after 3 attempts: '+(lastErr?.message||'unknown'));
}

// ── Build a stable, collision-resistant session ID ──
// Lower-case auditor so same person with different caps gets same ID
function makeSessionId(site,week,auditor){
  const key=[
    String(site).trim().toUpperCase().replace(/\s+/g,''),
    String(week),
    String(auditor).trim().toLowerCase().replace(/\s+/g,'')
  ].join('_').replace(/[^a-zA-Z0-9_]/g,'').slice(0,40);
  return 'SES-'+key;
}

// ── In-memory cache ──
const _cache={data:null,ts:0};
const CACHE_TTL=60000;// 60 s

// ── JSONP transport (bypasses CORS for GET) ──
// Bug-fix: _t is added only ONCE (in the appended query, not in the original URL)
function _jsonp(url){
  return new Promise((res,rej)=>{
    const cb='_gs_'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,6);
    const tag=document.createElement('script');
    const t=setTimeout(()=>{cleanup();rej(new Error('Timed out — verify Apps Script: Execute as Me, Access: Anyone'));},15000);
    const cleanup=()=>{clearTimeout(t);try{delete window[cb];}catch(_){}tag.parentNode?.removeChild(tag);};
    window[cb]=data=>{cleanup();res(data);};
    // Append callback + cache-bust once, cleanly
    const sep=url.includes('?')?'&':'?';
    tag.src=url+sep+'callback='+cb+'&_cb='+Date.now();
    tag.onerror=()=>{cleanup();rej(new Error('Cannot reach Apps Script. Check deployment URL.'));};
    document.head.appendChild(tag);
  });
}

async function fetchSheet(force=false){
  if(!sheetOK())return{ok:false,records:[],error:'Apps Script URL not configured.'};
  if(!force&&_cache.data&&(Date.now()-_cache.ts<CACHE_TTL)){
    console.log('[fetchSheet] cache hit —',(_cache.data.records||[]).length,'records');
    return _cache.data;
  }
  // bust=1 tells Apps Script to bypass its own CacheService too
  const url=SHEET_URL+'?action=get'+(force?'&bust=1':'');
  try{
    const result=await _jsonp(url);
    if(result.ok){
      // ── NO WEEK FILTERING HERE ──
      // All weeks in the sheet are real data. Never purge on the client.
      // The admin-only purgeOldWeeks() function handles any cleanup needed.
      result.records=result.records||[];
      _cache.data=result;_cache.ts=Date.now();
      console.log('[fetchSheet] fetched',result.records.length,'records');
    }else{
      console.error('[fetchSheet] error:',result.error);
    }
    return result;
  }catch(e){
    console.error('[fetchSheet] JSONP failed:',e.message);
    throw e;
  }
}

// Chart.js wrapper
function ChartComp({type,data,options,style={}}){
  const ref=useRef(null);const inst=useRef(null);
  const sig=useMemo(()=>JSON.stringify({type,data,options}),[type,data,options]);
  useEffect(()=>{
    if(!ref.current||!window.Chart)return;
    inst.current?.destroy();inst.current=null;
    try{inst.current=new window.Chart(ref.current,{type,data,options});}catch(e){console.warn('Chart err',e);}
    return()=>{inst.current?.destroy();inst.current=null;};
  },[sig]);
  return html`<canvas ref=${ref} style=${style}/>`;
}

// ════════════════════════════════════════════════════════
//  VIDEO URL UTILITIES
// ════════════════════════════════════════════════════════
function resolveVideoUrl(url){
  if(!url||typeof url!=='string')return null;
  // Google Drive /file/d/ID/view|/preview|/edit
  const gdFile=url.match(/drive\.google\.com\/file\/d\/([a-zA-Z0-9_-]+)/);
  if(gdFile){const id=gdFile[1];return{type:'drive',id,
    preview:`https://drive.google.com/file/d/${id}/preview`,
    download:`https://drive.google.com/uc?id=${id}&export=download`,
    view:`https://drive.google.com/file/d/${id}/view`};}
  // Google Drive /open?id=ID
  const gdOpen=url.match(/drive\.google\.com\/open\?id=([a-zA-Z0-9_-]+)/);
  if(gdOpen){const id=gdOpen[1];return{type:'drive',id,
    preview:`https://drive.google.com/file/d/${id}/preview`,
    download:`https://drive.google.com/uc?id=${id}&export=download`,
    view:`https://drive.google.com/file/d/${id}/view`};}
  // Google Drive uc?id=ID (already a direct link)
  const gdUc=url.match(/drive\.google\.com\/uc\?.*id=([a-zA-Z0-9_-]+)/);
  if(gdUc){const id=gdUc[1];return{type:'drive',id,
    preview:`https://drive.google.com/file/d/${id}/preview`,
    download:`https://drive.google.com/uc?id=${id}&export=download`,
    view:`https://drive.google.com/file/d/${id}/view`};}
  // Base64 data URI (never expires — self-contained)
  if(url.startsWith('data:video/')||url.startsWith('data:application/octet-stream'))
    return{type:'data',src:url};
  // Blob URL (same-session only)
  if(url.startsWith('blob:'))return{type:'blob',src:url};
  // Direct HTTP/HTTPS (Cloudinary, CDN, etc.)
  if(url.startsWith('http'))return{type:'direct',src:url};
  return null;
}

// Download a video from any source type
async function downloadVideo(resolved,name){
  const fname=(name||'audit_video').replace(/\.[^.]+$/,'');
  if(resolved.type==='drive'){
    // Open Drive download in new tab
    window.open(resolved.download,'_blank');return;
  }
  if(resolved.type==='data'){
    const ext=resolved.src.includes('webm')?'.webm':resolved.src.includes('mp4')?'.mp4':'.webm';
    const a=document.createElement('a');a.href=resolved.src;a.download=fname+ext;
    document.body.appendChild(a);a.click();document.body.removeChild(a);return;
  }
  if(resolved.type==='blob'){
    // Try fetching the blob (works if still alive in this session)
    try{
      const r=await fetch(resolved.src);if(!r.ok)throw new Error('Blob expired');
      const blob=await r.blob();
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');a.href=url;a.download=fname+'.webm';
      document.body.appendChild(a);a.click();document.body.removeChild(a);
      setTimeout(()=>URL.revokeObjectURL(url),5000);
    }catch(e){alert('This video has expired and cannot be downloaded.\nPlease resubmit the scorecard to record it again.');}
    return;
  }
  if(resolved.type==='direct'){
    const a=document.createElement('a');a.href=resolved.src;a.download=fname;
    a.target='_blank';document.body.appendChild(a);a.click();document.body.removeChild(a);
  }
}

// ════════════════════════════════════════════════════════
//  VIDEO PLAYER — universal player for all URL types
// ════════════════════════════════════════════════════════
function VideoPlayer({src,name}){
  const[phase,setPhase]=useState('loading');// loading | playing | error
  const[retries,setRetries]=useState(0);
  const videoRef=useRef(null);
  const resolved=useMemo(()=>resolveVideoUrl(src),[src]);

  // Reset state when src changes
  useEffect(()=>{setPhase('loading');setRetries(0);},[src]);

  const retry=()=>{
    setPhase('loading');setRetries(r=>r+1);
    if(videoRef.current){videoRef.current.load();}
  };

  if(!resolved){
    return html`<div style=${{padding:48,textAlign:'center',color:C.muted}}>
      <div style=${{fontSize:48,opacity:.15,marginBottom:12}}>🎥</div>
      <div style=${{fontFamily:mono,fontSize:11}}>No video source found.</div>
    </div>`;
  }

  // ────────────────────────────────────────────────────
  //  GOOGLE DRIVE  — always use iframe embed (no CORS issues)
  // ────────────────────────────────────────────────────
  if(resolved.type==='drive'){
    return html`<div style=${{display:'flex',flexDirection:'column',width:'100%',gap:10}}>
      <iframe
        src=${resolved.preview}
        style=${{width:'100%',height:'460px',border:'none',borderRadius:10,background:'#000',display:'block'}}
        allow="autoplay; fullscreen; picture-in-picture"
        allowfullscreen/>
      <div style=${{display:'flex',gap:8,justifyContent:'center',flexWrap:'wrap'}}>
        <a href=${resolved.view} target="_blank"
          style=${{background:'rgba(6,182,212,.1)',color:C.cyan,border:`1px solid ${C.cyan}44`,borderRadius:6,padding:'8px 18px',fontFamily:mono,fontSize:11,fontWeight:700,textDecoration:'none',letterSpacing:.6,cursor:'pointer'}}>
          🔗 OPEN IN DRIVE
        </a>
        <a href=${resolved.download} target="_blank"
          style=${{background:'rgba(16,185,129,.1)',color:C.pass,border:`1px solid ${C.pass}44`,borderRadius:6,padding:'8px 18px',fontFamily:mono,fontSize:11,fontWeight:700,textDecoration:'none',letterSpacing:.6,cursor:'pointer'}}>
          ⬇ DOWNLOAD VIDEO
        </a>
      </div>
    </div>`;
  }

  // ────────────────────────────────────────────────────
  //  DATA URI  — self-contained base64, never expires
  // ────────────────────────────────────────────────────
  if(resolved.type==='data'){
    return html`<div style=${{display:'flex',flexDirection:'column',width:'100%',gap:10}}>
      ${phase==='loading'?html`<div style=${{background:'#000',borderRadius:10,height:60,display:'flex',alignItems:'center',justifyContent:'center'}}><span class="spin" style=${{color:C.accent,fontSize:22}}>◎</span></div>`:''}
      <video ref=${videoRef} src=${resolved.src} controls
        onLoadedData=${()=>setPhase('playing')}
        onError=${()=>setPhase('error')}
        style=${{width:'100%',maxHeight:'65vh',display:phase==='loading'?'none':'block',borderRadius:10,background:'#000'}}/>
      ${phase==='error'?html`<div style=${{color:'#fca5a5',fontFamily:mono,fontSize:10,textAlign:'center',padding:'8px 0'}}>
        Format may not be supported. Try downloading and playing locally.
      </div>`:''}
      <div style=${{display:'flex',gap:8,justifyContent:'center'}}>
        <button onClick=${()=>downloadVideo(resolved,name)}
          style=${{background:'rgba(16,185,129,.1)',color:C.pass,border:`1px solid ${C.pass}44`,borderRadius:6,padding:'8px 18px',fontFamily:mono,fontSize:11,fontWeight:700,cursor:'pointer',letterSpacing:.6}}>
          ⬇ DOWNLOAD VIDEO
        </button>
        ${phase==='error'?html`<button onClick=${retry}
          style=${{background:'rgba(245,158,11,.1)',color:C.accent,border:`1px solid ${C.accent}44`,borderRadius:6,padding:'8px 18px',fontFamily:mono,fontSize:11,fontWeight:700,cursor:'pointer',letterSpacing:.6}}>
          ↺ RETRY
        </button>`:''}
      </div>
    </div>`;
  }

  // ────────────────────────────────────────────────────
  //  BLOB URL  — valid in current session only
  //  Try playing; if it fails offer diagnosis + actions
  // ────────────────────────────────────────────────────
  if(resolved.type==='blob'){
    if(phase==='error'){
      return html`<div style=${{display:'flex',flexDirection:'column',width:'100%',gap:12}}>
        <div style=${{background:'rgba(0,0,0,.4)',border:`1px solid ${C.fail}33`,borderRadius:10,padding:'28px 20px',textAlign:'center'}}>
          <div style=${{fontSize:44,marginBottom:12,opacity:.3}}>🎥</div>
          <div style=${{color:'#fca5a5',fontFamily:mono,fontSize:12,fontWeight:700,marginBottom:10,letterSpacing:.8}}>VIDEO UNAVAILABLE</div>
          <div style=${{color:C.muted,fontSize:11,lineHeight:1.8,maxWidth:360,margin:'0 auto',marginBottom:16}}>
            This video was recorded in a previous session and the temporary link has expired.<br/>
            <b style=${{color:C.accent}}>New videos are now automatically saved to Google Drive</b> — 
            only older submissions are affected.
          </div>
          <div style=${{display:'flex',gap:8,justifyContent:'center',flexWrap:'wrap'}}>
            <button onClick=${retry}
              style=${{background:'rgba(245,158,11,.1)',color:C.accent,border:`1px solid ${C.accent}44`,borderRadius:6,padding:'8px 16px',fontFamily:mono,fontSize:11,fontWeight:700,cursor:'pointer'}}>
              ↺ TRY AGAIN
            </button>
            <button onClick=${()=>downloadVideo(resolved,name)}
              style=${{background:'rgba(6,182,212,.1)',color:C.cyan,border:`1px solid ${C.cyan}44`,borderRadius:6,padding:'8px 16px',fontFamily:mono,fontSize:11,fontWeight:700,cursor:'pointer'}}>
              ⬇ ATTEMPT DOWNLOAD
            </button>
          </div>
        </div>
      </div>`;
    }
    return html`<div style=${{display:'flex',flexDirection:'column',width:'100%',gap:10}}>
      ${phase==='loading'?html`<div style=${{background:'#000',borderRadius:10,height:60,display:'flex',alignItems:'center',justifyContent:'center',gap:10}}>
        <span class="spin" style=${{color:C.accent,fontSize:20}}>◎</span>
        <span style=${{color:C.muted,fontFamily:mono,fontSize:10}}>Loading video…</span>
      </div>`:''}
      <video ref=${videoRef} src=${resolved.src} controls preload="auto"
        key=${retries}
        onLoadedData=${()=>setPhase('playing')}
        onCanPlay=${()=>setPhase('playing')}
        onError=${()=>{
          // Give it one automatic retry before showing error
          if(retries<1){setRetries(1);if(videoRef.current)videoRef.current.load();}
          else setPhase('error');
        }}
        style=${{width:'100%',maxHeight:'65vh',display:phase==='loading'?'none':'block',borderRadius:10,background:'#000'}}/>
      <div style=${{display:'flex',gap:8,justifyContent:'center'}}>
        <button onClick=${()=>downloadVideo(resolved,name)}
          style=${{background:'rgba(6,182,212,.1)',color:C.cyan,border:`1px solid ${C.cyan}44`,borderRadius:6,padding:'7px 16px',fontFamily:mono,fontSize:11,fontWeight:700,cursor:'pointer'}}>
          ⬇ DOWNLOAD
        </button>
      </div>
    </div>`;
  }

  // ────────────────────────────────────────────────────
  //  DIRECT HTTP/HTTPS  — Cloudinary, CDN, etc.
  // ────────────────────────────────────────────────────
  if(phase==='error'){
    return html`<div style=${{padding:40,textAlign:'center',color:C.muted}}>
      <div style=${{fontSize:44,marginBottom:12,opacity:.2}}>🎥</div>
      <div style=${{fontFamily:mono,fontSize:11,fontWeight:700,color:'#fca5a5',marginBottom:8}}>VIDEO FAILED TO LOAD</div>
      <div style=${{fontSize:10,marginBottom:14,color:C.muted}}>The video format may not be supported by your browser, or the link is broken.</div>
      <div style=${{display:'flex',gap:8,justifyContent:'center',flexWrap:'wrap'}}>
        <button onClick=${retry}
          style=${{background:'rgba(245,158,11,.1)',color:C.accent,border:`1px solid ${C.accent}44`,borderRadius:6,padding:'7px 14px',fontFamily:mono,fontSize:11,fontWeight:700,cursor:'pointer'}}>
          ↺ RETRY
        </button>
        <a href=${resolved.src} target="_blank"
          style=${{background:'rgba(6,182,212,.1)',color:C.cyan,border:`1px solid ${C.cyan}44`,borderRadius:6,padding:'7px 14px',fontFamily:mono,fontSize:11,fontWeight:700,textDecoration:'none'}}>
          🔗 OPEN IN NEW TAB
        </a>
        <button onClick=${()=>downloadVideo(resolved,name)}
          style=${{background:'rgba(16,185,129,.1)',color:C.pass,border:`1px solid ${C.pass}44`,borderRadius:6,padding:'7px 14px',fontFamily:mono,fontSize:11,fontWeight:700,cursor:'pointer'}}>
          ⬇ DOWNLOAD
        </button>
      </div>
    </div>`;
  }
  return html`<div style=${{display:'flex',flexDirection:'column',width:'100%',gap:10}}>
    ${phase==='loading'?html`<div style=${{background:'#000',borderRadius:10,height:60,display:'flex',alignItems:'center',justifyContent:'center'}}><span class="spin" style=${{color:C.accent,fontSize:22}}>◎</span></div>`:''}
    <video ref=${videoRef} src=${resolved.src} controls preload="auto"
      key=${retries}
      onLoadedData=${()=>setPhase('playing')}
      onCanPlay=${()=>setPhase('playing')}
      onError=${()=>{if(retries<1){setRetries(1);if(videoRef.current)videoRef.current.load();}else setPhase('error');}}
      style=${{width:'100%',maxHeight:'65vh',display:phase==='loading'?'none':'block',borderRadius:10,background:'#000'}}/>
    <div style=${{display:'flex',gap:8,justifyContent:'center',flexWrap:'wrap'}}>
      <button onClick=${()=>downloadVideo(resolved,name)}
        style=${{background:'rgba(16,185,129,.1)',color:C.pass,border:`1px solid ${C.pass}44`,borderRadius:6,padding:'7px 16px',fontFamily:mono,fontSize:11,fontWeight:700,cursor:'pointer'}}>
        ⬇ DOWNLOAD VIDEO
      </button>
      <a href=${resolved.src} target="_blank"
        style=${{background:'rgba(6,182,212,.1)',color:C.cyan,border:`1px solid ${C.cyan}44`,borderRadius:6,padding:'7px 16px',fontFamily:mono,fontSize:11,fontWeight:700,textDecoration:'none'}}>
        🔗 OPEN IN NEW TAB
      </a>
    </div>
  </div>`;
}

function Lightbox({items,idx:start=0,onClose}){
  const[idx,setIdx]=useState(start);const[zoom,setZoom]=useState(1);
  useEffect(()=>setZoom(1),[idx]);
  if(!items?.length)return null;
  const safe=Math.min(idx,items.length-1);
  const it=items[safe];
  const isImg=it.type==='image';
  const nav=(txt,fn,dis)=>html`<button onClick=${fn} disabled=${dis}
    style=${{background:'rgba(255,255,255,.08)',color:dis?C.border:C.text,border:`1px solid ${dis?C.border:C.muted}`,
    borderRadius:6,padding:'9px 20px',fontFamily:mono,fontSize:12,cursor:dis?'default':'pointer',opacity:dis?.35:1,flex:1}}>${txt}</button>`;
  return html`<div class="overlay" onClick=${onClose}>
    <div onClick=${e=>e.stopPropagation()} style=${{display:'flex',flexDirection:'column',alignItems:'center',width:'100%',maxWidth:'94vw',gap:10}}>
      ${/* ── Header bar ── */null}
      <div style=${{display:'flex',justifyContent:'space-between',width:'100%',alignItems:'center'}}>
        <span style=${{color:C.muted,fontFamily:mono,fontSize:10,letterSpacing:1}}>${isImg?'📷 IMAGE':'🎥 VIDEO'} &nbsp;${safe+1} / ${items.length}</span>
        <div style=${{display:'flex',gap:8,alignItems:'center'}}>
          ${isImg?html`<div style=${{display:'flex',gap:3,background:'rgba(255,255,255,.06)',borderRadius:6,padding:'3px 6px',alignItems:'center'}}>
            <button onClick=${()=>setZoom(z=>Math.min(4,+(z+.5).toFixed(1)))} style=${{background:'transparent',color:C.muted,border:'none',width:26,height:26,cursor:'pointer',fontSize:16,borderRadius:4,lineHeight:1}}>+</button>
            <span style=${{color:C.accent,fontFamily:mono,fontSize:10,minWidth:38,textAlign:'center'}}>${Math.round(zoom*100)}%</span>
            <button onClick=${()=>setZoom(z=>Math.max(1,+(z-.5).toFixed(1)))} style=${{background:'transparent',color:C.muted,border:'none',width:26,height:26,cursor:'pointer',fontSize:16,borderRadius:4,lineHeight:1}}>−</button>
            <button onClick=${()=>setZoom(1)} style=${{background:'transparent',color:C.muted,border:'none',padding:'0 6px',cursor:'pointer',fontSize:9,fontFamily:mono}}>RESET</button>
          </div>`:''}
          <button onClick=${onClose} style=${{background:C.fail+'22',color:C.fail,border:`1px solid ${C.fail}55`,borderRadius:6,padding:'6px 16px',cursor:'pointer',fontFamily:mono,fontSize:11,fontWeight:700}}>✕ CLOSE</button>
        </div>
      </div>
      ${/* ── Media area ── */null}
      <div style=${{width:'100%',background:'#050709',borderRadius:12,display:'flex',justifyContent:'center',alignItems:'center',minHeight:260,maxHeight:'70vh',overflow:'hidden',border:`1px solid ${C.border}`}}>
        ${isImg
          ?html`<img src=${it.src||it.url}
              style=${{maxWidth:'100%',maxHeight:'70vh',objectFit:'contain',transform:`scale(${zoom})`,transition:'transform .2s',cursor:zoom>1?'grab':'default'}}
              onError=${e=>{e.target.style.display='none';e.target.parentElement.innerHTML='<div style="color:#6b7280;fontFamily:monospace;padding:40px;fontSize:11px">Image unavailable</div>';}}
            />`
          :html`<${VideoPlayer} src=${it.url||it.src} name=${it.name||'audit_video'}/>`}
      </div>
      ${/* ── Thumbnails ── */null}
      ${items.length>1?html`<div style=${{display:'flex',gap:6,flexWrap:'wrap',justifyContent:'center',maxWidth:'90vw'}}>
        ${items.map((x,j)=>html`<div key=${j} onClick=${()=>setIdx(j)}
          style=${{width:50,height:50,borderRadius:6,overflow:'hidden',cursor:'pointer',
          border:`2px solid ${j===safe?C.accent:C.border}`,background:'#050709',transition:'border-color .15s',flexShrink:0}}>
          ${x.type==='image'
            ?html`<img src=${x.src||x.url} style=${{width:'100%',height:'100%',objectFit:'cover'}}
                onError=${e=>e.target.style.opacity='.3'}/>`
            :html`<div style=${{width:'100%',height:'100%',display:'flex',alignItems:'center',justifyContent:'center',background:'#0a2030',fontSize:20}}>🎥</div>`}
        </div>`)}
      </div>`:''}
      ${/* ── Nav buttons ── */null}
      <div style=${{display:'flex',gap:10,width:'100%',maxWidth:420}}>
        ${nav('← PREV',()=>setIdx(i=>Math.max(0,i-1)),safe===0)}
        ${nav('NEXT →',()=>setIdx(i=>Math.min(items.length-1,i+1)),safe===items.length-1)}
      </div>
    </div>
  </div>`;
}

function Annotate({src,onSave,onDiscard}){
  const cv=useRef(null);const[draw,setDraw]=useState(false);const[clr,setClr]=useState('#ef4444');const[sz,setSz]=useState(4);const[tool,setTool]=useState('pen');const last=useRef(null);
  useEffect(()=>{if(!cv.current||!src)return;const el=cv.current,ctx=el.getContext('2d'),img=new Image();img.onload=()=>{el.width=img.naturalWidth;el.height=img.naturalHeight;ctx.drawImage(img,0,0);};img.src=src;},[src]);
  const pt=(e,el)=>{const r=el.getBoundingClientRect(),s=e.touches?e.touches[0]:e;return{x:(s.clientX-r.left)*el.width/r.width,y:(s.clientY-r.top)*el.height/r.height};};
  const sd=e=>{setDraw(true);last.current=pt(e,cv.current);};
  const dd=e=>{if(!draw||!cv.current)return;e.preventDefault();const ctx=cv.current.getContext('2d'),p=pt(e,cv.current);ctx.beginPath();ctx.moveTo(last.current.x,last.current.y);ctx.lineTo(p.x,p.y);ctx.strokeStyle=tool==='eraser'?'#fff':clr;ctx.lineWidth=tool==='eraser'?sz*6:sz;ctx.lineCap='round';ctx.lineJoin='round';ctx.globalCompositeOperation=tool==='eraser'?'destination-out':'source-over';ctx.stroke();last.current=p;};
  const ed=()=>{setDraw(false);last.current=null;};
  const COLS=['#ef4444','#f59e0b','#10b981','#3b82f6','#8b5cf6','#ffffff','#111111'];
  return html`<div class="overlay" onClick=${e=>e.stopPropagation()}>
    <div style=${{background:C.card,borderRadius:12,padding:16,width:'100%',maxWidth:680,maxHeight:'92vh',display:'flex',flexDirection:'column',gap:10}}>
      <div style=${{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <span style=${{color:C.accent,fontFamily:mono,fontSize:12,fontWeight:700}}>✏ ANNOTATE IMAGE</span>
        <div style=${{display:'flex',gap:8}}>
          <button onClick=${()=>cv.current&&onSave(cv.current.toDataURL())} style=${{background:C.pass+'33',color:C.pass,border:`1px solid ${C.pass}`,borderRadius:6,padding:'6px 16px',fontFamily:mono,fontSize:12,fontWeight:700,cursor:'pointer'}}>✓ SAVE</button>
          <button onClick=${onDiscard} style=${{background:C.fail+'22',color:C.fail,border:`1px solid ${C.fail}`,borderRadius:6,padding:'6px 16px',fontFamily:mono,fontSize:12,cursor:'pointer'}}>✕ DISCARD</button>
        </div>
      </div>
      <div style=${{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
        <div style=${{display:'flex',gap:5}}>${COLS.map(c=>html`<div key=${c} onClick=${()=>{setClr(c);setTool('pen');}} style=${{width:22,height:22,borderRadius:'50%',background:c,cursor:'pointer',border:`2px solid ${clr===c&&tool==='pen'?'#fff':C.border}`}}/>`)}</div>
        <div style=${{display:'flex',gap:5}}>${[2,4,8,14].map(s=>html`<div key=${s} onClick=${()=>setSz(s)} style=${{width:s+10,height:s+10,borderRadius:'50%',background:sz===s?C.accent:C.muted,cursor:'pointer',border:`2px solid ${sz===s?C.accent:C.border}`}}/>`)}</div>

function FillScorecard({onBack}){
  // ── Auth state ────────────────────────────────────────
  const[user,setUser]=useState(null);

  // ── Form state ────────────────────────────────────────
  const[step,setStep]=useState('info');
  const[info,setInfo]=useState({site:SITES[0],date:new Date().toISOString().slice(0,10),week:weekNum(new Date()),auditor:''});
  const[submissionId,setSubmissionId]=useState('');
  const[doneAr,setDoneAr]=useState([]);
  const[curAr,setCurAr]=useState(null);
  const[ans,setAns]=useState({});
  const[qi,setQi]=useState(0);
  const[resumeLoading,setResumeLoading]=useState(false);
  const[savingSection,setSavingSection]=useState(false);
  const[cam,setCam]=useState(false);const[stream,setStream]=useState(null);
  const[vRec,setVRec]=useState(false);const[vStream,setVStream]=useState(null);const[mRec,setMRec]=useState(null);
  const[ann,setAnn]=useState(null);const[upP,setUpP]=useState({done:0,total:0,phase:''});const[errMsg,setErrMsg]=useState('');
  const vRef=useRef(null),cRef=useRef(null),fRef=useRef(null),vfRef=useRef(null),vvRef=useRef(null);

  const setFld=(ar,q,f,v)=>setAns(p=>({...p,[ar]:{...(p[ar]||{}),[q]:{...(p[ar]?.[q]||{answer:null,remark:'',images:[],videos:[]}),[f]:v}}}));
  const getA=(ar,q)=>ans[ar]?.[q]||{answer:null,remark:'',images:[],videos:[]};

  const startCam=async()=>{try{const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});setStream(s);setCam(true);setTimeout(()=>{if(vRef.current)vRef.current.srcObject=s;},80);}catch{alert('Camera unavailable.');}};
  const capPhoto=(ar,q)=>{const el=cRef.current,vd=vRef.current;if(!el||!vd)return;el.width=vd.videoWidth||640;el.height=vd.videoHeight||480;el.getContext('2d').drawImage(vd,0,0);const img=el.toDataURL();if(stream)stream.getTracks().forEach(t=>t.stop());setStream(null);setCam(false);setAnn({src:img,ar,q});};
  const stopCam=()=>{if(stream)stream.getTracks().forEach(t=>t.stop());setStream(null);setCam(false);};
  const startVid=async(ar,q)=>{
    try{const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'},audio:true});setVStream(s);setVRec(true);setTimeout(()=>{if(vvRef.current)vvRef.current.srcObject=s;},80);
    const chunks=[];const mr=new MediaRecorder(s,{mimeType:MediaRecorder.isTypeSupported('video/webm;codecs=vp9')?'video/webm;codecs=vp9':'video/webm'});
    mr.ondataavailable=e=>{if(e.data.size>0)chunks.push(e.data);};
    mr.onstop=()=>{const blob=new Blob(chunks,{type:'video/webm'});const url=URL.createObjectURL(blob);setFld(ar,q,'videos',[...getA(ar,q).videos,{url,blob,name:'REC_'+Date.now()+'.webm'}]);if(s)s.getTracks().forEach(t=>t.stop());setVStream(null);setVRec(false);setMRec(null);};
    mr.start();setMRec({rec:mr});}catch{alert('Camera/mic unavailable.');}
  };
  const stopVid=()=>{if(mRec)mRec.rec.stop();};
  const vidFile=(e,ar,q)=>{Array.from(e.target.files).forEach(f=>{const url=URL.createObjectURL(f);setFld(ar,q,'videos',[...getA(ar,q).videos,{url,file:f,name:f.name}]);});e.target.value='';};
  const imgFile=(e,ar,q)=>{Array.from(e.target.files).forEach(f=>{const r=new FileReader();r.onload=ev=>setFld(ar,q,'images',[...getA(ar,q).images,ev.target.result]);r.readAsDataURL(f);});e.target.value='';};

  // ── START AUDIT: create session ID + check for resume ──
  const startAudit=async()=>{
    if(!info.auditor.trim()){alert('Please enter auditor name.');return;}
    const sid=makeSessionId(info.site,info.week,info.auditor);
    setSubmissionId(sid);setResumeLoading(true);
    try{
      // Fetch by site + week + auditor — date within the week is sufficient to resolve the right record
      const result=await fetchRecord(info.site,info.week,info.auditor);
      if(result&&result.ok&&result.record){
        const rec=result.record;
        // Pre-fill all saved answers exactly as last stored
        try{const ex=JSON.parse(String(rec['Answers_JSON']||'{}'));if(ex&&typeof ex==='object')setAns(ex);}catch(_){}
        // Restore completed sections from boolean status flags
        const SMAP={
          'IOS_Status':'INBOUND OUTBOUND STAGING',
          'BBB_Status':'BBB AREA',
          'PSA_Status':'PRIMARY SORTING AREA',
          'SSA_Status':'SECONDARY SORTING AREA',
          'EXC_Status':'EXCEPTION AREA',
          'VOL_Status':'VOLUMETRIC HANDLING'
        };
        const completed=Object.keys(SMAP).filter(k=>{const v=rec[k];return v===true||String(v).toLowerCase()==='true';}).map(k=>SMAP[k]);
        setDoneAr(completed);
        // Use the stored submission ID for all subsequent saves
        if(rec['Submission_ID'])setSubmissionId(rec['Submission_ID']);
        console.log('[Resume] Found',completed.length,'completed sections for',info.site,'Week',info.week,info.auditor);
      }
    }catch(e){console.warn('[Resume] check failed:',e);}
    setResumeLoading(false);setStep('areas');
  };

  // ── SECTION SAVE: upload media then POST section data ──
  const saveSectionFn=async()=>{
    const ar=curAr;if(!ar)return;
    setSavingSection(true);
    const aqs=QS[ar]||[];
    let totalMedia=0;aqs.forEach(q=>{const a=getA(ar,q);totalMedia+=(a.images||[]).length+(a.videos||[]).length;});
    setUpP({done:0,total:totalMedia,phase:'uploading'});
    let uploaded=0;const processed={};
    for(const q of aqs){
      const a=getA(ar,q)||{answer:'NA',remark:'',images:[],videos:[]};
      const imgURLs=[],vidURLs=[];
      for(const img of(a.images||[])){
        try{const u=await uploadMedia(img,'image');if(u)imgURLs.push(u);}catch(e){console.warn('img upload:',e);}
        uploaded++;setUpP({done:uploaded,total:totalMedia,phase:'uploading'});
      }
      for(const vid of(a.videos||[])){
        try{
          const src=vid.blob||vid.file||vid.url;
          if(cloudOK()){const u=await uploadToCloud(src,'video');if(u)vidURLs.push(u);}
          else{const d=await vidSrcToBase64(src);if(d)vidURLs.push(d);}
        }catch(e){console.warn('vid upload:',e);}
        uploaded++;setUpP({done:uploaded,total:totalMedia,phase:'uploading'});
      }
      processed[q]={answer:a.answer||'NA',remark:a.remark||'',imageURLs:imgURLs,videoURLs:vidURLs};
    }
    let ap=0,at=0;Object.values(processed).forEach(a=>{if(a.answer&&a.answer!=='NA'){at++;if(a.answer==='PASS')ap++;}});
    const areaScore=at>0?Math.round(ap/at*100):0;
    setUpP(p=>({...p,phase:'submitting'}));
    try{
      await saveSectionToSheet(submissionId,info,ar,processed,areaScore);
      // Bust the frontend cache so dashboard shows fresh data immediately
      _cache.data=null;_cache.ts=0;
      setAns(prev=>({...prev,[ar]:processed}));
      setDoneAr(prev=>[...prev.filter(x=>x!==ar),ar]);
      setUpP({done:0,total:0,phase:''});setSavingSection(false);
      setStep('areas');setQi(0);setCurAr(null);
    }catch(e){
      setUpP({done:0,total:0,phase:''});setSavingSection(false);
      console.error('[saveSectionFn]',e);
      alert('Section save failed: '+e.message+'\nAnswers are preserved — please retry.');
    }
  };

  const allSectionsDone=doneAr.length===AREAS.length;

  // ── FINAL SUBMIT (only when all 6 saved) ─────────────
  const doFinalSubmit=async()=>{
    if(!allSectionsDone){alert('Please save all 6 sections first.');return;}
    setUpP({done:0,total:0,phase:'submitting'});setStep('uploading');
    let pass=0,tot=0;const areaScores={};
    AREAS.forEach(ar=>{let ap=0,at=0;Object.values(ans[ar]||{}).forEach(a=>{if(a?.answer&&a.answer!=='NA'){at++;tot++;if(a.answer==='PASS'){ap++;pass++;}}});areaScores[ar]=at>0?Math.round(ap/at*100):0;});
    const score=tot>0?Math.round(pass/tot*100):0;
    try{
      await finalSubmitToSheet(submissionId,info,ans,areaScores,score);
      // Bust the frontend cache so dashboard shows fresh data immediately
      _cache.data=null;_cache.ts=0;
      setUpP({done:0,total:0,phase:''});setStep('done');
    }catch(e){
      setUpP({done:0,total:0,phase:''});
      console.error('[doFinalSubmit]',e);
      setErrMsg(e.message||'Submit failed.');setStep('error');
    }
  };

  const qs=curAr?QS[curAr]:[];const cq=qs[qi]||'';const ca=getA(curAr,cq);
  const arAllAnswered=qs.length>0&&qs.every(q=>['PASS','FAIL','NA'].includes(getA(curAr,q).answer));

  // ── Gate: show login if not authenticated ─────────────
  if(!user)return html`<${LoginPage} onSuccess=${setUser} onBack=${onBack}/>`;

  // ── DONE ──────────────────────────────────────────────

    <div style=${{color:C.muted,fontFamily:mono,fontSize:13,marginBottom:32}}>Week ${info.week} · ${info.auditor}</div>
    <button onClick=${onBack} style=${{background:C.abl,color:C.accent,border:`2px solid ${C.accent}`,borderRadius:8,padding:'14px 32px',fontSize:14,fontFamily:mono,fontWeight:700,cursor:'pointer',letterSpacing:1}}>← BACK TO HOME</button>
  </div></div>`;

  // ── ERROR ─────────────────────────────────────────────
  if(step==='error')return html`<div style=${{minHeight:'100vh',background:C.bg,display:'flex',alignItems:'center',justifyContent:'center'}}><div style=${{textAlign:'center',padding:40,maxWidth:460}} class="fi">

    <div style=${{display:'flex',gap:12,justifyContent:'center',flexWrap:'wrap'}}>

    </div>

    ${vRec?html`<div class="overlay"><div style=${{textAlign:'center',width:'100%',maxWidth:480}}><div style=${{display:'inline-flex',alignItems:'center',gap:8,background:C.fail+'22',border:`2px solid ${C.fail}`,borderRadius:6,padding:'6px 14px',marginBottom:10,fontFamily:mono,fontSize:12,color:C.fail}}><span class="blink" style=${{width:10,height:10,borderRadius:'50%',background:C.fail,display:'inline-block'}}/>⏺ RECORDING…</div><video ref=${vvRef} autoPlay playsinline muted style=${{width:'100%',borderRadius:8}}/><div style=${{display:'flex',gap:14,marginTop:14,justifyContent:'center'}}><button onClick=${stopVid} style=${{background:C.fail+'33',color:C.fail,border:`2px solid ${C.fail}`,borderRadius:8,padding:'14px 28px',fontSize:14,fontFamily:mono,fontWeight:700,cursor:'pointer'}}>⏹ STOP & SAVE</button></div></div></div>`:''}
    <div style=${{maxWidth:600,margin:'0 auto',padding:16}}>
      <div style=${{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:14,marginBottom:14}}>

          <button onClick=${()=>fRef.current?.click()} style=${{background:C.purple+'22',color:C.purple,border:`1px solid ${C.purple}`,borderRadius:6,padding:'8px 12px',fontSize:11,fontFamily:mono,cursor:'pointer'}}>📁 IMAGE</button>

          <button onClick=${()=>vfRef.current?.click()} style=${{background:'#0891b222',color:'#0891b2',border:`1px solid #0891b2`,borderRadius:6,padding:'8px 12px',fontSize:11,fontFamily:mono,cursor:'pointer'}}>📹 VIDEO</button>
          <input ref=${vfRef} type="file" accept="video/*" multiple style=${{display:'none'}} onChange=${e=>vidFile(e,curAr,cq)}/>
        </div>
        ${(ca.images||[]).length>0?html`<div style=${{display:'flex',flexWrap:'wrap',gap:8,marginTop:12}}>${(ca.images||[]).map((img,j)=>html`<div key=${j} style=${{position:'relative'}}><img src=${img} style=${{width:68,height:68,objectFit:'cover',borderRadius:6,border:`2px solid ${C.border}`}}/><button onClick=${()=>setFld(curAr,cq,'images',ca.images.filter((_,k)=>k!==j))} style=${{position:'absolute',top:-5,right:-5,background:C.fail,color:'#fff',border:'none',borderRadius:'50%',width:18,height:18,cursor:'pointer',fontSize:10,display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button></div>`)}</div>`:''}
        ${(ca.videos||[]).length>0?html`<div style=${{display:'flex',flexWrap:'wrap',gap:8,marginTop:10}}>${(ca.videos||[]).map((v,j)=>html`<div key=${j} style=${{position:'relative',background:C.bg,border:`2px solid #06b6d444`,borderRadius:8,overflow:'hidden'}}><video src=${v.url} controls style=${{width:150,height:90,objectFit:'cover',display:'block'}}/><div style=${{padding:'3px 8px',fontSize:9,color:C.muted,fontFamily:mono,maxWidth:150,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>${v.name}</div><button onClick=${()=>setFld(curAr,cq,'videos',ca.videos.filter((_,k)=>k!==j))} style=${{position:'absolute',top:4,right:4,background:C.fail,color:'#fff',border:'none',borderRadius:'50%',width:20,height:20,cursor:'pointer',fontSize:11,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button></div>`)}</div>`:''}
      </div>
      <div style=${{display:'flex',gap:10}}>
        <button onClick=${()=>setQi(i=>Math.max(0,i-1))} disabled=${qi===0} style=${{flex:1,background:'transparent',color:C.muted,border:`1px solid ${C.border}`,borderRadius:6,padding:'13px 0',fontFamily:mono,fontSize:11,cursor:qi===0?'default':'pointer',opacity:qi===0?.3:1}}>← PREV</button>
        ${qi<qs.length-1
          ?html`<button onClick=${()=>setQi(i=>i+1)} disabled=${!ca.answer} style=${{flex:2,background:ca.answer?C.abl:'transparent',color:ca.answer?C.accent:C.muted,border:`2px solid ${ca.answer?C.accent:C.border}`,borderRadius:6,padding:'13px 0',fontSize:12,fontFamily:mono,fontWeight:700,cursor:ca.answer?'pointer':'default',opacity:ca.answer?1:.4}}>NEXT QUESTION →</button>`
          :html`<button onClick=${saveSectionFn} disabled=${!arAllAnswered} style=${{flex:2,background:arAllAnswered?C.pass+'22':'transparent',color:arAllAnswered?C.pass:C.muted,border:`2px solid ${arAllAnswered?C.pass:C.border}`,borderRadius:6,padding:'13px 0',fontSize:12,fontFamily:mono,fontWeight:700,cursor:arAllAnswered?'pointer':'default',opacity:arAllAnswered?1:.4}}>💾 SAVE SECTION ✓</button>`}
      </div>
    </div>
  </div>`;

  // ── AREA SELECTION ────────────────────────────────────
  if(step==='areas')return html`<div style=${{minHeight:'100vh',background:C.bg}}><div style=${{maxWidth:600,margin:'0 auto',padding:16}}>
    <div style=${{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:16,marginBottom:20}}>

      </div>
      <div style=${{marginTop:14}}>
        <${PBar} v=${(doneAr.length/AREAS.length)*100} color=${C.pass}/>

        <div>
          <div style=${{fontFamily:mono,fontSize:13,fontWeight:done?700:400}}>${ar}</div>
          <div style=${{color:C.muted,fontSize:11,marginTop:4}}>${QS[ar].length} questions${done?' — ✓ SAVED':' — tap to audit'}</div>
        </div>
        <span style=${{fontSize:done?22:20,color:done?C.pass:ACLR[ar]}}>${done?'✅':'→'}</span>
      </button>`;
    })}
    ${allSectionsDone

          style=${{width:'100%',background:'#E9DF43',color:'#000',border:'none',borderRadius:10,

          <div style=${{color:C.accent,fontFamily:mono,fontSize:12,fontWeight:700,marginBottom:4}}>🔒 FINAL SUBMIT LOCKED</div>
          <div style=${{color:C.muted,fontSize:11}}>Save all ${AREAS.length-doneAr.length} remaining section${AREAS.length-doneAr.length!==1?'s':''} to unlock</div>
        </div>`}
  </div></div>`;

  // ── INFO FORM ─────────────────────────────────────────
  return html`<div style=${{minHeight:'100vh',background:C.bg}}><div style=${{maxWidth:520,margin:'0 auto',padding:16}}>
    <div style=${{textAlign:'center',padding:'28px 0 34px'}}>
      <div style=${{color:C.accent,fontFamily:mono,fontSize:10,letterSpacing:3}}>AUDIT ENTRY</div>
      <h1 style=${{color:C.text,fontFamily:mono,fontSize:22,fontWeight:700,marginTop:6}}>FILL SCORECARD</h1>
      ${user?html`<div style=${{color:C.muted,fontSize:12,marginTop:6}}>Signed in as <b style=${{color:C.accent}}>${user.name}</b></div>`:''}

    <div style=${{background:'rgba(233,223,67,.07)',border:'1px solid rgba(233,223,67,.2)',borderRadius:10,padding:'12px 16px',marginBottom:20,display:'flex',gap:10,alignItems:'flex-start'}}>
      <span style=${{fontSize:18,flexShrink:0}}>ℹ</span>

        ${f.type==='select'
          ?html`<select value=${info[f.key]} onChange=${e=>setInfo(p=>({...p,[f.key]:e.target.value}))} style=${{width:'100%',background:C.card,color:C.text,border:`1px solid ${C.border}`,borderRadius:8,padding:'13px 14px',fontSize:14,cursor:'pointer'}}>${SITES.map(s=>html`<option key=${s}>${s}</option>`)}</select>`

      </div>`)}

    ${resumeLoading?html`<div style=${{textAlign:'center',padding:'14px 0',color:C.muted,fontFamily:mono,fontSize:12,display:'flex',gap:10,justifyContent:'center',alignItems:'center'}}><span class="spin">◎</span> Checking for existing record…</div>`:''}
    <button onClick=${startAudit} disabled=${resumeLoading}
      style=${{width:'100%',background:C.abl,color:C.accent,border:`2px solid ${C.accent}`,borderRadius:8,padding:'16px 0',fontSize:15,fontFamily:mono,fontWeight:700,cursor:'pointer',marginTop:8,letterSpacing:1}}>

    </button>
    <button onClick=${onBack} style=${{width:'100%',background:'transparent',color:C.muted,border:`1px solid ${C.border}`,borderRadius:8,padding:'13px 0',fontFamily:mono,fontSize:13,cursor:'pointer',marginTop:10}}>← BACK TO HOME</button>
  </div></div>`;
}

//  COLLATED EMAIL REPORT GENERATOR
// ════════════════════════════════════════════════════════
function generateEmailReport(records,activeWeeks,displayWeek,downloadOnly=false){
  // All weeks from data, dynamically (week 16 already filtered from records)
  const allWeeks=[...new Set(records.map(r=>Number(r['Week_No'])).filter(Boolean))].sort((a,b)=>a-b);

  // Network avg for display week
  const wRecs=records.filter(r=>Number(r['Week_No'])===displayWeek);
  const netAvg=wRecs.length?Math.round(wRecs.reduce((s,r)=>s+(Number(r['Overall_Score_%'])||0),0)/wRecs.length):0;

  // Weekly performance table
  const siteWeekMap={};
  records.forEach(r=>{const site=String(r['Site']||'');const wk=Number(r['Week_No']);if(site&&wk){if(!siteWeekMap[site])siteWeekMap[site]={};siteWeekMap[site][wk]=Number(r['Overall_Score_%'])||0;}});

  // Sorted by score for current week
  const wScores=wRecs.map(r=>({site:String(r['Site']||''),score:Number(r['Overall_Score_%'])||0})).sort((a,b)=>b.score-a.score);
  const top3=wScores.slice(0,3);
  const bot3=[...wScores].sort((a,b)=>a.score-b.score).slice(0,3);

  // Master comparison
  const allQ=[];AREAS.forEach(area=>(QS[area]||[]).forEach(q=>allQ.push({area,q})));
  const ansMap={};
  wRecs.forEach(r=>{const site=String(r['Site']||'');const ans=parseAns(r);ansMap[site]=ans;});
  const auditedSites=wRecs.map(r=>String(r['Site']||'')).filter(Boolean);

  // DC breakdowns — include images and video links
  const dcBreakdowns=wRecs.map(r=>{
    const site=String(r['Site']||'');const ans=parseAns(r);const score=Number(r['Overall_Score_%'])||0;
    const areas=AREAS.map(area=>{
      const aScore=Number(r[ACOL[area]])||0;const fails=[];
      Object.entries(ans[area]||{}).forEach(([q,a])=>{
        if(a?.answer==='FAIL'){
          const imgs=(a.imageURLs||[]).filter(u=>u&&(u.startsWith('http')||u.startsWith('data:')));
          const vids=(a.videoURLs||[]).filter(u=>u&&(u.startsWith('http')||u.startsWith('blob:')));
          fails.push({q,remark:a.remark||'',imgs,vids});
        }
      });
      return{area,aScore,fails};
    });
    return{site,score,areas,auditor:String(r['Auditor']||'—'),date:String(r['Audit_Date']||'—')};
  });

  const sc=(v)=>v>=80?'g':v>=60?'a':'r';
  const colBg=(v)=>v>=80?'#d1fae5':v>=60?'#fef3c7':'#fee2e2';
  const colFg=(v)=>v>=80?'#065f46':v>=60?'#92400e':'#991b1b';

  const htmlBody=`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Collated Audit Report — ${fmtW(displayWeek)}</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}

//  TAB 1: OVERVIEW
// ════════════════════════════════════════════════════════
// ════════════════════════════════════════════════════════
//  SHARED SCORING HELPERS (multi-entry DC averaging)
// ════════════════════════════════════════════════════════
// For a given week, group all records by DC, average each DC's scores,
// then return a flat list of {site, score, areaScores, auditor, date, entryCount}
function dcAveragesForWeek(records, week){
  const wRecs=records.filter(r=>Number(r['Week_No'])===week);
  const byDC={};
  wRecs.forEach(r=>{const s=String(r['Site']||'');if(!byDC[s])byDC[s]=[];byDC[s].push(r);});
  return Object.entries(byDC).map(([site,recs])=>{
    const scores=recs.map(r=>Number(r['Overall_Score_%'])||0);
    const avg=Math.round(scores.reduce((a,b)=>a+b,0)/scores.length);
    const areaScores={};
    AREAS.forEach(area=>{const av=recs.map(r=>Number(r[ACOL[area]])||0);areaScores[area]=Math.round(av.reduce((a,b)=>a+b,0)/av.length);});
    const latest=recs[recs.length-1];
    return{site,score:avg,areaScores,auditor:String(latest['Auditor']||'—'),date:String(latest['Audit_Date']||'—'),entryCount:recs.length,records:recs};
  }).sort((a,b)=>b.score-a.score);
}

// ════════════════════════════════════════════════════════
//  DC COLLATED REPORT — generates print-to-PDF HTML
// ════════════════════════════════════════════════════════
function generateDCReport(site,week,rec,answers,areaScores,fails,allMedia){
  const score=Number(rec?.['Overall_Score_%'])||0;
  const auditor=String(rec?.['Auditor']||'—');
  const date=String(rec?.['Audit_Date']||'—');
  const passC=Number(rec?.['Pass_Count'])||0;
  const failC=Number(rec?.['Fail_Count'])||0;
  const naC=Number(rec?.['NA_Count'])||0;
  const scBg=v=>v>=80?'#d1fae5':v>=60?'#fef3c7':'#fee2e2';
  const scFg=v=>v>=80?'#065f46':v>=60?'#92400e':'#991b1b';
  const scTxt=v=>v>=80?'GOOD':v>=60?'MONITOR':'ACTION NEEDED';

  // Build area score rows
  const areaRows=AREAS.map(area=>{
    const s=Number(rec?.[ACOL[area]])||0;
    return `<tr><td>${area}</td><td style="background:${scBg(s)};color:${scFg(s)};font-weight:700;text-align:center">${s}%</td><td style="text-align:center;color:${scFg(s)}">${scTxt(s)}</td></tr>`;
  }).join('');

  // Build improvement areas
  const improvementRows=fails.length===0
    ?'<tr><td colspan="3" style="text-align:center;color:#16a34a;padding:18px">✓ No failures — excellent performance!</td></tr>'
    :fails.map(f=>`<tr>
        <td style="color:#991b1b;font-weight:600">${f.q||f.neg||'—'}</td>
        <td style="color:#64748b;font-size:10px">${f.area}</td>
        <td style="color:#92400e;font-style:italic">${f.remark||'—'}</td>
      </tr>`).join('');

  // Build snap collated
  const snapSections=AREAS.map(area=>{
    const aMedia=allMedia.filter(m=>m.area===area);
    if(!aMedia.length)return'';
    const imgs=aMedia.filter(m=>m.type==='image').map(m=>
      `<img src="${m.src}" style="width:150px;height:110px;object-fit:cover;border-radius:6px;border:1px solid #e2e8f0" loading="lazy" onerror="this.style.display='none'"/>`
    ).join('');
    const vids=aMedia.filter(m=>m.type==='video').map(m=>{
      const r=resolveVideoUrl(m.url||m.src);
      if(!r)return'';
      const href=r.type==='drive'?r.view:(r.src||m.url||m.src);
      return `<a href="${href}" target="_blank" style="display:inline-flex;align-items:center;justify-content:center;flex-direction:column;gap:4px;width:150px;height:110px;background:#0f172a;border:1px solid #1e40af;border-radius:6px;color:#60a5fa;text-decoration:none;font-size:24px">🎥<span style="font-size:9px;font-family:monospace">VIEW VIDEO</span></a>`;
    }).join('');
    if(!imgs&&!vids)return'';
    return `<div style="margin-bottom:18px">
      <div style="font-weight:700;font-size:11px;color:#1C856F;padding:5px 10px;background:#f0fdf4;border-left:3px solid #1C856F;margin-bottom:10px">${area}</div>
      <div style="display:flex;flex-wrap:wrap;gap:8px">${imgs}${vids}</div>
    </div>`;
  }).join('');

  // Build full checklist
  const checklistSections=AREAS.map(area=>{
    const qs=answers[area]||{};
    const rows=(QS[area]||[]).map(q=>{
      const a=qs[q]||{};
      const ansColor=a.answer==='PASS'?'#16a34a':a.answer==='FAIL'?'#dc2626':'#64748b';
      const rowBg=a.answer==='FAIL'?'#fff1f2':'transparent';
      return `<tr style="background:${rowBg}">
        <td style="font-size:11px;line-height:1.5;color:${a.answer==='FAIL'?'#991b1b':'#1e293b'}">${q}</td>
        <td style="text-align:center;font-weight:700;color:${ansColor};white-space:nowrap;font-family:monospace">${a.answer||'—'}</td>
        <td style="font-size:10px;color:#64748b;font-style:italic">${a.remark||''}</td>
      </tr>`;
    }).join('');
    return`<div style="margin-bottom:20px;page-break-inside:avoid">
      <div style="font-weight:700;font-size:11px;color:#1C856F;padding:6px 12px;background:#f0fdf4;border-left:4px solid #1C856F;margin-bottom:8px">${area}</div>
      <table style="width:100%;border-collapse:collapse;font-size:12px">
        <thead><tr style="background:#f8fafc">
          <th style="text-align:left;padding:6px 10px;border-bottom:2px solid #e2e8f0;font-size:10px;color:#64748b">QUESTION</th>
          <th style="text-align:center;padding:6px 10px;border-bottom:2px solid #e2e8f0;font-size:10px;color:#64748b;width:80px">RESULT</th>
          <th style="text-align:left;padding:6px 10px;border-bottom:2px solid #e2e8f0;font-size:10px;color:#64748b">REMARK</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
  }).join('');

  const html=`<!DOCTYPE html><html><head><meta charset="UTF-8">
<title>Shadowfax Audit Report — ${site} ${fmtW(week)}</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,Helvetica,sans-serif;font-size:12px;background:#fff;color:#1e293b;-webkit-print-color-adjust:exact;print-color-adjust:exact}
.wrap{max-width:1050px;margin:0 auto;padding:28px 32px}
.header{background:linear-gradient(135deg,#0f4235,#1C856F);color:#fff;padding:24px 30px;border-radius:10px;margin-bottom:24px;display:flex;justify-content:space-between;align-items:center;gap:16px}
.header h1{font-size:22px;font-weight:800;margin-bottom:4px}
.header .sub{color:rgba(255,255,255,.75);font-size:11px;line-height:1.8}
.score-badge{background:#fff;border-radius:10px;padding:14px 20px;text-align:center;min-width:120px;flex-shrink:0}
.score-badge .pct{font-size:40px;font-weight:900;color:${scFg(score)};line-height:1}
.score-badge .lbl{font-size:9px;font-family:monospace;letter-spacing:1.5px;color:#64748b;margin-top:4px}
.meta-grid{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px}
.meta-chip{background:#f8fafc;border:1px solid #e2e8f0;border-radius:6px;padding:8px 14px;font-size:11px}
.meta-chip b{display:block;color:#64748b;font-size:9px;letter-spacing:1px;margin-bottom:2px}
.stat-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:24px}
.stat-box{flex:1;min-width:100px;border-radius:8px;padding:12px 16px;text-align:center;border:1px solid}
.section-title{font-size:13px;font-weight:700;color:#1C856F;border-left:4px solid #1C856F;padding:6px 14px;background:#f0fdf4;border-radius:0 5px 5px 0;margin:24px 0 12px}
table.main{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:16px}
table.main th{background:#1C856F;color:#fff;padding:7px 12px;text-align:left;font-size:10px;letter-spacing:.5px}
table.main td{border:1px solid #e2e8f0;padding:7px 12px;vertical-align:top}
table.main tbody tr:hover{background:#f8fafc}
.footer{margin-top:36px;padding-top:14px;border-top:1px solid #e2e8f0;text-align:center;color:#94a3b8;font-size:10px}
@media print{.no-print{display:none!important}.wrap{padding:14px}@page{margin:1cm}}
</style></head><body><div class="wrap">

<div class="header">
  <div>
    <div style="font-size:9px;letter-spacing:3px;color:rgba(255,255,255,.6);margin-bottom:4px">SHADOWFAX LOGISTICS — WEEKLY AUDIT</div>
    <h1>📋 ${site}</h1>
    <div class="sub">
      Week ${fmtW(week)} &nbsp;|&nbsp; Date: ${date} &nbsp;|&nbsp; Auditor: ${auditor}<br/>
      Generated: ${new Date().toLocaleString('en-IN')}
    </div>
  </div>
  <div class="score-badge">
    <div class="pct" style="color:${scFg(score)}">${score}%</div>
    <div class="lbl">OVERALL SCORE</div>
    <div style="font-size:10px;font-weight:700;color:${scFg(score)};margin-top:4px">${scTxt(score)}</div>
  </div>
</div>

<div class="meta-grid">
  <div class="meta-chip"><b>PASS</b><span style="color:#16a34a;font-weight:700;font-size:14px">${passC}</span></div>
  <div class="meta-chip"><b>FAIL</b><span style="color:#dc2626;font-weight:700;font-size:14px">${failC}</span></div>
  <div class="meta-chip"><b>N/A</b><span style="color:#64748b;font-weight:700;font-size:14px">${naC}</span></div>
  <div class="meta-chip"><b>COMPLIANCE</b><span style="font-weight:700;font-size:14px;color:${scFg(score)}">${score}%</span></div>
</div>

<div class="section-title">A. AREA-WISE PERFORMANCE</div>
<table class="main">
  <thead><tr><th>OPERATIONAL AREA</th><th style="width:100px;text-align:center">SCORE</th><th style="width:140px;text-align:center">STATUS</th></tr></thead>
  <tbody>${areaRows}</tbody>
</table>

<div class="section-title">B. IMPROVEMENT AREAS (${fails.length} issue${fails.length!==1?'s':''})</div>
<table class="main">
  <thead><tr><th>IDENTIFIED ISSUE</th><th style="width:180px">AREA</th><th style="width:200px">REMARK</th></tr></thead>
  <tbody>${improvementRows}</tbody>
</table>

<div class="section-title" style="page-break-before:always">C. SNAP COLLATED — EVIDENCE MEDIA</div>
${snapSections||'<p style="color:#64748b;padding:12px 0;font-style:italic">No media uploaded for this submission.</p>'}

<div class="section-title">D. FULL CHECKLIST RESPONSES</div>
${checklistSections}

<div class="footer">
  Shadowfax Logistics Operations · Weekly Audit Scorecard · ${site} · ${fmtW(week)} · ${new Date().toLocaleDateString('en-IN')}
</div>
</div>
<div class="no-print" style="position:fixed;bottom:20px;right:20px;display:flex;gap:10px">
  <button onclick="window.print()" style="background:#1C856F;color:#fff;border:none;border-radius:8px;padding:12px 24px;font-size:14px;font-weight:700;cursor:pointer;box-shadow:0 4px 16px rgba(28,133,111,.4)">🖨 PRINT / SAVE AS PDF</button>
  <button onclick="window.close()" style="background:#64748b;color:#fff;border:none;border-radius:8px;padding:12px 20px;font-size:14px;cursor:pointer">✕ CLOSE</button>
</div>
</body></html>`;

  const w=window.open('','_blank');
  if(!w){alert('Popup blocked. Please allow popups for this site and try again.');return;}
  w.document.write(html);w.document.close();
  // Auto-trigger print after images load
  setTimeout(()=>w.focus(),400);
}

// ════════════════════════════════════════════════════════
//  TAB 2: DC DETAIL VIEW
// ════════════════════════════════════════════════════════
function DCDetailTab({records,week,site,setSite}){
  const[sub,setSub]=useState('performance');const[lb,setLb]=useState(null);
  const[selDate,setSelDate]=useState('');
  const siteWeekRecs=useMemo(()=>records.filter(r=>String(r['Site'])===site&&Number(r['Week_No'])===week),[records,site,week]);
  const dates=useMemo(()=>[...new Set(siteWeekRecs.map(r=>String(r['Audit_Date']||'')).filter(Boolean))],[siteWeekRecs]);
  useEffect(()=>{setSelDate(dates.length>0?dates[0]:'');},[site,week,JSON.stringify(dates)]);
  const rec=useMemo(()=>{
    if(selDate)return siteWeekRecs.find(r=>String(r['Audit_Date']||'')===selDate)||siteWeekRecs[siteWeekRecs.length-1]||null;
    return siteWeekRecs[siteWeekRecs.length-1]||null;
  },[siteWeekRecs,selDate]);
  const answers=useMemo(()=>rec?parseAns(rec):{},[rec]);
  const areaScores=useMemo(()=>AREAS.map(a=>({area:a,score:Number(rec?.[ACOL[a]])||0,color:ACLR[a],short:ASHORT[a]})),[rec]);
  const score=Number(rec?.['Overall_Score_%'])||0;const auditor=String(rec?.['Auditor']||'—');const date=String(rec?.['Audit_Date']||'—');
  const passC=Number(rec?.['Pass_Count'])||0;const failC=Number(rec?.['Fail_Count'])||0;const naC=Number(rec?.['NA_Count'])||0;
  const fails=useMemo(()=>{const out=[];AREAS.forEach(area=>{Object.entries(answers[area]||{}).forEach(([q,a])=>{if(a?.answer==='FAIL'){const imgs=(a.imageURLs||[]).filter(u=>u&&(u.startsWith('http')||u.startsWith('data:')));const vids=(a.videoURLs||[]).filter(u=>u&&(u.startsWith('http')||u.startsWith('blob:')));out.push({area,q,remark:a.remark||'',imgs,vids});}});});return out;},[answers]);
  const allMedia=useMemo(()=>{const items=[];AREAS.forEach(area=>{Object.entries(answers[area]||{}).forEach(([q,a])=>{(a?.imageURLs||[]).forEach(u=>{if(u&&(u.startsWith('http')||u.startsWith('data:')))items.push({type:'image',src:u,area,q});});(a?.videoURLs||[]).forEach(u=>{if(u&&(u.startsWith('http')||u.startsWith('blob:')))items.push({type:'video',url:u,area,q});});});});return items;},[answers]);
  const barData={labels:areaScores.map(a=>a.short),datasets:[{label:'Score %',data:areaScores.map(a=>a.score),backgroundColor:areaScores.map(a=>a.color+'bb'),borderColor:areaScores.map(a=>a.color),borderWidth:1,borderRadius:4}]};
  const barOpts={responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},datalabels:{display:true,color:'#fff',font:{size:11,weight:'bold',family:mono},formatter:v=>v+'%',anchor:'end',align:'top',offset:3}},scales:{x:{ticks:{color:C.muted,font:{size:10}},grid:{color:C.border+'33'}},y:{min:0,max:105,ticks:{color:C.muted,callback:v=>v>100?'':v+'%'},grid:{color:C.border+'33'}}}};
  return html`<div class="fi">
    ${lb?html`<${Lightbox} items=${lb.items} idx=${lb.idx} onClose=${()=>setLb(null)}/>`:''}
    <div style=${{display:'flex',gap:16,marginBottom:20,flexWrap:'wrap',alignItems:'flex-end'}}>
      <div><div style=${{color:C.muted,fontSize:9,fontFamily:mono,letterSpacing:1.5,marginBottom:6}}>SELECT SITE</div>
        <select value=${site} onChange=${e=>setSite(e.target.value)} style=${{background:C.card,color:C.text,border:`1px solid ${C.border}`,borderRadius:8,padding:'11px 18px',fontSize:14,fontFamily:mono,cursor:'pointer',minWidth:220}}>
          ${SITES.map(s=>html`<option key=${s}>${s}</option>`)}
        </select>
      </div>
      ${dates.length>1?html`<div>
        <div style=${{color:C.muted,fontSize:9,fontFamily:mono,letterSpacing:1.5,marginBottom:6}}>SELECT DATE</div>
        <select value=${selDate} onChange=${e=>setSelDate(e.target.value)} style=${{background:C.card,color:C.text,border:`1px solid ${C.accent}44`,borderRadius:8,padding:'11px 18px',fontSize:13,fontFamily:mono,cursor:'pointer',minWidth:160}}>
          ${dates.map(d=>html`<option key=${d} value=${d}>${d}</option>`)}
        </select>
      </div>`:''}
      ${siteWeekRecs.length>1?html`<div style=${{background:C.accent+'12',border:`1px solid ${C.accent}33`,borderRadius:8,padding:'8px 14px',fontFamily:mono,fontSize:10,color:C.accent}}>${siteWeekRecs.length} entries for ${fmtW(week)}</div>`:''}
    </div>
    ${rec?html`<div style=${{background:'rgba(0,0,0,.35)',border:`1px solid ${scCol(score)}44`,borderRadius:14,padding:'22px 26px',marginBottom:20,position:'relative',overflow:'hidden'}}>
      <div style=${{position:'absolute',top:0,left:0,right:0,height:3,background:`linear-gradient(90deg,${scCol(score)},${scCol(score)}88)`}}/>
      <div style=${{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:16}}>
        <div>
          <h2 style=${{fontFamily:mono,fontSize:26,fontWeight:700,color:C.text,margin:'0 0 8px',letterSpacing:-1}}>${site}</h2>
          <div style=${{display:'flex',gap:6,flexWrap:'wrap',marginBottom:8}}>
            <span style=${{background:scCol(score)+'20',color:scCol(score),border:`1px solid ${scCol(score)}44`,borderRadius:4,padding:'3px 10px',fontFamily:mono,fontSize:10,fontWeight:700}}>${scLabel(score)}</span>
            <span style=${{background:'#ffffff08',color:C.muted,borderRadius:4,padding:'3px 10px',fontSize:10,fontFamily:mono}}>${date}</span>
            <span style=${{background:'#ffffff08',color:C.muted,borderRadius:4,padding:'3px 10px',fontSize:10,fontFamily:mono}}>${auditor}</span>
          </div>
          <div style=${{display:'flex',gap:14,fontFamily:mono,fontSize:11}}>
            <span style=${{color:C.pass}}>✓ ${passC} PASS</span><span style=${{color:C.fail}}>✗ ${failC} FAIL</span><span style=${{color:C.na}}>— ${naC} NA</span>
          </div>
        </div>
        <div style=${{textAlign:'right'}}><div style=${{fontSize:52,fontFamily:mono,fontWeight:700,color:scCol(score),lineHeight:1}}>${score}%</div><div style=${{color:C.muted,fontSize:8,fontFamily:mono,letterSpacing:2,marginTop:4}}>PERFORMANCE SCORE</div></div>
      </div>
      <div style=${{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(100px,1fr))',gap:8,marginTop:18}}>
        ${areaScores.map(a=>html`<div key=${a.area} style=${{background:a.color+'12',border:`1px solid ${a.color}33`,borderRadius:6,padding:'8px 10px',textAlign:'center'}}>

    ${rec?html`<div>
      <div style=${{display:'flex',gap:8,marginBottom:20,flexWrap:'wrap',alignItems:'center',justifyContent:'space-between'}}>

          onMouseEnter=${e=>{e.currentTarget.style.transform='translateY(-1px)';e.currentTarget.style.boxShadow='0 6px 20px rgba(28,133,111,.5)';}}
          onMouseLeave=${e=>{e.currentTarget.style.transform='translateY(0)';e.currentTarget.style.boxShadow='0 4px 16px rgba(28,133,111,.35)';}}>

      ${sub==='performance'?html`<div class="card" style=${{padding:18}} class="fi">
        <${SH}>Area Performance — ${site}</${SH}>
        <div style=${{height:280}}><${ChartComp} type="bar" data=${barData} options=${barOpts} style=${{width:'100%',height:'100%'}}/></div>
        <div style=${{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(140px,1fr))',gap:8,marginTop:16}}>
